<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT: Digital Dashboard</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #00ff00;
            --text-accent: #00bfff;
            --text-warn: #ff4500;
            --text-dim: #555555;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 2px solid var(--text-dim);
        }
        button {
            background-color: #111;
            color: var(--text-main);
            border: 2px solid var(--text-main);
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
        button:active { background-color: var(--text-main); color: black; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto auto auto;
            flex-grow: 1;
            padding: 10px;
            gap: 10px;
            overflow-y: auto;
        }
        .card {
            border: 2px solid var(--text-dim);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .card-full { grid-column: span 2; }
        .title { font-size: 14px; color: var(--text-accent); text-transform: uppercase; }
        .value { font-size: 10vw; font-weight: bold; line-height: 1.1; }
        .unit { font-size: 16px; color: var(--text-dim); }
        #status { color: var(--text-warn); font-size: 14px; font-weight: bold; }
        
        #logConsole {
            height: 130px;
            background: #050505;
            color: #888;
            font-size: 11px;
            padding: 8px;
            overflow-y: auto;
            border-top: 2px solid var(--text-dim);
        }
    </style>
</head>
<body>

<header>
    <div id="status">USB НЕ АКТИВИРОВАН</div>
    <button id="connectBtn">АКТИВИРОВАТЬ USB</button>
</header>

<div class="grid">
    <div class="card card-full">
        <div class="title">Остаток в баке (45L MAX)</div>
        <div class="value" id="fuelVal">--</div>
        <div class="unit">ЛИТРОВ</div>
    </div>

    <div class="card">
        <div class="title">Обороты</div>
        <div class="value" style="color: var(--text-main);" id="rpmVal">0</div>
        <div class="unit">RPM</div>
    </div>

    <div class="card">
        <div class="title">Температура</div>
        <div class="value" id="tempVal">--</div>
        <div class="unit">°C</div>
    </div>

    <div class="card">
        <div class="title">Скорость</div>
        <div class="value" style="color: var(--text-main);" id="speedVal">0</div>
        <div class="unit">КМ/Ч</div>
    </div>

    <div class="card">
        <div class="title">Расход</div>
        <div class="value" id="consVal">0.0</div>
        <div class="unit" id="consUnit">Л / Ч</div>
    </div>

    <div class="card">
        <div class="title">Пробег (ЭБУ)</div>
        <div class="value" style="font-size: 6vw;" id="odoVal">------</div>
        <div class="unit">КМ</div>
    </div>

    <div class="card">
        <div class="title">Суточный пробег</div>
        <div class="value" style="font-size: 6vw;" id="tripVal">0.0</div>
        <div class="unit">КМ</div>
        <button id="resetTripBtn" style="margin-top: 5px; padding: 5px 10px; font-size: 12px; border: 1px solid var(--text-dim); background: transparent; color: var(--text-dim); cursor: pointer;">СБРОС</button>
    </div>
</div>

<div id="logConsole">Ожидание подключения USB...</div>

<script>
    const TANK_VOLUME = 45.0;
    const FUEL_MAGIC_NUMBER = 0.335;

    let device;
    let isConnected = false;
    
    let commandQueue = ['010C', '0105', '010D', '0110', '012F', '0131', '22DD01']; 
    let cmdIndex = 0;
    let buffer = '';
    
    let currentSpeed = 0;
    let lastTime = Date.now();
    let tripDistance = parseFloat(localStorage.getItem('tripDistance')) || 0.0;

    const els = {
        status: document.getElementById('status'),
        connectBtn: document.getElementById('connectBtn'),
        fuel: document.getElementById('fuelVal'),
        rpm: document.getElementById('rpmVal'),
        temp: document.getElementById('tempVal'),
        speed: document.getElementById('speedVal'),
        cons: document.getElementById('consVal'),
        consUnit: document.getElementById('consUnit'),
        odo: document.getElementById('odoVal'),
        trip: document.getElementById('tripVal'),
        resetTrip: document.getElementById('resetTripBtn'),
        log: document.getElementById('logConsole')
    };

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    function writeLog(msg, isRaw = false) {
        const time = new Date().toLocaleTimeString();
        const color = isRaw ? '#0f0' : '#888';
        els.log.innerHTML += `<div><span style="color:#444">[${time}]</span> <span style="color:${color}">${msg}</span></div>`;
        els.log.scrollTop = els.log.scrollHeight;
        if (els.log.childElementCount > 60) els.log.removeChild(els.log.firstChild);
    }

    els.trip.innerText = tripDistance.toFixed(1);

    els.resetTrip.addEventListener('click', () => {
        tripDistance = 0.0;
        localStorage.setItem('tripDistance', tripDistance);
        els.trip.innerText = '0.0';
        writeLog("Суточный пробег сброшен");
    });

    els.connectBtn.addEventListener('click', async () => {
        try {
            device = await navigator.usb.requestDevice({ 
                filters: [{ vendorId: 0x0403, productId: 0x6001 }] 
            });

            await device.open();
            if (device.configuration === null) await device.selectConfiguration(1);
            await device.claimInterface(0);

            await device.controlTransferOut({
                requestType: 'vendor', recipient: 'device',
                request: 0x03, value: 0x4138, index: 0x0000 
            });

            els.status.innerText = "ПОДКЛЮЧЕНО";
            els.status.style.color = "var(--text-main)";
            els.connectBtn.style.display = "none";
            isConnected = true;

            writeLog("USB OK. Инициализация протокола Ford...");
            startReading(); 
            
            // ЖЕСТКАЯ НАСТРОЙКА ЧТОБЫ НЕ ВИСЛО
            await sendOBD("\r\r"); await sleep(200);
            await sendOBD("ATZ"); await sleep(1000); // Сброс
            await sendOBD("ATE0"); await sleep(200); // Эхо выкл
            await sendOBD("ATH1"); await sleep(200); // Заголовки вкл
            await sendOBD("ATSP6"); await sleep(500); // ФИКСАЦИЯ ПРОТОКОЛА CAN (11/500)
            await sendOBD("ATCAF1"); await sleep(200); // Авто-формат CAN
            
            writeLog("Синхронизация с ЭБУ...");
            await sendOBD("0100"); await sleep(800); 

            writeLog("СИСТЕМА ГОТОВА");
            pollCycle();

        } catch (err) {
            els.status.innerText = "ОШИБКА USB";
            writeLog("ОШИБКА: " + err.message);
        }
    });

    async function sendOBD(cmd) {
        if (!isConnected) return;
        const data = new TextEncoder().encode(cmd + '\r');
        await device.transferOut(2, data); 
    }

    async function startReading() {
        while (isConnected) {
            try {
                const result = await device.transferIn(1, 64); 
                const text = new TextDecoder().decode(result.data);
                buffer += text;

                if (buffer.includes('>')) {
                    let cleanResponse = buffer.replace('>', '').trim();
                    if(cleanResponse.length > 0) {
                        writeLog("> " + cleanResponse, true); 
                        processResponse(cleanResponse);
                    }
                    buffer = ''; 
                }
            } catch (err) {
                isConnected = false;
                break;
            }
        }
    }

    function pollCycle() {
        if (!isConnected) return;
        let cmd = commandQueue[cmdIndex];
        sendOBD(cmd);
        cmdIndex = (cmdIndex + 1) % commandQueue.length;
        setTimeout(pollCycle, 600); 
    }

    function processResponse(hexStr) {
        hexStr = hexStr.replace(/\s+/g, '').toUpperCase();
        
        if (hexStr.includes('SEARCHING') || hexStr.includes('CANERROR')) return;

        // Обороты
        if (hexStr.includes('410C')) {
            let idx = hexStr.indexOf('410C') + 4;
            let a = parseInt(hexStr.substring(idx, idx + 2), 16);
            let b = parseInt(hexStr.substring(idx + 2, idx + 4), 16);
            if (!isNaN(a) && !isNaN(b)) els.rpm.innerText = Math.round(((a * 256) + b) / 4);
        }

        // Температура
        if (hexStr.includes('4105')) {
            let idx = hexStr.indexOf('4105') + 4;
            let val = parseInt(hexStr.substring(idx, idx + 2), 16);
            if (!isNaN(val)) els.temp.innerText = val - 40;
        }

        // Скорость
        if (hexStr.includes('410D')) {
            let idx = hexStr.indexOf('410D') + 4;
            let val = parseInt(hexStr.substring(idx, idx + 2), 16);
            if (!isNaN(val)) {
                currentSpeed = val;
                els.speed.innerText = currentSpeed;
                let now = Date.now();
                let hours = (now - lastTime) / 3600000;
                tripDistance += (currentSpeed * hours);
                localStorage.setItem('tripDistance', tripDistance);
                els.trip.innerText = tripDistance.toFixed(1);
                lastTime = now;
            }
        }
        
        // MAF / Расход
        if (hexStr.includes('4110')) {
            let idx = hexStr.indexOf('4110') + 4;
            let maf = (parseInt(hexStr.substring(idx, idx + 4), 16)) / 100;
            if (!isNaN(maf)) {
                let lph = maf * FUEL_MAGIC_NUMBER;
                if (currentSpeed > 5) {
                    els.cons.innerText = ((lph / currentSpeed) * 100).toFixed(1);
                    els.consUnit.innerText = "Л/100КМ";
                } else {
                    els.cons.innerText = lph.toFixed(1);
                    els.consUnit.innerText = "Л/Ч";
                }
            }
        }

        // Бак
        if (hexStr.includes('412F')) {
            let idx = hexStr.indexOf('412F') + 4;
            let val = parseInt(hexStr.substring(idx, idx + 2), 16);
            if (!isNaN(val)) {
                let liters = TANK_VOLUME * (val / 255);
                els.fuel.innerText = liters.toFixed(1);
            }
        }

        // Одометр
        if (hexStr.includes('62DD01')) {
            let idx = hexStr.indexOf('62DD01') + 6;
            let val = parseInt(hexStr.substring(idx, idx + 6), 16);
            if (!isNaN(val)) els.odo.innerText = val;
        }
    }
</script>
</body>
</html>
