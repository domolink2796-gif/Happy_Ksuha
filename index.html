<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT: Debug Mode</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #00ff00;
            --text-accent: #00bfff;
            --text-warn: #ff4500;
            --text-dim: #444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: monospace; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }
        header { padding: 10px; border-bottom: 1px solid var(--text-dim); display: flex; justify-content: space-between; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 5px; flex-shrink: 0; }
        .card { border: 1px solid var(--text-dim); padding: 5px; text-align: center; border-radius: 5px; }
        .val { font-size: 24px; font-weight: bold; }
        .label { font-size: 10px; color: var(--text-accent); }
        
        /* ТЕРМИНАЛ - САМОЕ ВАЖНОЕ */
        #debugTerminal {
            flex-grow: 1;
            background: #050505;
            color: #aaa;
            font-size: 11px;
            padding: 10px;
            overflow-y: auto;
            border: 1px solid #222;
            margin: 5px;
            white-space: pre-wrap;
        }
        .tx { color: #00ff00; } /* Отправка */
        .rx { color: #ffffff; font-weight: bold; } /* Ответ */
        .err { color: #ff4500; } /* Ошибки */
        
        button { background: #111; color: #0f0; border: 1px solid #0f0; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<header>
    <div id="status">STATUS: WAIT</div>
    <button id="connectBtn">АКТИВИРОВАТЬ USB</button>
</header>

<div class="grid">
    <div class="card"><div class="label">RPM</div><div class="val" id="rpmVal">0</div></div>
    <div class="card"><div class="label">SPEED</div><div class="val" id="speedVal">0</div></div>
    <div class="card"><div class="label">TEMP</div><div class="val" id="tempVal">--</div></div>
    <div class="card"><div class="label">FUEL</div><div class="val" id="fuelVal">--</div></div>
</div>

<div id="debugTerminal">Ожидание подключения...</div>

<script>
    let device;
    let isConnected = false;
    let buffer = '';
    let commandQueue = ['010C', '010D', '0105', '012F'];
    let cmdIdx = 0;

    const term = document.getElementById('debugTerminal');
    const statusEl = document.getElementById('status');

    function log(msg, type = '') {
        const time = new Date().toLocaleTimeString().split(' ')[0];
        const span = document.createElement('div');
        span.className = type;
        span.innerText = `[${time}] ${msg}`;
        term.appendChild(span);
        term.scrollTop = term.scrollHeight;
        
        // Ограничиваем лог, чтобы не тормозил
        if (term.childNodes.length > 100) term.removeChild(term.firstChild);
    }

    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            device = await navigator.usb.requestDevice({ 
                filters: [{ vendorId: 0x0403, productId: 0x6001 }] 
            });

            await device.open();
            if (device.configuration === null) await device.selectConfiguration(1);
            await device.claimInterface(0);

            // Настройка FTDI 38400
            await device.controlTransferOut({
                requestType: 'vendor', recipient: 'device',
                request: 0x03, value: 0x4138, index: 0x0000 
            });

            statusEl.innerText = "STATUS: CONNECTED";
            isConnected = true;
            document.getElementById('connectBtn').style.display = "none";

            log("USB подключен. Инициализация ELM...", "tx");
            startReading();
            
            // Последовательный запуск
            await sendOBD("ATZ"); // Сброс
            setTimeout(() => sendOBD("ATE0"), 1000); // Выкл эхо
            setTimeout(() => sendOBD("ATSP6"), 2000); // Протокол ISO 15765-4 (CAN)
            setTimeout(poll, 3000);

        } catch (err) {
            log("ОШИБКА USB: " + err.message, "err");
        }
    });

    async function sendOBD(cmd) {
        if (!isConnected) return;
        try {
            log("> " + cmd, "tx");
            const data = new TextEncoder().encode(cmd + '\r');
            await device.transferOut(2, data);
        } catch (e) { log("Ошибка отправки: " + e.message, "err"); }
    }

    async function startReading() {
        while (isConnected) {
            try {
                const result = await device.transferIn(1, 64);
                const text = new TextDecoder().decode(result.data);
                buffer += text;

                if (buffer.includes('>')) {
                    const rawResponse = buffer.replace('>', '').trim();
                    log("< " + rawResponse, "rx");
                    parseData(rawResponse);
                    buffer = '';
                }
            } catch (err) {
                log("Связь потеряна: " + err.message, "err");
                isConnected = false;
                break;
            }
        }
    }

    function poll() {
        if (!isConnected) return;
        sendOBD(commandQueue[cmdIdx]);
        cmdIdx = (cmdIdx + 1) % commandQueue.length;
        // Опрос раз в 800мс, чтобы не вешать адаптер
        setTimeout(poll, 800);
    }

    function parseData(hex) {
        const clean = hex.replace(/\s+/g, '');
        
        // RPM
        if (clean.includes('410C')) {
            let i = clean.indexOf('410C') + 4;
            let val = (parseInt(clean.substring(i, i+2), 16) * 256 + parseInt(clean.substring(i+2, i+4), 16)) / 4;
            document.getElementById('rpmVal').innerText = Math.round(val);
        }
        // SPEED
        if (clean.includes('410D')) {
            let i = clean.indexOf('410D') + 4;
            document.getElementById('speedVal').innerText = parseInt(clean.substring(i, i+2), 16);
        }
        // TEMP
        if (clean.includes('4105')) {
            let i = clean.indexOf('4105') + 4;
            document.getElementById('tempVal').innerText = parseInt(clean.substring(i, i+2), 16) - 40;
        }
    }
</script>
</body>
</html>
