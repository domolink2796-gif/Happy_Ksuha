<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT: Digital Dashboard</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #00ff00;
            --text-accent: #00bfff;
            --text-warn: #ff4500;
            --text-dim: #222;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-color); color: var(--text-main); 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid var(--text-dim); }
        #status { color: var(--text-accent); font-size: 12px; }
        #connectBtn {
            background: #111; color: var(--text-main); border: 2px solid var(--text-main);
            padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; font-size: 18px;
            box-shadow: 0 0 15px var(--text-main);
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; flex-grow: 1; }
        .card { border: 1px solid var(--text-dim); border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .card-full { grid-column: span 2; }
        .title { font-size: 11px; color: var(--text-accent); position: absolute; top: 5px; text-transform: uppercase; }
        .value { font-size: 12vw; font-weight: bold; }
        .unit { font-size: 14px; color: #555; }
        #debugLog { height: 60px; background: #050505; color: #444; font-size: 10px; overflow-y: auto; padding: 5px; border-top: 1px solid var(--text-dim); }
    </style>
</head>
<body>

<header id="headerBlock">
    <button id="connectBtn">АКТИВИРОВАТЬ USB ПАНЕЛЬ</button>
</header>

<div class="grid">
    <div class="card card-full">
        <div class="title">ТОПЛИВО</div>
        <div class="value" id="fuelVal">--</div>
        <div class="unit">ЛИТРОВ</div>
    </div>
    <div class="card">
        <div class="title">СКОРОСТЬ</div>
        <div class="value" id="speedVal">0</div>
        <div class="unit">КМ/Ч</div>
    </div>
    <div class="card">
        <div class="title">ОБОРОТЫ</div>
        <div class="value" id="rpmVal">0</div>
        <div class="unit">RPM</div>
    </div>
    <div class="card card-full">
        <div class="title">ПРОБЕГ (ЭБУ)</div>
        <div class="value" id="odoVal" style="font-size: 8vw;">------</div>
        <div class="unit">КМ</div>
    </div>
</div>

<div id="debugLog">Ожидание нажатия кнопки...</div>

<script>
    let device;
    let isConnected = false;
    let buffer = "";
    const TANK_MAX = 45;

    const log = (msg) => {
        const d = document.getElementById('debugLog');
        d.innerText = msg + "\n" + d.innerText;
    };

    // ТОТ САМЫЙ МЕТОД ВЫЗОВА ИЗ ТВОЕГО ФАЙЛА
    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            log("Запрашиваю устройство...");
            device = await navigator.usb.requestDevice({ 
                filters: [{ vendorId: 0x0403, productId: 0x6001 }] 
            });

            await device.open();
            if (device.configuration === null) await device.selectConfiguration(1);
            await device.claimInterface(0);

            // Настройка FTDI чипа
            await device.controlTransferOut({
                requestType: 'vendor', recipient: 'device',
                request: 0x00, value: 0x01, index: 0x00
            });
            await device.controlTransferOut({
                requestType: 'vendor', recipient: 'device',
                request: 0x03, value: 0x4138, index: 0x0000 
            });

            log("ПОДКЛЮЧЕНО К: " + device.productName);
            document.getElementById('headerBlock').style.display = "none";
            isConnected = true;

            readLoop();

            // Инициализация ELM327
            setTimeout(() => send("ATZ"), 500);
            setTimeout(() => send("ATE0"), 1000);
            setTimeout(() => send("ATSP0"), 1500);
            
            // Цикл опроса
            setInterval(() => {
                if (isConnected) {
                    send("010C"); // Обороты
                    setTimeout(() => send("010D"), 200); // Скорость
                    setTimeout(() => send("012F"), 400); // Бак
                }
            }, 1000);

        } catch (err) {
            log("ОШИБКА: " + err.message);
        }
    });

    async function send(cmd) {
        if (!isConnected) return;
        const data = new TextEncoder().encode(cmd + "\r");
        await device.transferOut(2, data);
    }

    async function readLoop() {
        const decoder = new TextDecoder();
        while (isConnected) {
            try {
                const result = await device.transferIn(1, 64);
                if (result.data.byteLength > 2) {
                    const actualData = new Uint8Array(result.data.buffer, 2);
                    buffer += decoder.decode(actualData);
                    
                    if (buffer.includes(">")) {
                        parse(buffer.toUpperCase());
                        buffer = "";
                    }
                }
            } catch (e) {
                isConnected = false;
                break;
            }
        }
    }

    function parse(data) {
        const clean = data.replace(/\s+/g, '');

        // ОБОРОТЫ
        if (clean.includes("410C")) {
            const idx = clean.indexOf("410C") + 4;
            const a = parseInt(clean.substring(idx, idx + 2), 16);
            const b = parseInt(clean.substring(idx + 2, idx + 4), 16);
            if (!isNaN(a)) document.getElementById('rpmVal').innerText = Math.round(((a * 256) + b) / 4);
        }

        // СКОРОСТЬ
        if (clean.includes("410D")) {
            const idx = clean.indexOf("410D") + 4;
            const speed = parseInt(clean.substring(idx, idx + 2), 16);
            if (!isNaN(speed)) document.getElementById('speedVal').innerText = speed;
        }

        // БАК
        if (clean.includes("412F")) {
            const idx = clean.indexOf("412F") + 4;
            const lvl = parseInt(clean.substring(idx, idx + 2), 16);
            if (!isNaN(lvl)) document.getElementById('fuelVal').innerText = ((lvl / 255) * TANK_MAX).toFixed(1);
        }
    }
</script>
</body>
</html>
