<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT: FINAL DASH</title>
    <style>
        :root { --bg: #000; --main: #0f0; --acc: #00bfff; --dim: #333; }
        body { background: var(--bg); color: var(--main); font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px; border-bottom: 1px solid var(--dim); }
        #connectBtn { width: 100%; padding: 20px; background: #111; color: var(--main); border: 2px solid var(--main); font-size: 18px; font-weight: bold; border-radius: 10px; box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; flex-grow: 1; }
        .card { border: 1px solid var(--dim); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .full { grid-column: span 2; }
        .label { font-size: 11px; color: var(--acc); position: absolute; top: 8px; text-transform: uppercase; }
        .val { font-size: 13vw; font-weight: bold; color: #fff; }
        #debug { height: 60px; font-size: 10px; color: #555; background: #050505; padding: 10px; border-top: 1px solid var(--dim); overflow-y: auto; }
    </style>
</head>
<body>

<header id="h">
    <button id="connectBtn">АКТИВИРОВАТЬ USB</button>
</header>

<div class="grid">
    <div class="card full">
        <div class="label">Остаток в баке (45L)</div>
        <div id="fuel" class="val">--</div>
    </div>
    <div class="card">
        <div class="label">Скорость</div>
        <div id="spd" class="val">0</div>
    </div>
    <div class="card">
        <div class="label">Расход</div>
        <div id="cons" class="val">0.0</div>
    </div>
    <div class="card">
        <div class="label">Пробег (ЭБУ)</div>
        <div id="odo" class="val" style="font-size: 6vw;">------</div>
    </div>
    <div class="card">
        <div class="label">Суточный</div>
        <div id="trip" class="val" style="font-size: 6vw;">0.0</div>
    </div>
</div>

<div id="debug">Лог системы: жду активации...</div>

<script>
    let dev, isConnected = false, buffer = "";
    let lastTime = Date.now(), tripDist = parseFloat(localStorage.getItem('tripDist')) || 0;
    
    const dbg = (m) => { const d = document.getElementById('debug'); d.innerText = m + "\n" + d.innerText; };
    document.getElementById('trip').innerText = tripDist.toFixed(1);

    document.getElementById('connectBtn').onclick = async () => {
        try {
            // Твой рабочий метод из "логика usb.html"
            dev = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403, productId: 0x6001 }] });
            await dev.open();
            await dev.selectConfiguration(1);
            await dev.claimInterface(0);

            // Настройка чипа FTDI (38400 бод)
            await dev.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: 0x4138, index: 0 });

            document.getElementById('h').style.display = "none";
            isConnected = true;
            dbg("СВЯЗЬ УСТАНОВЛЕНА");
            
            read();

            // Команды инициализации
            const cmds = ["ATZ", "ATE0", "ATSP0"];
            for (let c of cmds) {
                await send(c);
                await new Promise(r => setTimeout(r, 800));
            }

            // Опрос (Скорость, Расход, Бак, Одометр)
            setInterval(() => {
                if (isConnected) {
                    send("010D");
                    setTimeout(() => send("0110"), 300);
                    setTimeout(() => send("012F"), 600);
                    setTimeout(() => send("0131"), 900);
                }
            }, 1500);

        } catch (e) { dbg("ОШИБКА: " + e.message); }
    };

    async function send(c) {
        if (dev) await dev.transferOut(2, new TextEncoder().encode(c + "\r"));
    }

    async function read() {
        const dec = new TextDecoder();
        while (isConnected) {
            try {
                const res = await dev.transferIn(1, 64);
                if (res.data.byteLength > 2) {
                    // Отрезаем 2 байта мусора чипа FTDI
                    const actual = new Uint8Array(res.data.buffer, 2);
                    buffer += dec.decode(actual);
                    if (buffer.includes(">")) {
                        parse(buffer.toUpperCase());
                        buffer = "";
                    }
                }
            } catch (e) { isConnected = false; break; }
        }
    }

    function parse(s) {
        const c = s.replace(/\s+/g, '');
        dbg("DATA: " + c);
        
        if (c.includes("410D")) {
            const v = parseInt(c.substring(c.indexOf("410D")+4, c.indexOf("410D")+6), 16);
            if(!isNaN(v)) {
                document.getElementById('spd').innerText = v;
                let now = Date.now();
                tripDist += (v * (now - lastTime) / 3600000);
                localStorage.setItem('tripDist', tripDist);
                document.getElementById('trip').innerText = tripDist.toFixed(1);
                lastTime = now;
            }
        }
        if (c.includes("412F")) {
            const v = parseInt(c.substring(c.indexOf("412F")+4, c.indexOf("412F")+6), 16);
            if(!isNaN(v)) document.getElementById('fuel').innerText = ((v / 255) * 45).toFixed(1);
        }
        if (c.includes("4110")) {
            const v = parseInt(c.substring(c.indexOf("4110")+4, c.indexOf("4110")+8), 16);
            if(!isNaN(v)) document.getElementById('cons').innerText = (v / 100 * 0.335).toFixed(1);
        }
        if (c.includes("4131")) {
            const v = parseInt(c.substring(c.indexOf("4131")+4, c.indexOf("4131")+8), 16);
            if(!isNaN(v)) document.getElementById('odo').innerText = v;
        }
    }
</script>
</body>
</html>
