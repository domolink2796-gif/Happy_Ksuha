<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CONECT: RE-STYLING 2008 FUEL</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 10px; text-align: center; }
        .fuel-box { border: 4px solid #00bcff; padding: 25px; border-radius: 20px; background: #050505; margin: 15px 0; box-shadow: 0 0 20px rgba(0, 188, 255, 0.2); }
        .fuel-val { font-size: 6em; display: block; color: #00bcff; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { border: 1px solid #222; padding: 12px; border-radius: 10px; background: #080808; }
        .val { font-size: 2em; display: block; color: #0f0; }
        #log { height: 100px; overflow-y: auto; border: 1px solid #111; margin-top: 15px; font-size: 10px; text-align: left; padding: 8px; color: #555; }
        button { background: #00bcff; border: none; color: #000; padding: 20px; font-size: 1.2em; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <button id="connectBtn">ЗАПУСК: FORD 2008 RE-STYLING</button>

    <div class="fuel-box">
        <span style="color: #00bcff; font-size: 1em;">ОСТАТОК ТОПЛИВА</span>
        <span id="fuel" class="fuel-val">--</span>
        <span style="color: #00bcff; font-size: 1.5em;">LITERS</span>
    </div>

    <div class="grid">
        <div class="card">
            <span style="color:#666; font-size:0.7em;">ENGINE TEMP</span>
            <span id="temp" class="val">--</span>
        </div>
        <div class="card">
            <span style="color:#666; font-size:0.7em;">RPM LIVE</span>
            <span id="rpm" class="val">0</span>
        </div>
    </div>

    <div id="log">Ожидание 2008 RE-STYLING...</div>

    <script>
        const logDiv = document.getElementById('log');
        let device, isRunning = false;

        function log(msg) {
            logDiv.innerHTML += `> ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403 }] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                let divisor = Math.floor(3000000 / 38400);
                await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: divisor, index: 0 });

                log("РЕСТАЙЛИНГ ОБНАРУЖЕН...");
                await send("ATZ");
                await sleep(500);
                await send("ATE0");
                await send("ATSP6");
                await send("ATH0"); // Выключаем заголовки для скорости основных датчиков

                isRunning = true;
                mainLoop();
            } catch (err) { log("ОШИБКА: " + err); }
        });

        async function send(cmd, wait = 100) {
            try {
                await device.transferOut(2, new TextEncoder().encode(cmd + "\r"));
                await sleep(wait);
                let res = await device.transferIn(1, 128);
                return new TextDecoder().decode(res.data).replace(/\s/g, '');
            } catch (e) { return ""; }
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function mainLoop() {
            let cycle = 0;
            while (isRunning) {
                // 1. ПЛАВНЫЕ ОБОРОТЫ И ТЕМПЕРАТУРА
                let rRPM = await send("010C", 70);
                if (rRPM.includes("410C")) {
                    let idx = rRPM.indexOf("410C") + 4;
                    document.getElementById('rpm').innerText = Math.round(((parseInt(rRPM.substr(idx, 2), 16) * 256) + parseInt(rRPM.substr(idx + 2, 2), 16)) / 4);
                }

                let rTemp = await send("0105", 70);
                if (rTemp.includes("4105")) {
                    document.getElementById('temp').innerText = (parseInt(rTemp.substr(rTemp.indexOf("4105") + 4, 2), 16) - 40) + "°C";
                }

                // 2. БЕНЗИН (Спец-алгоритм для 2008 года)
                if (cycle % 6 === 0) {
                    // А: Пробуем расширенный Ford PID (самый точный для рестайла)
                    let rFuel = await send("221106", 150); 
                    if (rFuel.includes("621106")) {
                        let hex = rFuel.substr(rFuel.indexOf("621106") + 6, 2);
                        document.getElementById('fuel').innerText = Math.round(parseInt(hex, 16) / 2); // Обычно 0.5л на бит
                    } else {
                        // Б: Пробуем адрес приборки DE01
                        await send("ATSH720", 50);
                        let rFuel2 = await send("22DE01", 150);
                        if (rFuel2.includes("62DE01")) {
                            let hex2 = rFuel2.substr(rFuel2.indexOf("62DE01") + 6, 2);
                            document.getElementById('fuel').innerText = Math.round(parseInt(hex2, 16) * 45 / 255);
                        }
                        await send("ATSH7E0", 50); // Назад к мотору
                    }
                }

                cycle++;
                await sleep(20);
            }
        }
    </script>
</body>
</html>
