<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT: FIX PANEL</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #00ff00;
            --text-accent: #00bfff;
            --text-warn: #ff4500;
            --text-dim: #555555;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-color); color: var(--text-main); font-family: monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid var(--text-dim); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; flex-grow: 1; padding: 10px; gap: 10px; }
        .card { border: 1px solid var(--text-dim); border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 5px; }
        .card-full { grid-column: span 2; }
        .title { font-size: 12px; color: var(--text-accent); }
        .value { font-size: 8vw; font-weight: bold; }
        #logConsole { height: 150px; background: #050505; color: #888; font-size: 11px; padding: 8px; overflow-y: auto; border-top: 2px solid var(--text-dim); }
        button { background: #111; color: var(--text-main); border: 2px solid var(--text-main); padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div id="status">USB НЕ АКТИВИРОВАН</div>
    <button id="connectBtn">АКТИВИРОВАТЬ</button>
</header>

<div class="grid">
    <div class="card card-full">
        <div class="title">ТОПЛИВО</div>
        <div id="fuelVal" class="value">--</div>
    </div>
    <div class="card">
        <div class="title">ОБОРОТЫ</div>
        <div id="rpmVal" class="value">0</div>
    </div>
    <div class="card">
        <div class="title">ТЕМП.</div>
        <div id="tempVal" class="value">--</div>
    </div>
    <div class="card">
        <div class="title">СКОРОСТЬ</div>
        <div id="speedVal" class="value">0</div>
    </div>
    <div class="card">
        <div class="title">ОДОМЕТР</div>
        <div id="odoVal" class="value" style="font-size: 5vw;">------</div>
    </div>
</div>

<div id="logConsole">Инициализация...</div>

<script>
    const TANK_VOLUME = 45.0;
    let device, isConnected = false;
    let buffer = '';
    let commandQueue = ['010C', '0105', '010D', '012F', '22DD01']; 
    let cmdIndex = 0;

    const els = {
        status: document.getElementById('status'),
        log: document.getElementById('logConsole'),
        connectBtn: document.getElementById('connectBtn'),
        fuel: document.getElementById('fuelVal'),
        rpm: document.getElementById('rpmVal'),
        temp: document.getElementById('tempVal'),
        speed: document.getElementById('speedVal'),
        odo: document.getElementById('odoVal')
    };

    function writeLog(msg, color = '#888') {
        els.log.innerHTML += `<div><span style="color:${color}">${msg}</span></div>`;
        els.log.scrollTop = els.log.scrollHeight;
        if (els.log.childElementCount > 50) els.log.removeChild(els.log.firstChild);
    }

    els.connectBtn.addEventListener('click', async () => {
        try {
            device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403, productId: 0x6001 }] });
            await device.open();
            await device.selectConfiguration(1);
            await device.claimInterface(0);

            // Скорость порта 38400 для ELS27
            await device.controlTransferOut({
                requestType: 'vendor', recipient: 'device',
                request: 0x03, value: 0x4138, index: 0x0000 
            });

            isConnected = true;
            els.status.innerText = "ПОДКЛЮЧЕНО";
            els.connectBtn.style.display = "none";
            
            startReading();
            
            writeLog(">>> ИНИЦИАЛИЗАЦИЯ ШИНЫ FORD...", "#0ff");
            await sendOBD("ATZ"); await new Promise(r => setTimeout(r, 1000));
            await sendOBD("ATE0"); await new Promise(r => setTimeout(r, 500));
            await sendOBD("ATL0"); // Убираем перенос строк
            await sendOBD("ATSP6"); // ПРИНУДИТЕЛЬНО CAN (Ford)
            await new Promise(r => setTimeout(r, 500));
            await sendOBD("0100"); // Тестовый запрос протокола
            await new Promise(r => setTimeout(r, 1000));
            
            pollCycle();
        } catch (e) { writeLog("ОШИБКА: " + e.message, "red"); }
    });

    async function sendOBD(cmd) {
        if (!isConnected) return;
        writeLog("SEND: " + cmd, "#444");
        await device.transferOut(2, new TextEncoder().encode(cmd + '\r'));
    }

    async function startReading() {
        while (isConnected) {
            try {
                const result = await device.transferIn(1, 64);
                buffer += new TextDecoder().decode(result.data);
                if (buffer.includes('>')) {
                    let resp = buffer.replace('>', '').trim();
                    if(resp) {
                        writeLog("RESP: " + resp, "#0f0");
                        processData(resp);
                    }
                    buffer = '';
                }
            } catch (e) { isConnected = false; break; }
        }
    }

    function pollCycle() {
        if (!isConnected) return;
        sendOBD(commandQueue[cmdIndex]);
        cmdIndex = (cmdIndex + 1) % commandQueue.length;
        setTimeout(pollCycle, 600); // 600мс для стабильности
    }

    function processData(hex) {
        hex = hex.replace(/\s+/g, '').toUpperCase();
        if (hex.includes('CANERROR') || hex.includes('STOPPED')) {
            writeLog("ОШИБКА ШИНЫ. ПЕРЕПОДКЛЮЧЕНИЕ...", "orange");
            sendOBD("ATSP6");
            return;
        }

        // Обороты
        if (hex.includes('410C')) {
            let i = hex.indexOf('410C') + 4;
            els.rpm.innerText = Math.round((parseInt(hex.substr(i, 4), 16)) / 4);
        }
        // Температура
        if (hex.includes('4105')) {
            els.temp.innerText = parseInt(hex.substr(hex.indexOf('4105') + 4, 2), 16) - 40;
        }
        // Скорость
        if (hex.includes('410D')) {
            els.speed.innerText = parseInt(hex.substr(hex.indexOf('410D') + 4, 2), 16);
        }
        // Одометр Ford (22DD01 -> 62DD01)
        if (hex.includes('62DD01')) {
            let i = hex.indexOf('62DD01') + 6;
            els.odo.innerText = parseInt(hex.substr(i, 6), 16) + " KM";
        }
        // Бак
        if (hex.includes('412F')) {
            let level = parseInt(hex.substr(hex.indexOf('412F') + 4, 2), 16) / 255;
            els.fuel.innerText = (TANK_VOLUME * level).toFixed(1) + " L";
        }
    }
</script>
</body>
</html>
