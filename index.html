<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CONECT: TITANIUM FIX</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 10px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { border: 1px solid #333; padding: 15px; border-radius: 10px; background: #050505; }
        .val { font-size: 2.2em; display: block; color: #0f0; font-weight: bold; }
        .label { font-size: 0.8em; color: #00bcff; text-transform: uppercase; }
        #log { height: 120px; overflow-y: auto; border: 1px solid #222; margin-top: 15px; font-size: 10px; text-align: left; padding: 8px; color: #666; background: #080808; }
        button { background: #ff3c00; border: none; color: #fff; padding: 20px; font-size: 1.2em; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <button id="connectBtn">АКТИВИРОВАТЬ ТОЧНЫЙ ПРОБЕГ</button>

    <div class="grid" style="margin-top:15px">
        <div class="card" style="grid-column: span 2; border: 2px solid #0f0;">
            <span class="label">Реальный Одометр (км)</span>
            <span id="odo" class="val">КАЛИБРОВКА...</span>
        </div>
        <div class="card">
            <span class="label">Обороты</span>
            <span id="rpm" class="val">0</span>
        </div>
        <div class="card">
            <span class="label">Мотор</span>
            <span id="temp" class="val">--</span>
        </div>
    </div>

    <div id="log">Пакет получен, настраиваю декодер...</div>

    <script>
        const logDiv = document.getElementById('log');
        let device, isRunning = false;

        function log(msg) {
            logDiv.innerHTML += `> ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403 }] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                let divisor = Math.floor(3000000 / 38400);
                await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: divisor, index: 0 });

                log("СВЯЗЬ УСТАНОВЛЕНА. ФИЛЬТРАЦИЯ ДАННЫХ...");
                await send("ATZ");
                await send("ATE0");
                await send("ATH1");
                await send("ATSP6");
                
                isRunning = true;
                mainTask();
            } catch (err) { log("ОШИБКА: " + err); }
        });

        async function send(cmd, wait = 150) {
            try {
                await device.transferOut(2, new TextEncoder().encode(cmd + "\r"));
                await sleep(wait);
                let res = await device.transferIn(1, 128);
                return new TextDecoder().decode(res.data).replace(/\s/g, '');
            } catch (e) { return ""; }
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function mainTask() {
            while (isRunning) {
                // Читаем базу (Обороты и Температуру)
                let rRPM = await send("010C");
                if (rRPM.includes("410C")) {
                    let idx = rRPM.indexOf("410C") + 4;
                    let a = parseInt(rRPM.substr(idx, 2), 16);
                    let b = parseInt(rRPM.substr(idx + 2, 2), 16);
                    document.getElementById('rpm').innerText = Math.round(((a * 256) + b) / 4);
                }

                let rTemp = await send("0105");
                if (rTemp.includes("4105")) {
                    document.getElementById('temp').innerText = parseInt(rTemp.substr(rTemp.indexOf("4105") + 4, 2), 16) - 40 + "°C";
                }

                // КОРРЕКЦИЯ ОДОМЕТРА (Перехват с исправлением байтов)
                await send("ATSH727"); 
                let rOdo = await send("2204FE", 200);
                if (rOdo.includes("62")) {
                    let hex = rOdo.substr(rOdo.indexOf("62") + 6, 6);
                    // Пробуем инвертировать байты (иногда Ford шлет их задом наперед)
                    let b1 = hex.substr(0, 2);
                    let b2 = hex.substr(2, 2);
                    let b3 = hex.substr(4, 2);
                    
                    // Формула для Ford: (B1*65536 + B2*256 + B3) / 10
                    let val = (parseInt(b1, 16) * 65536) + (parseInt(b2, 16) * 256) + parseInt(b3, 16);
                    let km = Math.round(val / 10); 
                    
                    document.getElementById('odo').innerText = km.toLocaleString();
                    log("ДЕКОДИРОВАНО: " + km + " км");
                }
                await send("ATSH7E0");

                await sleep(300);
            }
        }
    </script>
</body>
</html>
