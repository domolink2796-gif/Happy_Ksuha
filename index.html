<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CONECT: DRIVE SCAN</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; padding: 10px; text-align: center; }
        .box { border: 4px solid #00ff41; padding: 25px; border-radius: 20px; background: #050505; margin: 15px 0; }
        #log { height: 250px; overflow-y: auto; border: 1px solid #222; margin-top: 15px; font-size: 12px; text-align: left; padding: 10px; color: #0f0; background: #000; }
        button { background: #00ff41; border: none; color: #000; padding: 20px; font-size: 1.1em; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase; }
        .status { font-size: 1.5em; color: #fff; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <button id="connectBtn">ПОДКЛЮЧИТЬ УСТРОЙСТВО (ПОИСК)</button>

    <div class="box">
        <span class="status" id="stat">ОЖИДАНИЕ</span>
        <span id="devName" style="color: #666;">Устройство не выбрано</span>
    </div>

    <div id="log">Лог инициализации...</div>

    <script>
        const logDiv = document.getElementById('log');
        let device;

        function log(msg) {
            logDiv.innerHTML += `> ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            log("Запуск поиска всех USB устройств...");
            try {
                // В автомобильном файле стоял фильтр 0x0403
                // Здесь мы убираем фильтры полностью, чтобы увидеть диск
                device = await navigator.usb.requestDevice({ filters: [] });
                
                document.getElementById('devName').innerText = device.productName || "Unknown Device";
                document.getElementById('stat').innerText = "НАЙДЕНО";
                document.getElementById('stat').style.color = "#00ff41";

                log("Попытка открытия сессии...");
                await device.open();
                
                log("Выбор конфигурации...");
                await device.selectConfiguration(1);
                
                log("Захват интерфейса...");
                await device.claimInterface(0);

                log("УСПЕХ: Прямой доступ к железу диска получен.");
                log("Vendor ID: " + device.vendorId);
                log("Product ID: " + device.productId);
                
            } catch (err) { 
                log("ОШИБКА: " + err); 
                document.getElementById('stat').innerText = "ОШИБКА";
                document.getElementById('stat').style.color = "#ff0000";
            }
        });
    </script>
</body>
</html>
