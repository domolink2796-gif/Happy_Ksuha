<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT: Digital Dashboard</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #00ff00;
            --text-accent: #00bfff;
            --text-warn: #ff4500;
            --text-dim: #555555;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 2px solid var(--text-dim);
        }
        button {
            background-color: #111;
            color: var(--text-main);
            border: 2px solid var(--text-main);
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
        button:active { background-color: var(--text-main); color: black; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto auto;
            flex-grow: 1;
            padding: 10px;
            gap: 10px;
        }
        .card {
            border: 2px solid var(--text-dim);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .card-full { grid-column: span 2; }
        .title { font-size: 14px; color: var(--text-accent); text-transform: uppercase; }
        .value { font-size: 10vw; font-weight: bold; line-height: 1.1; }
        .unit { font-size: 16px; color: var(--text-dim); }
        #status { color: var(--text-warn); font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div id="status">USB НЕ АКТИВИРОВАН</div>
    <button id="connectBtn">АКТИВИРОВАТЬ USB</button>
</header>

<div class="grid">
    <div class="card card-full">
        <div class="title">Остаток в баке (45L MAX)</div>
        <div class="value" id="fuelVal">--</div>
        <div class="unit">ЛИТРОВ</div>
    </div>

    <div class="card">
        <div class="title">Скорость</div>
        <div class="value" style="color: var(--text-main);" id="speedVal">0</div>
        <div class="unit">КМ/Ч</div>
    </div>

    <div class="card">
        <div class="title">Обороты</div>
        <div class="value" id="rpmVal">0</div>
        <div class="unit">RPM</div>
    </div>

    <div class="card">
        <div class="title">Пробег (ЭБУ)</div>
        <div class="value" style="font-size: 6vw;" id="odoVal">------</div>
        <div class="unit">КМ</div>
    </div>

    <div class="card">
        <div class="title">Суточный пробег</div>
        <div class="value" style="font-size: 6vw;" id="tripVal">0.0</div>
        <div class="unit">КМ</div>
        <button id="resetTripBtn" style="margin-top: 5px; padding: 5px 10px; font-size: 12px;">СБРОС</button>
    </div>
</div>

<script>
    const TANK_VOLUME = 45.0;
    let device;
    let isConnected = false;
    let buffer = '';
    let tripDistance = parseFloat(localStorage.getItem('tripDistance')) || 0.0;
    let lastTime = Date.now();

    const els = {
        status: document.getElementById('status'),
        connectBtn: document.getElementById('connectBtn'),
        fuel: document.getElementById('fuelVal'),
        speed: document.getElementById('speedVal'),
        rpm: document.getElementById('rpmVal'),
        odo: document.getElementById('odoVal'),
        trip: document.getElementById('tripVal')
    };

    els.trip.innerText = tripDistance.toFixed(1);

    // ПОДКЛЮЧЕНИЕ: Твоя рабочая логика из "логика usb.html"
    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            // Прямой запрос к твоему чипу FTDI
            device = await navigator.usb.requestDevice({ 
                filters: [{ vendorId: 0x0403, productId: 0x6001 }] 
            });

            await device.open();
            if (device.configuration === null) await device.selectConfiguration(1);
            await device.claimInterface(0);

            // Настройка FTDI чипа (38400 бод)
            await device.controlTransferOut({
                requestType: 'vendor', recipient: 'device',
                request: 0x03, value: 0x4138, index: 0x0000 
            });

            els.status.innerText = "ПОДКЛЮЧЕНО: " + device.productName;
            els.status.style.color = "var(--text-main)";
            els.connectBtn.style.display = "none";
            isConnected = true;

            startReading();
            
            // Инициализация адаптера ELM
            setTimeout(() => sendOBD("ATZ"), 500);
            setTimeout(() => sendOBD("ATE0"), 1000);
            setTimeout(() => sendOBD("ATSP0"), 1500);

            // Цикл опроса (Обороты, Скорость, Бак)
            setInterval(() => {
                if(isConnected) {
                    sendOBD("010C"); // Обороты
                    setTimeout(() => sendOBD("010D"), 200); // Скорость
                    setTimeout(() => sendOBD("012F"), 400); // Бак
                }
            }, 1000);

        } catch (err) {
            els.status.innerText = "ОШИБКА: " + err.message;
        }
    });

    async function sendOBD(cmd) {
        if (!isConnected) return;
        try {
            await device.transferOut(2, new TextEncoder().encode(cmd + '\r'));
        } catch(e) { isConnected = false; }
    }

    async function startReading() {
        const decoder = new TextDecoder();
        while (isConnected) {
            try {
                const result = await device.transferIn(1, 64);
                if (result.data.byteLength > 2) {
                    // Отрезаем 2 сервисных байта FTDI
                    const actualData = new Uint8Array(result.data.buffer, 2);
                    buffer += decoder.decode(actualData);

                    if (buffer.includes('>')) {
                        processResponse(buffer.toUpperCase());
                        buffer = '';
                    }
                }
            } catch (err) {
                isConnected = false;
                break;
            }
        }
    }

    function processResponse(data) {
        let clean = data.replace(/\s+/g, '');
        
        // ОБОРОТЫ
        if (clean.includes('410C')) {
            let idx = clean.indexOf('410C') + 4;
            let a = parseInt(clean.substring(idx, idx + 2), 16);
            let b = parseInt(clean.substring(idx + 2, idx + 4), 16);
            els.rpm.innerText = Math.round(((a * 256) + b) / 4);
        }
        
        // СКОРОСТЬ
        if (clean.includes('410D')) {
            let idx = clean.indexOf('410D') + 4;
            let speed = parseInt(clean.substring(idx, idx + 2), 16);
            els.speed.innerText = speed;
            
            // Расчет суточного пробега
            let now = Date.now();
            let hours = (now - lastTime) / 3600000;
            tripDistance += (speed * hours);
            localStorage.setItem('tripDistance', tripDistance);
            els.trip.innerText = tripDistance.toFixed(1);
            lastTime = now;
        }

        // БАК
        if (clean.includes('412F')) {
            let idx = clean.indexOf('412F') + 4;
            let level = parseInt(clean.substring(idx, idx + 2), 16) / 255;
            els.fuel.innerText = (TANK_VOLUME * level).toFixed(1);
        }
    }
</script>
</body>
</html>
