<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT: Digital Dashboard</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #00ff00;
            --text-accent: #00bfff;
            --text-warn: #ff4500;
            --text-dim: #222;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-color); color: var(--text-main); 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid var(--text-dim); }
        button { background: #111; color: var(--text-main); border: 2px solid var(--text-main); padding: 10px 20px; border-radius: 10px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; flex-grow: 1; }
        .card { border: 2px solid var(--text-dim); border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px; position: relative; }
        .card-full { grid-column: span 2; }
        .title { font-size: 12px; color: var(--text-accent); position: absolute; top: 5px; }
        .value { font-size: 10vw; font-weight: bold; }
        .unit { font-size: 14px; color: #555; }
        #debug { height: 60px; background: #050505; color: #444; font-size: 10px; overflow-y: auto; padding: 5px; border-top: 1px solid var(--text-dim); }
    </style>
</head>
<body>

<header>
    <div id="status" style="color: var(--text-warn)">USB ВЫКЛЮЧЕН</div>
    <button id="connectBtn">АКТИВИРОВАТЬ</button>
</header>

<div class="grid">
    <div class="card card-full">
        <div class="title">БАК (45L)</div>
        <div class="value" id="fuelVal">--</div>
        <div class="unit">ЛИТРОВ</div>
    </div>
    <div class="card">
        <div class="title">СКОРОСТЬ</div>
        <div class="value" id="speedVal">0</div>
        <div class="unit">КМ/Ч</div>
    </div>
    <div class="card">
        <div class="title">РАСХОД</div>
        <div class="value" id="consVal">0.0</div>
        <div class="unit" id="consUnit">Л/Ч</div>
    </div>
    <div class="card card-full">
        <div class="title">ОДОМЕТР (ЭБУ)</div>
        <div class="value" id="odoVal" style="font-size: 7vw;">------</div>
        <div class="unit">КМ</div>
    </div>
</div>

<div id="debug">Лог системы...</div>

<script>
    let device;
    let isConnected = false;
    let buffer = '';
    let cmdIndex = 0;
    const commands = ['010D', '0110', '012F', '0131'];

    const log = (msg) => { document.getElementById('debug').innerText = msg + "\n" + document.getElementById('debug').innerText; };

    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403, productId: 0x6001 }] });
            await device.open();
            if (device.configuration === null) await device.selectConfiguration(1);
            await device.claimInterface(0);

            // Настройка FTDI: Сброс и Скорость 38400
            await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x00, value: 0x01, index: 0x00 });
            await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: 0x4138, index: 0x0000 });

            document.getElementById('status').innerText = "ПОДКЛЮЧЕНО";
            document.getElementById('status').style.color = "var(--text-main)";
            document.getElementById('connectBtn').style.display = "none";
            isConnected = true;

            readLoop();
            
            // Инициализация ELM327
            setTimeout(() => send("ATZ"), 500);
            setTimeout(() => send("ATE0"), 1000);
            setTimeout(() => send("ATSP0"), 1500);
            setTimeout(poll, 2500);

        } catch (err) { log("Ошибка: " + err.message); }
    });

    async function send(cmd) {
        if (!isConnected) return;
        const data = new TextEncoder().encode(cmd + '\r');
        await device.transferOut(2, data);
    }

    async function readLoop() {
        const decoder = new TextDecoder();
        while (isConnected) {
            try {
                const result = await device.transferIn(1, 64);
                if (result.data.byteLength > 2) {
                    // Отрезаем 2 статусных байта FTDI
                    const actualData = new Uint8Array(result.data.buffer, 2);
                    buffer += decoder.decode(actualData);

                    if (buffer.includes('>')) {
                        log("< " + buffer.trim());
                        parse(buffer);
                        buffer = '';
                        setTimeout(poll, 100);
                    }
                }
            } catch (e) { isConnected = false; break; }
        }
    }

    function poll() {
        if (!isConnected) return;
        send(commands[cmdIndex]);
        cmdIndex = (cmdIndex + 1) % commands.length;
    }

    function parse(data) {
        const clean = data.replace(/\s+/g, '').toUpperCase();
        if (clean.includes('410D')) {
            const val = clean.substring(clean.indexOf('410D') + 4, clean.indexOf('410D') + 6);
            document.getElementById('speedVal').innerText = parseInt(val, 16);
        }
        if (clean.includes('4110')) {
            const val = clean.substring(clean.indexOf('4110') + 4, clean.indexOf('4110') + 8);
            const lph = (parseInt(val, 16) / 100) * 0.335;
            document.getElementById('consVal').innerText = lph.toFixed(1);
        }
        if (clean.includes('412F')) {
            const val = clean.substring(clean.indexOf('412F') + 4, clean.indexOf('412F') + 6);
            document.getElementById('fuelVal').innerText = ((parseInt(val, 16) / 255) * 45).toFixed(1);
        }
        if (clean.includes('4131')) {
            const val = clean.substring(clean.indexOf('4131') + 4, clean.indexOf('4131') + 8);
            document.getElementById('odoVal').innerText = parseInt(val, 16);
        }
    }
</script>
</body>
</html>
