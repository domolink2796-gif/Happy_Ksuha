<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT: TITAN ADMIN</title>
    <style>
        :root { 
            --gold: #ff9800; 
            --dark: #050505; 
            --gray: #121212; 
            --red: #ff3d00;
            --green: #00e676;
        }

        body { 
            background: var(--dark); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* --- Custom Modals --- */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(5px);
        }

        .modal-box {
            background: var(--gray);
            border: 2px solid var(--gold);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            width: 80%; max-width: 400px;
            box-shadow: 0 0 20px rgba(255, 152, 0, 0.3);
            transform: scale(0.8); transition: 0.3s;
        }

        .modal-box.active { transform: scale(1); }

        .modal-title { font-size: 1.5rem; color: var(--gold); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        .modal-text { font-size: 1.1rem; margin-bottom: 25px; line-height: 1.4; }

        .btn-modal {
            background: var(--gold); color: black; border: none;
            padding: 12px 30px; border-radius: 8px; font-weight: bold;
            text-transform: uppercase; cursor: pointer;
        }

        /* --- Auth Screen --- */
        #auth-screen {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .titan-logo {
            width: 100px; height: 100px; border: 3px solid var(--gold);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 50px; margin-bottom: 20px;
            box-shadow: 0 0 30px var(--gold);
            animation: breathe 3s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 50px var(--gold); }
        }

        /* --- Admin UI --- */
        .header { background: var(--gray); padding: 20px; border-bottom: 1px solid var(--gold); }
        .user-card {
            background: var(--gray); margin: 15px; padding: 15px;
            border-radius: 12px; border-left: 5px solid var(--gold);
        }

        .status-badge { padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .active { background: var(--green); color: black; }
        .blocked { background: var(--red); color: white; }

        .progress-container { width: 100%; background: #333; height: 8px; border-radius: 4px; margin-top: 10px; display: none; }
        .progress-bar { width: 0%; height: 100%; background: var(--gold); border-radius: 4px; transition: 0.2s; }
    </style>
</head>
<body>

<div id="modal-overlay">
    <div class="modal-box" id="modal-box">
        <div class="modal-title" id="modal-title">Система</div>
        <div class="modal-text" id="modal-text">Сообщение...</div>
        <div class="progress-container" id="modal-progress-cont">
            <div class="progress-bar" id="modal-progress-bar"></div>
        </div>
        <button class="btn-modal" onclick="closeModal()">Принято</button>
    </div>
</div>

<div id="auth-screen">
    <div class="titan-logo">🔑</div>
    <h1 style="color: var(--gold); letter-spacing: 5px;">TITAN GATE</h1>
    <p style="opacity: 0.6;">ОЖИДАНИЕ МАСТЕР-КЛЮЧА</p>
</div>

<div id="admin-content" style="display: none;">
    <div class="header">
        <h2>КОНТРОЛЛЕР X-CONECT</h2>
        <small id="active-uid" style="color: var(--gold)"></small>
    </div>

    <div style="padding: 15px;">
        <button class="btn-modal" style="width: 100%;" onclick="startScan()">➕ РЕГИСТРАЦИЯ НОВОЙ МЕТКИ</button>
    </div>

    <div id="users-list">
        </div>
</div>

<script>
    // Твой MASTER_KEY (Нормализуем сразу: убираем двоеточия и в верхний регистр)
    const MASTER_KEY = "04:77:56:4A:3E:12:90".replace(/:/g, '').toUpperCase();
    
    // Функция озвучки
    function speak(text) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'ru-RU';
        msg.rate = 0.9; 
        msg.pitch = 0.8; // Чуть ниже тон для серьезности
        window.speechSynthesis.speak(msg);
    }

    // Кастомный Alert
    function titanAlert(title, text, type = 'info', showProgress = false) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-text').innerText = text;
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('modal-box').classList.add('active');
        
        const prog = document.getElementById('modal-progress-cont');
        prog.style.display = showProgress ? 'block' : 'none';

        if (type === 'error') {
            document.getElementById('modal-box').style.borderColor = 'var(--red)';
            speak("Ошибка доступа");
        } else if (type === 'success') {
            document.getElementById('modal-box').style.borderColor = 'var(--green)';
            speak("Доступ разрешён");
        }
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('modal-box').classList.remove('active');
    }

    // Инициализация NFC
    async function initNfc() {
        if (!('NDEFReader' in window)) {
            titanAlert("ОШИБКА", "NFC не поддерживается этим браузером", "error");
            return;
        }

        try {
            const ndef = new NDEFReader();
            await ndef.scan();
            
            ndef.onreading = event => {
                const rawUid = event.serialNumber;
                const cleanUid = rawUid.replace(/:/g, '').toUpperCase();

                console.log("Считан UID:", cleanUid);

                if (cleanUid === MASTER_KEY) {
                    if (document.getElementById('auth-screen').style.display !== 'none') {
                        unlockAdmin(rawUid);
                    }
                } else {
                    titanAlert("ОТКАЗ", "Ключ " + rawUid + " не опознан в системе Титан", "error");
                }
            };
        } catch (e) {
            console.error(e);
        }
    }

    function unlockAdmin(uid) {
        titanAlert("АВТОРИЗАЦИЯ", "Добро пожаловать, Мастер", "success");
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        document.getElementById('active-uid').innerText = "Admin Session: " + uid;
        loadUsers();
        if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
    }

    async function loadUsers() {
        try {
            const res = await fetch('/x-api/admin/users', { 
                headers: { 'x-admin-key': "04:77:56:4A:3E:12:90" } 
            });
            const users = await res.json();
            const list = document.getElementById('users-list');
            list.innerHTML = '';

            users.forEach(u => {
                if(u.nfc_uid.replace(/:/g, '').toUpperCase() === MASTER_KEY) return;
                
                const card = document.createElement('div');
                card.className = 'user-card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <div>
                            <div style="font-weight:bold; font-size:1.2rem;">${u.nickname || 'Новый объект'}</div>
                            <div style="font-size:0.8rem; opacity:0.6;">${u.nfc_uid}</div>
                        </div>
                        <span class="status-badge ${u.is_blocked ? 'blocked' : 'active'}">
                            ${u.is_blocked ? 'BLOCK' : 'LIVE'}
                        </span>
                    </div>
                    <div style="margin-top:15px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <button onclick="toggleUser('${u.nfc_uid}', ${u.is_blocked?0:1})" 
                                style="background:#333; color:white; border:1px solid #555; padding:8px; border-radius:5px;">
                            ${u.is_blocked ? 'РАЗБЛОКИРОВАТЬ' : 'ЗАБЛОКИРОВАТЬ'}
                        </button>
                        <button onclick="resetDevice('${u.nfc_uid}')"
                                style="background:#333; color:white; border:1px solid #555; padding:8px; border-radius:5px;">
                            СБРОС ТЕЛА
                        </button>
                    </div>
                `;
                list.appendChild(card);
            });
        } catch (e) { console.error("Ошибка загрузки базы"); }
    }

    async function startScan() {
        titanAlert("СКАНЕР", "Приложите новую метку NTAG215 для регистрации...", "info", true);
        const bar = document.getElementById('modal-progress-bar');
        bar.style.width = '0%';
        
        // Тут логика сканирования новой метки (аналогично старой версии)
        // После считывания делаем bar.style.width = '100%' и шлем fetch
    }

    window.onload = initNfc;
</script>

</body>
</html>
