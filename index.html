<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CONECT: DIAGNOSTIC MODE</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 10px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .card { border: 1px solid #333; padding: 10px; border-radius: 8px; background: #050505; }
        .val { font-size: 1.8em; display: block; color: #0f0; font-weight: bold; }
        .label { font-size: 0.7em; color: #00bcff; text-transform: uppercase; }
        #log { height: 250px; overflow-y: auto; border: 1px solid #444; margin-top: 15px; font-size: 11px; text-align: left; padding: 10px; color: #0f0; background: #050805; line-height: 1.4; }
        .log-in { color: #aaa; } .log-out { color: #00ff00; font-weight: bold; } .log-err { color: #ff3c00; }
        button { background: #0f0; border: none; color: #000; padding: 15px; font-size: 1em; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        .full-width { grid-column: span 2; }
    </style>
</head>
<body>

    <h2 style="color: #ff3c00; margin: 5px;">X-CONECT DIAGNOSTIC</h2>
    <button id="connectBtn">ЗАПУСТИТЬ МОНИТОР ШИНЫ</button>

    <div class="grid">
        <div class="card full-width">
            <span class="label">Одометр</span>
            <span id="odo" class="val">--- ---</span>
        </div>
        <div class="card"><span class="label">Бензин</span><span id="fuel" class="val">--</span></div>
        <div class="card"><span class="label">Мотор</span><span id="temp" class="val">--</span></div>
        <div class="card"><span class="label">Скорость</span><span id="speed" class="val">0</span></div>
        <div class="card"><span class="label">Обороты</span><span id="rpm" class="val">0</span></div>
    </div>

    <div id="log">Ожидание подключения...</div>

    <script>
        const logDiv = document.getElementById('log');
        let device;
        let isRunning = false;

        function log(msg, type = '') {
            const span = document.createElement('div');
            if (type === 'in') span.className = 'log-in';
            if (type === 'out') span.className = 'log-out';
            if (type === 'err') span.className = 'log-err';
            span.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(span);
            if (logDiv.childNodes.length > 50) logDiv.removeChild(logDiv.firstChild);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403 }] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                let divisor = Math.floor(3000000 / 38400);
                await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: divisor, index: 0 });

                log("ПОДКЛЮЧЕНО. СБРОС АДАПТЕРА...");
                await talk("ATZ");
                await talk("ATE0");
                await talk("ATSP6"); 
                await talk("ATH1");
                
                isRunning = true;
                mainLoop();
            } catch (err) { log("ОШИБКА USB: " + err, 'err'); }
        });

        async function talk(cmd) {
            try {
                log(`SEND: ${cmd}`, 'in');
                await device.transferOut(2, new TextEncoder().encode(cmd + "\r"));
                await sleep(200);
                let res = await device.transferIn(1, 128);
                let text = new TextDecoder().decode(res.data).replace(/\s/g, '').replace(/>/g, '');
                log(`RECV: ${text || 'EMPTY'}`, 'out');
                return text;
            } catch (e) { 
                log(`FAIL: ${cmd}`, 'err');
                return ""; 
            }
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function mainLoop() {
            let step = 0;
            while (isRunning) {
                // ПРИОРИТЕТ 1: Скорость и Обороты
                let rRPM = await talk("010C");
                if (rRPM.includes("410C")) {
                    let a = parseInt(rRPM.substr(rRPM.indexOf("410C")+4, 2), 16);
                    let b = parseInt(rRPM.substr(rRPM.indexOf("410C")+6, 2), 16);
                    document.getElementById('rpm').innerText = Math.round(((a * 256) + b) / 4);
                }

                let rSpeed = await talk("010D");
                if (rSpeed.includes("410D")) {
                    document.getElementById('speed').innerText = parseInt(rSpeed.substr(rSpeed.indexOf("410D")+4, 2), 16);
                }

                // ПРИОРИТЕТ 2: Диагностика проблемных зон
                if (step % 5 === 0) {
                    // Проверка Одометра (Перебор)
                    let odoRes = await talk("2204FE");
                    if (!odoRes.includes("62")) odoRes = await talk("22DD01");
                    if (!odoRes.includes("62")) odoRes = await talk("0131"); // Еще один стандартный PID

                    if (odoRes.includes("62") || odoRes.includes("4131")) {
                        let hex = odoRes.match(/[0-9A-F]{6,8}/);
                        if (hex) document.getElementById('odo').innerText = parseInt(hex[0], 16).toLocaleString();
                    }

                    // Проверка Топлива (Перебор)
                    let fuelRes = await talk("220461");
                    if (!fuelRes.includes("62")) fuelRes = await talk("220506");
                    if (!fuelRes.includes("62")) fuelRes = await talk("012F");

                    if (fuelRes.includes("62") || fuelRes.includes("412F")) {
                        let fHex = fuelRes.substr(fuelRes.length - 2, 2);
                        let fVal = parseInt(fHex, 16);
                        document.getElementById('fuel').innerText = Math.round((fVal * 45) / 255);
                    }
                }

                step++;
                await sleep(100);
            }
        }
    </script>
</body>
</html>
