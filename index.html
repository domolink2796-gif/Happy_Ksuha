<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CONECT: FORD MOBILE</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 10px; text-align: center; overflow-x: hidden; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .card { border: 1px solid #333; padding: 15px; border-radius: 10px; background: #050505; box-shadow: 0 0 10px rgba(0,255,0,0.1); }
        .val { font-size: 2.2em; display: block; color: #0f0; font-weight: bold; }
        .label { font-size: 0.75em; color: #00bcff; text-transform: uppercase; letter-spacing: 1px; }
        #log { height: 120px; overflow-y: auto; border: 1px solid #222; margin-top: 15px; font-size: 11px; text-align: left; padding: 8px; color: #888; background: #0a0a0a; }
        button { background: linear-gradient(145deg, #00ff00, #008800); border: none; color: #000; padding: 20px; font-size: 1.2em; border-radius: 15px; cursor: pointer; width: 100%; font-weight: bold; box-shadow: 0 4px 15px rgba(0,255,0,0.3); }
        button:active { transform: scale(0.98); background: #00ff00; }
        .full-width { grid-column: span 2; }
    </style>
</head>
<body>

    <button id="connectBtn">ПОДКЛЮЧИТЬ FORD USB</button>

    <div class="grid">
        <div class="card">
            <span class="label">Обороты</span>
            <span id="rpm" class="val">0</span>
        </div>

        <div class="card">
            <span class="label">Температура</span>
            <span id="temp" class="val">--</span>
        </div>

        <div class="card">
            <span class="label">Бензин (Л)</span>
            <span id="fuel" class="val">--</span>
        </div>

        <div class="card">
            <span class="label">Скорость</span>
            <span id="speed" class="val">0</span>
        </div>

        <div class="card full-width">
            <span class="label">Общий пробег</span>
            <span id="odo" class="val">---</span>
        </div>
    </div>

    <div id="log">Ожидание активации...</div>

    <script>
        const logDiv = document.getElementById('log');
        let device;
        const sleep = ms => new Promise(res => setTimeout(res, ms));

        function log(msg) {
            logDiv.innerHTML += `> ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403, productId: 0x6001 }] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);

                await device.controlTransferOut({
                    requestType: 'vendor', recipient: 'device',
                    request: 0x03, value: 0x4138, index: 0
                });

                log("ПОДКЛЮЧЕНО");
                await sendCommand("ATZ");
                await sleep(500);
                await sendCommand("ATE0");
                await sendCommand("ATSP0"); // Оставляю как было в твоем файле
                
                log("ОПРОС ЗАПУЩЕН");
                startPolling();
            } catch (err) {
                log("ОШИБКА: " + err);
            }
        });

        async function sendCommand(cmd) {
            try {
                await device.transferOut(2, new TextEncoder().encode(cmd + "\r"));
                await sleep(200); // Твоя рабочая задержка
                let result = await device.transferIn(1, 64);
                return new TextDecoder().decode(result.data);
            } catch (e) {
                return "";
            }
        }

        function startPolling() {
            setInterval(async () => {
                // Твои рабочие команды
                let resRPM = await sendCommand("010C");
                parseRPM(resRPM);

                let resTemp = await sendCommand("0105");
                parseData(resTemp, "4105", 'temp', 1, -40);

                // Добавленные команды
                let resSpeed = await sendCommand("010D");
                parseData(resSpeed, "410D", 'speed', 1);

                let resFuel = await sendCommand("012F");
                parseFuel(resFuel);

                let resOdo = await sendCommand("0131");
                parseOdo(resOdo);

            }, 1000);
        }

        // Твои рабочие функции парсинга
        function parseData(hex, pid, elementId, byteCount, offset = 0) {
            let clean = hex.replace(/\s/g, '');
            let index = clean.indexOf(pid);
            if (index !== -1) {
                let val = parseInt(clean.substr(index + 4, 2 * byteCount), 16) + offset;
                document.getElementById(elementId).innerText = val;
            }
        }

        function parseRPM(hex) {
            let clean = hex.replace(/\s/g, '');
            let index = clean.indexOf("410C");
            if (index !== -1) {
                let a = parseInt(clean.substr(index + 4, 2), 16);
                let b = parseInt(clean.substr(index + 6, 2), 16);
                let rpm = Math.round(((a * 256) + b) / 4);
                document.getElementById('rpm').innerText = rpm;
            }
        }

        // Добавленные функции парсинга
        function parseFuel(hex) {
            let clean = hex.replace(/\s/g, '');
            let index = clean.indexOf("412F");
            if (index !== -1) {
                let raw = parseInt(clean.substr(index + 4, 2), 16);
                let liters = Math.round((raw / 255) * 45); // Расчет на 45 литров
                document.getElementById('fuel').innerText = liters;
            }
        }

        function parseOdo(hex) {
            let clean = hex.replace(/\s/g, '');
            let index = clean.indexOf("4131");
            if (index !== -1) {
                let a = parseInt(clean.substr(index + 4, 2), 16);
                let b = parseInt(clean.substr(index + 6, 2), 16);
                document.getElementById('odo').innerText = (a * 256) + b;
            }
        }
    </script>
</body>
</html>
