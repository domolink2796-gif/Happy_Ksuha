<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CONECT: ODO EXTRACTOR</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 10px; text-align: center; }
        .card { border: 2px solid #0f0; padding: 30px; border-radius: 15px; background: #050505; margin: 20px 0; }
        .val { font-size: 3.5em; display: block; color: #0f0; font-weight: bold; text-shadow: 0 0 20px #0f0; }
        .label { font-size: 1.2em; color: #00bcff; text-transform: uppercase; }
        #log { height: 200px; overflow-y: auto; border: 1px solid #222; font-size: 11px; text-align: left; padding: 10px; color: #888; background: #0a0a0a; }
        button { background: #ff3c00; border: none; color: #fff; padding: 20px; font-size: 1.2em; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="color: #0f0; margin: 10px;">FORD ODO SCANNER</h2>
    <button id="connectBtn">НАЙТИ РЕАЛЬНЫЙ ПРОБЕГ</button>

    <div class="card">
        <span class="label">Реальный пробег (км)</span>
        <span id="odo" class="val">ПОИСК...</span>
    </div>

    <div id="log">Подключите ELS27 и включите зажигание...</div>

    <script>
        const logDiv = document.getElementById('log');
        let device;
        let isRunning = false;

        function log(msg) {
            logDiv.innerHTML += `> ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403 }] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                // Настройка чипа STN
                let divisor = Math.floor(3000000 / 38400);
                await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: divisor, index: 0 });

                log("ELS27 НАЙДЕН. ВЗЛОМ ОДОМЕТРА...");
                await send("ATZ");
                await sleep(500);
                await send("ATE0");
                await send("ATH1");
                
                isRunning = true;
                extractOdo();
            } catch (err) { log("ОШИБКА: " + err); }
        });

        async function send(cmd, wait = 300) {
            try {
                await device.transferOut(2, new TextEncoder().encode(cmd + "\r"));
                await sleep(wait);
                let res = await device.transferIn(1, 128);
                let text = new TextDecoder().decode(res.data).replace(/\s/g, '').replace(/>/g, '');
                return text;
            } catch (e) { return ""; }
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function extractOdo() {
            // Перебор всех возможных способов хранения пробега в Ford
            const commands = [
                {at: "ATSP6", sh: "ATSH720", req: "22DD01"}, // Приборка на основной шине
                {at: "ATSPB", sh: "ATSH720", req: "22DD01"}, // Приборка на MS-CAN (125k)
                {at: "ATSP6", sh: "ATSH7E0", req: "2204FE"}, // Мозги двигателя
                {at: "ATSPB", sh: "ATSH727", req: "22DD01"}  // Альтернативная приборка
            ];

            while (isRunning) {
                for (let c of commands) {
                    log(`ПРОБУЕМ: ${c.at} -> ${c.sh}...`);
                    await send(c.at);
                    await send(c.sh);
                    let res = await send(c.req, 500);

                    if (res.includes("62")) {
                        log("ДАННЫЕ ПОЛУЧЕНЫ!");
                        let hex = "";
                        if (res.includes("62DD01")) hex = res.substr(res.indexOf("62DD01") + 6, 6);
                        else if (res.includes("6204FE")) hex = res.substr(res.indexOf("6204FE") + 6, 6);

                        if (hex.length === 6) {
                            let km = parseInt(hex, 16);
                            if (km > 1000) {
                                document.getElementById('odo').innerText = km.toLocaleString();
                                log(`УСПЕХ: ${km} км`);
                                // Если нашли, останавливаемся на этом методе
                                continue; 
                            }
                        }
                    }
                }
                await sleep(1000);
            }
        }
    </script>
</body>
</html>
