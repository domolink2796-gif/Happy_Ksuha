<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Телеметрии</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .dashboard {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            text-align: center;
            width: 80%;
            max-width: 400px;
        }
        .rpm-display {
            font-size: 80px;
            font-weight: bold;
            color: #00ff88;
            margin: 20px 0;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        .label {
            font-size: 20px;
            color: #888;
            letter-spacing: 2px;
        }
        button {
            background: #00ff88;
            color: #121212;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover {
            background: #00cc6a;
        }
        #status {
            margin-top: 15px;
            font-size: 14px;
            color: #ff4444;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="label">ОБОРОТЫ ДВИГАТЕЛЯ</div>
        <div class="rpm-display" id="rpmValue">---</div>
        <div class="label">RPM</div>
        
        <button id="connectBtn">ПОДКЛЮЧИТЬ USB</button>
        <div id="status">Отключено</div>
    </div>

    <script>
        let port;
        let reader;
        let keepReading = true;

        const connectBtn = document.getElementById('connectBtn');
        const rpmValue = document.getElementById('rpmValue');
        const statusText = document.getElementById('status');

        connectBtn.addEventListener('click', async () => {
            try {
                // Запрашиваем доступ к USB порту
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });

                statusText.style.color = '#00ff88';
                statusText.textContent = 'Подключено. Ожидание данных...';
                connectBtn.style.display = 'none';

                keepReading = true;
                readLoop();
            } catch (err) {
                statusText.textContent = 'Ошибка подключения: ' + err.message;
            }
        });

        async function readLoop() {
            const textDecoder = new TextDecoderStream();
            const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
            reader = textDecoder.readable.getReader();

            let buffer = '';

            try {
                while (keepReading) {
                    const { value, done } = await reader.read();
                    if (done) {
                        break;
                    }
                    
                    buffer += value;
                    let lines = buffer.split('\n');
                    
                    // Оставляем последний незаконченный фрагмент в буфере
                    buffer = lines.pop(); 

                    for (let line of lines) {
                        line = line.trim();
                        if (line.startsWith('RPM:')) {
                            // Вытаскиваем цифры и обновляем экран
                            const rpm = line.split(':')[1];
                            rpmValue.textContent = rpm;
                        }
                    }
                }
            } catch (error) {
                statusText.style.color = '#ff4444';
                statusText.textContent = 'Обрыв связи.';
            } finally {
                reader.releaseLock();
            }
        }
    </script>
</body>
</html>
