<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CONECT: USB ACTIVATE</title>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #mainBtn { 
            width: 80%; height: 100px; background: #111; color: #0f0; 
            border: 3px solid #0f0; font-size: 20px; font-weight: bold; 
            box-shadow: 0 0 20px #0f0; border-radius: 15px;
        }
        #mainBtn:active { background: #0f0; color: #000; }
        #log { margin-top: 20px; font-size: 14px; text-align: center; color: #888; padding: 10px; }
    </style>
</head>
<body>

    <button id="mainBtn">АКТИВИРОВАТЬ USB</button>
    <div id="log">Нажми на кнопку, чтобы вызвать запрос системы</div>

<script>
    const btn = document.getElementById('mainBtn');
    const log = document.getElementById('log');

    btn.addEventListener('click', async () => {
        log.innerText = "Запрашиваю доступ...";
        
        try {
            // Прямой запрос к твоему чипу FTDI (из скриншота)
            const device = await navigator.usb.requestDevice({ 
                filters: [{ vendorId: 0x0403, productId: 0x6001 }] 
            });

            log.style.color = "#0ff";
            log.innerText = "УСТРОЙСТВО ВЫБРАНО: " + device.productName;
            alert("ЕСТЬ! Система дала добро. Теперь можно подключать логику.");
            
        } catch (err) {
            console.error(err);
            log.style.color = "#f00";
            log.innerText = "ОШИБКА: " + err.message;
            
            if (err.name === 'SecurityError') {
                alert("Браузер заблокировал вызов. Проверь, что зашел через HTTPS!");
            } else if (err.name === 'NotFoundError') {
                alert("Список пуст. Попробуй переткнуть кабель и нажать снова.");
            }
        }
    });

    // Проверка поддержки
    if (!navigator.usb) {
        log.innerText = "Твой браузер вообще не поддерживает USB. Нужен Chrome!";
        btn.disabled = true;
    }
</script>
</body>
</html>
