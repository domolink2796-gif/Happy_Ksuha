<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT: Digital Dashboard</title>
    <style>
        :root { --bg-color: #000; --text-main: #0f0; --text-accent: #00bfff; --text-dim: #555; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-color); color: var(--text-main); font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 2px solid var(--text-dim); }
        button { background: #111; color: var(--text-main); border: 2px solid var(--text-main); padding: 10px 20px; font-weight: bold; border-radius: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; flex-grow: 1; }
        .card { border: 1px solid var(--text-dim); border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; position: relative; }
        .card-full { grid-column: span 2; }
        .title { font-size: 12px; color: var(--text-accent); position: absolute; top: 8px; left: 10px; }
        .value { font-size: 12vw; font-weight: bold; }
        #console { height: 60px; background: #050505; color: #444; font-size: 10px; overflow-y: auto; padding: 5px; }
    </style>
</head>
<body>

<header>
    <div id="status">USB НЕ ГОРЯЧИЙ</div>
    <button id="connectBtn">ВЫБРАТЬ USB УСТРОЙСТВО</button>
</header>

<div class="grid">
    <div class="card card-full">
        <div class="title">ОСТАТОК В БАКЕ</div>
        <div class="value" id="fuelVal">--</div>
        <div class="unit">ЛИТРОВ</div>
    </div>
    <div class="card">
        <div class="title">СКОРОСТЬ</div>
        <div class="value" id="speedVal">0</div>
        <div class="unit">КМ/Ч</div>
    </div>
    <div class="card">
        <div class="title">ОБОРОТЫ</div>
        <div class="value" id="rpmVal">0</div>
        <div class="unit">RPM</div>
    </div>
</div>

<div id="console">Ожидание...</div>

<script>
    let device;
    let isConnected = false;
    let buffer = "";

    const log = (m) => { document.getElementById('console').innerText = m + "\n" + document.getElementById('console').innerText; };

    document.getElementById('connectBtn').onclick = async () => {
        try {
            // ТВОЙ РАБОЧИЙ МЕТОД
            device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403, productId: 0x6001 }] });
            await device.open();
            await device.selectConfiguration(1);
            await device.claimInterface(0);

            // Настройка скорости FTDI
            await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: 0x4138, index: 0 });

            document.getElementById('status').innerText = "ONLINE";
            document.getElementById('connectBtn').style.display = "none";
            isConnected = true;
            read();

            // Команды ELM
            setTimeout(() => send("ATZ"), 500);
            setTimeout(() => send("ATE0"), 1000);
            setTimeout(() => send("ATSP0"), 1500);

            setInterval(() => {
                if(isConnected) {
                    send("010C"); // Обороты
                    setTimeout(() => send("010D"), 300); // Скорость
                    setTimeout(() => send("012F"), 600); // Бак
                }
            }, 1200);
        } catch (e) { log("Error: " + e.message); }
    };

    async function send(c) {
        if (device) await device.transferOut(2, new TextEncoder().encode(c + "\r"));
    }

    async function read() {
        const dec = new TextDecoder();
        while (isConnected) {
            try {
                const r = await device.transferIn(1, 64);
                if (r.data.byteLength > 2) {
                    buffer += dec.decode(new Uint8Array(r.data.buffer, 2));
                    if (buffer.includes(">")) {
                        parse(buffer.toUpperCase());
                        buffer = "";
                    }
                }
            } catch (e) { break; }
        }
    }

    function parse(d) {
        const c = d.replace(/\s+/g, '');
        if (c.includes("410C")) {
            const i = c.indexOf("410C") + 4;
            const a = parseInt(c.substring(i, i + 2), 16), b = parseInt(c.substring(i + 2, i + 4), 16);
            document.getElementById("rpmVal").innerText = Math.round(((a * 256) + b) / 4);
        }
        if (c.includes("410D")) {
            document.getElementById("speedVal").innerText = parseInt(c.substring(c.indexOf("410D") + 4, c.indexOf("410D") + 6), 16);
        }
        if (c.includes("412F")) {
            const v = parseInt(c.substring(c.indexOf("412F") + 4, c.indexOf("412F") + 6), 16);
            document.getElementById("fuelVal").innerText = ((v / 255) * 45).toFixed(1);
        }
    }
</script>
</body>
</html>
