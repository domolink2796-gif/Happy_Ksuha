<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CONECT EMERGENCY</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; text-align: center; }
        .box { border: 2px solid #333; margin: 10px; padding: 20px; border-radius: 10px; }
        .val { font-size: 50px; display: block; color: #0ff; }
        #log { height: 100px; overflow: auto; font-size: 10px; color: #666; text-align: left; border: 1px solid #222; padding: 5px; }
        button { width: 100%; height: 80px; background: #111; color: #0f0; border: 2px solid #0f0; font-size: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <button id="go">ЗАПУСТИТЬ ПАНЕЛЬ</button>

    <div class="box">
        <span>СКОРОСТЬ</span>
        <span id="s" class="val">--</span>
    </div>

    <div class="box">
        <span>БАК (ЛИТРЫ)</span>
        <span id="f" class="val">--</span>
    </div>

    <div id="log">Состояние: Жду нажатия...</div>

<script>
    let dev;
    const log = (m) => { document.getElementById('log').innerText = m + "\n" + document.getElementById('log').innerText; };

    document.getElementById('go').onclick = async () => {
        try {
            // 1. Выбор устройства
            dev = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403, productId: 0x6001 }] });
            await dev.open();
            await dev.selectConfiguration(1);
            await dev.claimInterface(0);

            // 2. Настройка скорости FTDI (38400)
            await dev.controlTransferOut({
                requestType: 'vendor', recipient: 'device',
                request: 0x03, value: 0x4138, index: 0
            });

            log("USB ПОДКЛЮЧЕН. Опрашиваю ЭБУ...");
            document.getElementById('go').style.display = 'none';

            // 3. Запуск чтения
            stream();

            // 4. Команды инициализации
            const init = ["ATZ", "ATE0", "ATSP0"];
            for(let c of init) {
                await send(c);
                await new Promise(r => setTimeout(r, 500));
            }

            // 5. Постоянный опрос
            setInterval(async () => {
                await send("010D"); // Скорость
                setTimeout(() => send("012F"), 300); // Бак
            }, 1000);

        } catch (e) { log("ОШИБКА: " + e.message); }
    };

    async function send(c) {
        if (!dev) return;
        await dev.transferOut(2, new TextEncoder().encode(c + "\r"));
    }

    async function stream() {
        const dec = new TextDecoder();
        while (true) {
            try {
                const r = await dev.transferIn(1, 64);
                if (r.data.byteLength > 2) {
                    // Пропускаем первые 2 байта (статус FTDI)
                    const txt = dec.decode(new Uint8Array(r.data.buffer, 2));
                    log("ДАННЫЕ: " + txt);
                    
                    const clean = txt.replace(/\s+/g, '');
                    
                    // Парсим скорость
                    if (clean.includes("410D")) {
                        const hex = clean.substring(clean.indexOf("410D")+4, clean.indexOf("410D")+6);
                        document.getElementById('s').innerText = parseInt(hex, 16);
                    }
                    // Парсим бак
                    if (clean.includes("412F")) {
                        const hex = clean.substring(clean.indexOf("412F")+4, clean.indexOf("412F")+6);
                        document.getElementById('f').innerText = ((parseInt(hex, 16)/255)*45).toFixed(1);
                    }
                }
            } catch (e) { break; }
        }
    }
</script>
</body>
</html>
