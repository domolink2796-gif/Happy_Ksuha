<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Ксюшеньки ❤️</title>
    <style>
        body { 
            margin: 0; 
            background: #0b0b0b; 
            color: #d4af37; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            text-align: center; 
            overflow: hidden; 
            position: relative;
        }

        /* Фоновый слой (ЗА текстом) */
        #canvasBackground { 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 1; 
            pointer-events: none; 
        }

        /* Слой магической пыли (ПЕРЕД текстом) */
        #canvasDust { 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 10; 
            pointer-events: none; 
        }

        .container { 
            position: relative; 
            z-index: 5; 
            border: 2px solid #d4af37; 
            padding: 50px 30px; 
            border-radius: 40px; 
            background: rgba(20, 20, 20, 0.85); 
            backdrop-filter: blur(15px); 
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.4); 
            max-width: 320px;
            border: 1px solid rgba(212, 175, 55, 0.5);
        }

        .age-badge {
            font-size: 14px;
            letter-spacing: 2px;
            color: rgba(212, 175, 55, 0.7);
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
        }
        #age-number {
            font-size: 42px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px #d4af37;
            display: block;
        }

        /* Стиль для динамического времени */
        #age-days {
            font-size: 14px; 
            color: rgba(212, 175, 55, 0.9);
            display: block;
            margin-top: -5px;
            font-weight: 300;
        }

        .heart { 
            font-size: 90px; 
            cursor: pointer; 
            filter: drop-shadow(0 0 20px #ff4d4d); 
            animation: pulse 1.2s infinite; 
            transition: transform 0.3s ease;
            margin-top: 20px;
        }
        .heart:active { transform: scale(0.9); }

        h1 { 
            font-size: 24px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin: 25px 0 10px; 
            color: #fff; 
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        p { 
            font-size: 16px; 
            font-weight: 300;
            color: #d4af37;
            margin-bottom: 0;
            transition: 1s;
        }

        @keyframes pulse { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.1); } 
            100% { transform: scale(1); } 
        }
    </style>
</head>
<body>

    <canvas id="canvasBackground"></canvas>
    <canvas id="canvasDust"></canvas>

    <div class="container">
        <div class="age-badge">
            LEVEL <span id="age-number">0</span>
            <span id="age-days"></span> 
            <div style="font-size: 10px; margin-top: 5px;">SYSTEM STATUS: EXCELLENT</div>
        </div>

        <div id="mainHeart" class="heart" onclick="startSurprise(event)">❤️</div>
        <h1 id="title">Для моей Ксюши</h1>
        <p id="status">Нажми на сердце, чтобы активировать</p>
        
        <audio id="voice" src="ksusha.mp3"></audio>
        <audio id="music" src="music.mp3" loop></audio>
    </div>

    <script>
        const canvasBg = document.getElementById('canvasBackground');
        const ctxBg = canvasBg.getContext('2d');
        const canvasDust = document.getElementById('canvasDust');
        const ctxDust = canvasDust.getContext('2d');

        let particles = [];
        let dustParticles = []; 
        let animationActive = false;

        window.onload = function() {
            let count = 0;
            let target = 34; // Целевой уровень (возраст)
            let counter = setInterval(() => {
                if (count >= target) {
                    clearInterval(counter);
                    startDynamicCounter(); 
                }
                else { count++; document.getElementById('age-number').innerText = count; }
            }, 40);
        };

        // ДИНАМИЧЕСКИЙ СЧЕТ С КАЛЕНДАРНОЙ ТОЧНОСТЬЮ
        function startDynamicCounter() {
            // Дата рождения: 1 апреля 1992 года, 06:15:00
            const birthDate = new Date(1992, 3, 1, 6, 15, 0); 

            function update() {
                const now = new Date();
                
                // 1. Вычисляем полные годы
                let years = now.getFullYear() - birthDate.getFullYear();
                
                // Находим дату последнего прошедшего дня рождения
                let lastBirthday = new Date(now.getFullYear(), birthDate.getMonth(), birthDate.getDate(), birthDate.getHours(), birthDate.getMinutes(), 0);
                
                // Если в этом году 06:15 еще не наступило, берем прошлый год
                if (now < lastBirthday) {
                    years--;
                    lastBirthday = new Date(now.getFullYear() - 1, birthDate.getMonth(), birthDate.getDate(), birthDate.getHours(), birthDate.getMinutes(), 0);
                }

                // 2. Считаем точную разницу от этого момента
                const diff = now - lastBirthday;

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const minutes = Math.floor((diff / (1000 * 60)) % 60);
                const seconds = Math.floor((diff / 1000) % 60);
                
                document.getElementById('age-number').innerText = years;
                document.getElementById('age-days').innerText = 
                    `+ ${days}D ${hours}H ${minutes}M ${seconds}S`;
            }

            setInterval(update, 1000); 
            update();
        }

        function resize() {
            canvasBg.width = canvasDust.width = window.innerWidth;
            canvasBg.height = canvasDust.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvasBg.width;
                this.y = -50;
                this.size = Math.random() * 15 + 10;
                this.speed = Math.random() * 2 + 1;
                this.text = Math.random() > 0.3 ? '❤️' : '✨';
                this.opacity = Math.random() * 0.5 + 0.5;
            }
            update() {
                this.y += this.speed;
                if (this.y > canvasBg.height) this.reset();
            }
            draw() {
                ctxBg.globalAlpha = this.opacity;
                ctxBg.font = `${this.size}px serif`;
                ctxBg.fillStyle = "#d4af37";
                ctxBg.fillText(this.text, this.x, this.y);
            }
        }

        class StarDust {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 6 + 2;
                this.dx = Math.cos(angle) * force;
                this.dy = Math.sin(angle) * force;
                this.size = Math.random() * 3 + 1;
                this.life = 100;
                this.decay = Math.random() * 1.5 + 0.8;
                this.color = Math.random() > 0.5 ? '#d4af37' : '#fff';
            }
            update() {
                this.x += this.dx;
                this.y += this.dy;
                this.dx *= 0.95;
                this.dy *= 0.95;
                this.life -= this.decay;
            }
            draw() {
                if (this.life <= 0) return;
                ctxDust.globalAlpha = this.life / 100;
                ctxDust.fillStyle = this.color;
                ctxDust.shadowBlur = 10;
                ctxDust.shadowColor = this.color;
                ctxDust.beginPath();
                ctxDust.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctxDust.fill();
                ctxDust.shadowBlur = 0;
            }
        }

        function startSurprise(event) {
            if (animationActive) return; 
            animationActive = true;

            const music = document.getElementById('music');
            const voice = document.getElementById('voice');
            music.volume = 0.2; 
            music.play();
            
            setTimeout(() => { voice.volume = 1.0; voice.play(); }, 500);

            document.getElementById('title').innerText = "С ДНЕМ РОЖДЕНИЯ!";
            document.getElementById('status').innerText = "Я тебя люблю!";

            const rect = document.getElementById('mainHeart').getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for(let i = 0; i < 120; i++) {
                dustParticles.push(new StarDust(centerX, centerY));
            }

            voice.onended = function() {
                let fadeOut = setInterval(() => {
                    if (music.volume > 0.02) music.volume -= 0.02;
                    else { music.pause(); clearInterval(fadeOut); }
                }, 200);
            };
            
            for(let i = 0; i < 40; i++) particles.push(new Particle());
            animate();
        }

        function animate() {
            ctxBg.clearRect(0, 0, canvasBg.width, canvasBg.height);
            ctxDust.clearRect(0, 0, canvasDust.width, canvasDust.height);
            particles.forEach(p => { p.update(); p.draw(); });
            dustParticles.forEach((d, index) => {
                d.update();
                d.draw();
                if (d.life <= 0) dustParticles.splice(index, 1);
            });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
