<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT PANEL</title>
    <style>
        :root { --bg: #000; --main: #0f0; --acc: #00bfff; }
        body { background: var(--bg); color: var(--main); font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #connectBtn { width: 100%; padding: 20px; background: #111; color: var(--main); border: none; border-bottom: 2px solid #333; font-weight: bold; font-size: 18px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; flex-grow: 1; }
        .card { border: 1px solid #333; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .full { grid-column: span 2; }
        .val { font-size: 12vw; font-weight: bold; color: #fff; }
        .label { font-size: 12px; color: var(--acc); }
        #status { padding: 5px; text-align: center; font-size: 10px; color: #555; }
    </style>
</head>
<body>

<button id="connectBtn">АКТИВИРОВАТЬ USB</button>
<div id="status">ОЖИДАНИЕ ПОДКЛЮЧЕНИЯ...</div>

<div class="grid">
    <div class="card full">
        <div class="label">ОСТАТОК В БАКЕ</div>
        <div class="val" id="fuel">--</div>
    </div>
    <div class="card">
        <div class="label">СКОРОСТЬ</div>
        <div class="val" id="spd">0</div>
    </div>
    <div class="card">
        <div class="label">ОБОРОТЫ</div>
        <div class="val" id="rpm">0</div>
    </div>
</div>

<script>
    let device;
    let isConnected = false;
    let buffer = '';

    const fuelEl = document.getElementById('fuel');
    const spdEl = document.getElementById('spd');
    const rpmEl = document.getElementById('rpm');
    const statusEl = document.getElementById('status');

    document.getElementById('connectBtn').onclick = async () => {
        try {
            // ТВОЙ РАБОЧИЙ МЕТОД
            device = await navigator.usb.requestDevice({ 
                filters: [{ vendorId: 0x0403, productId: 0x6001 }] 
            });

            await device.open();
            await device.selectConfiguration(1);
            await device.claimInterface(0);

            // Установка скорости 38400 (критично для FTDI)
            await device.controlTransferOut({
                requestType: 'vendor', recipient: 'device',
                request: 0x03, value: 0x4138, index: 0 
            });

            statusEl.innerText = "СВЯЗЬ УСТАНОВЛЕНА";
            document.getElementById('connectBtn').style.display = "none";
            isConnected = true;
            
            read();

            // Команды инициализации ELM
            const initCmds = ["ATZ", "ATE0", "ATSP0"];
            for (let cmd of initCmds) {
                await send(cmd);
                await new Promise(r => setTimeout(r, 500));
            }

            // Цикл опроса
            setInterval(() => {
                if (isConnected) {
                    send("010C"); // Обороты
                    setTimeout(() => send("010D"), 300); // Скорость
                    setTimeout(() => send("012F"), 600); // Бак
                }
            }, 1200);

        } catch (err) {
            statusEl.innerText = "ОШИБКА: " + err.message;
        }
    };

    async function send(cmd) {
        if (device) await device.transferOut(2, new TextEncoder().encode(cmd + '\r'));
    }

    async function read() {
        const decoder = new TextDecoder();
        while (isConnected) {
            try {
                const result = await device.transferIn(1, 64);
                if (result.data.byteLength > 2) {
                    // Отрезаем 2 байта статуса FTDI
                    const data = new Uint8Array(result.data.buffer, 2);
                    buffer += decoder.decode(data);

                    if (buffer.includes(">")) {
                        parse(buffer.toUpperCase());
                        buffer = "";
                    }
                }
            } catch (e) { isConnected = false; break; }
        }
    }

    function parse(d) {
        const clean = d.replace(/\s+/g, '');
        // Обороты
        if (clean.includes("410C")) {
            const i = clean.indexOf("410C") + 4;
            const a = parseInt(clean.substring(i, i + 2), 16);
            const b = parseInt(clean.substring(i + 2, i + 4), 16);
            rpmEl.innerText = Math.round(((a * 256) + b) / 4);
        }
        // Скорость
        if (clean.includes("410D")) {
            const i = clean.indexOf("410D") + 4;
            spdEl.innerText = parseInt(clean.substring(i, i + 2), 16);
        }
        // Бак (на 45 литров)
        if (clean.includes("412F")) {
            const i = clean.indexOf("412F") + 4;
            const lvl = parseInt(clean.substring(i, i + 2), 16);
            fuelEl.innerText = ((lvl / 255) * 45).toFixed(1);
        }
    }
</script>
</body>
</html>
