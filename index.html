<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CONECT: ODO TITAN FINAL</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 10px; text-align: center; }
        .card { border: 2px solid #0f0; padding: 20px; border-radius: 15px; background: #050505; margin: 15px 0; }
        .val { font-size: 3em; display: block; color: #0f0; font-weight: bold; text-shadow: 0 0 10px #0f0; }
        #log { height: 250px; overflow-y: auto; border: 1px solid #222; font-size: 10px; text-align: left; padding: 8px; color: #ff3c00; background: #080808; }
        button { background: #0f0; border: none; color: #000; padding: 20px; font-size: 1.2em; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="color: #0f0;">FORD ODO FORCE EXTRACTOR</h2>
    <button id="connectBtn">ВЗЛОМАТЬ ШИНУ (ODO)</button>

    <div class="card">
        <span style="color: #00bcff;">РЕАЛЬНЫЕ ДАННЫЕ (KM)</span>
        <span id="odo" class="val">ЖДУ ОТВЕТ...</span>
    </div>

    <div id="log">Лог взлома...</div>

    <script>
        const logDiv = document.getElementById('log');
        let device;

        function log(msg) {
            logDiv.innerHTML += `> ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403 }] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                let divisor = Math.floor(3000000 / 38400);
                await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: divisor, index: 0 });

                log("ПОДКЛЮЧЕНО. СБРОС И ФОРСИРОВАНИЕ...");
                await send("ATZ");
                await sleep(500);
                await send("ATE0");
                await send("ATSP6"); // Сначала заходим через стандарт
                
                // СЕКРЕТНАЯ ПОСЛЕДОВАТЕЛЬНОСТЬ ДЛЯ FORD
                log("ПЕРЕХОД В РЕЖИМ ДИАГНОСТИКИ...");
                await send("ATSH720");
                await send("1001"); // Start Diagnostic Session
                await sleep(200);
                
                runExtraction();
            } catch (err) { log("ОШИБКА: " + err); }
        });

        async function send(cmd, wait = 300) {
            try {
                await device.transferOut(2, new TextEncoder().encode(cmd + "\r"));
                await sleep(wait);
                let res = await device.transferIn(1, 128);
                let txt = new TextDecoder().decode(res.data).replace(/\s/g, '').replace(/>/g, '');
                log(`[${cmd}] <- ${txt}`);
                return txt;
            } catch (e) { return ""; }
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function runExtraction() {
            while (true) {
                // Пытаемся взять из приборки (PID DD01)
                let res = await send("22DD01", 500);
                
                if (res.includes("62DD01")) {
                    let hex = res.substr(res.indexOf("62DD01") + 6, 6);
                    let km = parseInt(hex, 16);
                    if (km > 0) {
                        document.getElementById('odo').innerText = km.toLocaleString();
                        log("УСПЕХ: " + km + " KM", "#0f0");
                        break; 
                    }
                }
                
                // Если не вышло, пробуем через "мозги" (PCM)
                await send("ATSH7E0");
                let resPCM = await send("2204FE", 500);
                if (resPCM.includes("6204FE")) {
                    let hex = resPCM.substr(resPCM.indexOf("6204FE") + 6, 6);
                    let km = parseInt(hex, 16);
                    document.getElementById('odo').innerText = km.toLocaleString();
                    log("УСПЕХ (PCM): " + km + " KM");
                    break;
                }
                
                await sleep(1000);
            }
        }
    </script>
</body>
</html>
