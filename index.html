<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CONECT: FORD MOBILE</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 10px; text-align: center; overflow-x: hidden; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .card { border: 1px solid #333; padding: 15px; border-radius: 10px; background: #050505; box-shadow: 0 0 10px rgba(0,255,0,0.1); }
        .val { font-size: 2.2em; display: block; color: #0f0; font-weight: bold; }
        .label { font-size: 0.75em; color: #00bcff; text-transform: uppercase; letter-spacing: 1px; }
        #log { height: 120px; overflow-y: auto; border: 1px solid #222; margin-top: 15px; font-size: 11px; text-align: left; padding: 8px; color: #888; background: #0a0a0a; }
        button { background: #0f0; border: none; color: #000; padding: 18px; font-size: 1.1em; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; }
        button:active { background: #00bcff; }
        .full-width { grid-column: span 2; }
    </style>
</head>
<body>

    <div id="header">
        <h2 style="color: #ff3c00; margin: 5px; letter-spacing: 2px;">X-CONECT SYSTEM</h2>
        <button id="connectBtn">ПОДКЛЮЧИТЬ ELS27 (USB)</button>
    </div>

    <div class="grid">
        <div class="card full-width">
            <span class="label">Пробег (ODO)</span>
            <span id="odo" class="val">--- ---</span>
        </div>
        
        <div class="card">
            <span class="label">Бак (Литры)</span>
            <span id="fuel" class="val">--</span>
        </div>

        <div class="card">
            <span class="label">Мотор (°C)</span>
            <span id="temp" class="val">--</span>
        </div>

        <div class="card">
            <span class="label">Скорость</span>
            <span id="speed" class="val">0<small style="font-size: 0.5em"> км/ч</small></span>
        </div>

        <div class="card">
            <span class="label">Обороты</span>
            <span id="rpm" class="val">0</span>
        </div>
    </div>

    <div id="log">Ожидание USB соединения...</div>

    <script>
        const logDiv = document.getElementById('log');
        const connectBtn = document.getElementById('connectBtn');
        let device;
        const sleep = ms => new Promise(res => setTimeout(res, ms));

        function log(msg) {
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${time}] ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        connectBtn.addEventListener('click', async () => {
            try {
                device = await navigator.usb.requestDevice({ 
                    filters: [{ vendorId: 0x0403, productId: 0x6001 }] 
                });

                await device.open();
                log("USB ПОДКЛЮЧЕНО");
                
                await device.selectConfiguration(1);
                await device.claimInterface(0);

                await setupFTDI(38400);
                log("ELS27 ГОТОВ. ИНИЦИАЛИЗАЦИЯ...");
                
                await initELM();
            } catch (err) {
                log("ОШИБКА: " + err);
            }
        });

        async function setupFTDI(baud) {
            let divisor = Math.floor(3000000 / baud);
            await device.controlTransferOut({
                requestType: 'vendor', recipient: 'device', request: 0x03, value: divisor, index: 0
            });
        }

        async function sendCommand(cmd) {
            try {
                let data = new TextEncoder().encode(cmd + "\r");
                await device.transferOut(2, data);
                await sleep(250); 
                
                let result = await device.transferIn(1, 128); // Увеличен буфер
                return new TextDecoder().decode(result.data).trim();
            } catch (e) { return ""; }
        }

        async function initELM() {
            await sendCommand("ATZ");
            await sleep(500);
            await sendCommand("ATE0");
            await sendCommand("ATH1");
            await sendCommand("ATSP6"); // ПРИНУДИТЕЛЬНО CAN ISO 15765-4 (FORD)
            log("ПРОТОКОЛ CAN УСТАНОВЛЕН");
            startPolling();
        }

        function startPolling() {
            setInterval(async () => {
                // Обороты
                let rRPM = await sendCommand("010C");
                parseRPM(rRPM);

                // Температура
                let rTemp = await sendCommand("0105");
                parseSimple(rTemp, "4105", 'temp', -40);

                // Скорость
                let rSpeed = await sendCommand("010D");
                parseSimple(rSpeed, "410D", 'speed');

                // Топливо
                let rFuel = await sendCommand("012F");
                parseFuel(rFuel);

                // Пробег (Пробуем стандартный PID Ford)
                let rOdo = await sendCommand("220DD4");
                parseOdo(rOdo);
            }, 1000);
        }

        function parseSimple(hex, pid, id, offset = 0) {
            let clean = hex.replace(/\s/g, '');
            let idx = clean.indexOf(pid);
            if (idx !== -1) {
                let val = parseInt(clean.substr(idx + 4, 2), 16) + offset;
                if (!isNaN(val)) {
                    document.getElementById(id).innerHTML = val + (id === 'speed' ? '<small style="font-size: 0.5em"> км/ч</small>' : '');
                }
            }
        }

        function parseRPM(hex) {
            let clean = hex.replace(/\s/g, '');
            let idx = clean.indexOf("410C");
            if (idx !== -1) {
                let a = parseInt(clean.substr(idx + 4, 2), 16);
                let b = parseInt(clean.substr(idx + 6, 2), 16);
                let rpm = Math.round(((a * 256) + b) / 4);
                if (!isNaN(rpm)) document.getElementById('rpm').innerText = rpm;
            }
        }

        function parseFuel(hex) {
            let clean = hex.replace(/\s/g, '');
            let idx = clean.indexOf("412F");
            if (idx !== -1) {
                let raw = parseInt(clean.substr(idx + 4, 2), 16);
                let liters = Math.round((raw * 52) / 255); 
                if (!isNaN(liters)) document.getElementById('fuel').innerText = liters;
            }
        }

        function parseOdo(hex) {
            let clean = hex.replace(/\s/g, '');
            let idx = clean.indexOf("620DD4");
            if (idx !== -1) {
                let km = parseInt(clean.substr(idx + 6, 6), 16);
                if (!isNaN(km)) document.getElementById('odo').innerText = km.toLocaleString() + " км";
            }
        }
    </script>
</body>
</html>
