<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT: Digital Dashboard V5 (Sync Fix)</title>
    <style>
        :root {
            --bg-color: #000; --text-main: #0f0; --text-accent: #0bf; --text-warn: #f40; --text-dim: #555;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-color); color: var(--text-main); 
            font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh;
        }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid var(--text-dim); }
        button { background: #111; color: var(--text-main); border: 2px solid var(--text-main); padding: 12px; border-radius: 8px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; padding: 10px; gap: 8px; }
        .card { border: 2px solid var(--text-dim); border-radius: 10px; padding: 10px; text-align: center; }
        .card-full { grid-column: span 2; }
        .value { font-size: 8vw; font-weight: bold; }
        #logContainer { flex-grow: 1; background: #050505; overflow-y: auto; font-size: 10px; padding: 5px; border-top: 1px solid var(--text-dim); }
        .log-rx { color: #4caf50; } .log-tx { color: #ffeb3b; } .log-sys { color: #2196f3; }
    </style>
</head>
<body>

<header>
    <div id="status" style="color: var(--text-warn)">ПОИСК СИНХРОНИЗАЦИИ...</div>
    <button id="connectBtn">ПОДКЛЮЧИТЬ</button>
</header>

<div class="grid">
    <div class="card card-full"><div class="value" id="fuelVal">--</div><div>ЛИТРОВ</div></div>
    <div class="card"><div class="value" id="speedVal">0</div><div>КМ/Ч</div></div>
    <div class="card"><div class="value" id="consVal">0.0</div><div>Л/Ч</div></div>
</div>

<div id="logContainer"></div>

<script>
    // Стандартные делители для FT232R (3MHz base clock)
    const bauds = [
        { label: 38400,  val: 0x014E, index: 0x0000 }, // 3000000 / 38400 = 78.125
        { label: 115200, val: 0x001A, index: 0x0000 }, // 3000000 / 115200 = 26
        { label: 9600,   val: 0x4138, index: 0x0000 }
    ];

    let device, isConnected = false, isInitialized = false, buffer = '', currentBaudIdx = 0;
    const logBox = document.getElementById('logContainer');

    function addLog(msg, type) {
        const d = document.createElement('div');
        d.className = `log-${type}`;
        d.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logBox.appendChild(d);
        logBox.scrollTop = logBox.scrollHeight;
    }

    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403, productId: 0x6001 }] });
            await startAutoSync();
        } catch (e) { addLog("Ошибка выбора: " + e.message, "sys"); }
    });

    async function setupFTDI(baud) {
        if (!device.opened) await device.open();
        await device.selectConfiguration(1);
        await device.claimInterface(0);

        // 1. Сброс порта
        await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x00, value: 0x0000, index: 0x00 });
        // 2. Установка скорости
        await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: baud.val, index: baud.index });
        // 3. Установка Latency Timer (2ms) - ВАЖНО для быстрой реакции
        await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x09, value: 0x0002, index: 0x00 });
        
        addLog(`FTDI настроен: ${baud.label} bps, Latency: 2ms`, "sys");
    }

    async function startAutoSync() {
        const baud = bauds[currentBaudIdx];
        document.getElementById('status').innerText = `ТЕСТ: ${baud.label}`;
        
        try {
            await setupFTDI(baud);
            isConnected = true;
            readLoop();

            // Шлем серию Enter, чтобы сбросить буфер адаптера
            for(let i=0; i<3; i++) {
                await sendOBD(""); 
                await new Promise(r => setTimeout(r, 200));
            }
            await sendOBD("ATZ");

            setTimeout(() => {
                if (!isInitialized) {
                    addLog(`[-] Нет внятного ответа на ${baud.label}`, "sys");
                    isConnected = false;
                    currentBaudIdx = (currentBaudIdx + 1) % bauds.length;
                    startAutoSync();
                }
            }, 3000);
        } catch (e) { addLog("Сбой: " + e.message, "sys"); }
    }

    async function sendOBD(cmd) {
        if (!isConnected) return;
        addLog(`-> ${cmd}`, "tx");
        await device.transferOut(2, new TextEncoder().encode(cmd + '\r'));
    }

    async function readLoop() {
        const decoder = new TextDecoder();
        while (isConnected) {
            try {
                const result = await device.transferIn(1, 64);
                if (result.data.byteLength > 2) {
                    const data = new Uint8Array(result.data.buffer, 2);
                    const hex = Array.from(data).map(b => b.toString(16).padStart(2,'0')).join(' ');
                    const text = decoder.decode(data);
                    
                    if (text.trim() || hex !== "00 00") {
                        addLog(`<- ${text.replace(/\r/g, ' ')} [${hex}]`, "rx");
                        buffer += text;

                        if (!isInitialized && (buffer.includes('>') || buffer.includes('ELM') || buffer.includes('OK'))) {
                            isInitialized = true;
                            addLog("СИНХРОНИЗАЦИЯ ЕСТЬ!", "sys");
                            document.getElementById('status').innerText = "ONLINE";
                            document.getElementById('status').style.color = "#0f0";
                            setTimeout(() => sendOBD("ATE0"), 500);
                            setTimeout(() => sendOBD("ATSP3"), 1000); // Протокол Ford Fusion
                            setTimeout(poll, 2000);
                        }
                    }
                }
            } catch (e) { break; }
        }
    }

    function poll() {
        if (isConnected && isInitialized) {
            sendOBD("010D"); // Скорость
            setTimeout(poll, 800);
        }
    }
</script>
</body>
</html>
