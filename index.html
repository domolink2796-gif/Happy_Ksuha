<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXX-DRIVE EXPLORER</title>
    <style>
        body { background: #0f0f0f; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; text-align: center; }
        .panel { border: 2px solid #00ff41; padding: 20px; border-radius: 10px; box-shadow: 0 0 15px #00ff41; max-width: 500px; margin: auto; }
        button { background: #00ff41; color: #000; border: none; padding: 15px 25px; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 16px; }
        button:hover { background: #00cc33; }
        #log { margin-top: 20px; text-align: left; background: #000; padding: 10px; border: 1px solid #333; height: 200px; overflow-y: auto; font-size: 12px; }
        .status { margin-bottom: 20px; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="panel">
    <h1>X-CONECT: USB ACCESS</h1>
    <div class="status" id="status">ДИСК НЕ ПОДКЛЮЧЕН</div>
    <button id="connectBtn">ПОДКЛЮЧИТЬ SEAGATE</button>
    
    <div id="log">Ожидание инициализации порта...<br></div>
</div>

<script>
    const connectBtn = document.getElementById('connectBtn');
    const logDiv = document.getElementById('log');
    const statusDiv = document.getElementById('status');

    function log(msg) {
        logDiv.innerHTML += `> ${msg}<br>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    connectBtn.addEventListener('click', async () => {
        log("Запрос доступа к USB...");
        try {
            // Ищем любое устройство
            const device = await navigator.usb.requestDevice({ filters: [] });
            
            log(`Устройство найдено: ${device.productName}`);
            statusDiv.innerText = "ПОДКЛЮЧЕНО: " + device.productName;
            statusDiv.style.color = "#ffff00";

            await device.open();
            log("Сессия открыта.");

            if (device.configuration === null) {
                await device.selectConfiguration(1);
            }
            await device.claimInterface(0);
            log("Интерфейс захвачен. Попытка чтения структуры NTFS...");
            
            // Здесь начинается магия: нужно парсить таблицу разделов.
            // Без тяжелых библиотек мы увидим только "сырые" данные.
            log("ВНИМАНИЕ: Для полного списка файлов нужны драйверы NTFS.js");
            log("Статус: Прямой канал связи установлен.");

        } catch (err) {
            log(`ОШИБКА: ${err.name} - ${err.message}`);
            if (err.name === 'SecurityError') {
                log("Совет: Браузер блокирует доступ. Нужен HTTPS или запуск локально.");
            }
        }
    });
</script>

</body>
</html>
