<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CONECT: UNLOCK FUEL</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 10px; text-align: center; }
        .fuel-box { border: 4px solid #00bcff; padding: 25px; border-radius: 20px; background: #050505; margin: 15px 0; }
        .fuel-val { font-size: 6em; display: block; color: #00bcff; font-weight: bold; }
        #log { height: 150px; overflow-y: auto; border: 1px solid #111; margin-top: 15px; font-size: 10px; text-align: left; padding: 8px; color: #444; }
        button { background: #00bcff; border: none; color: #000; padding: 20px; font-size: 1.1em; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <button id="connectBtn">ВЗЛОМАТЬ СЕССИЮ И БАК</button>

    <div class="fuel-box">
        <span style="color: #00bcff; font-size: 0.9em;">УРОВЕНЬ ТОПЛИВА</span>
        <span id="fuel" class="fuel-val">--</span>
        <span style="color: #00bcff; font-size: 1.5em;">LITERS</span>
    </div>

    <div id="log">Ожидание команды...</div>

    <script>
        const logDiv = document.getElementById('log');
        let device, isRunning = false;

        function log(msg) {
            logDiv.innerHTML += `> ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403 }] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                let divisor = Math.floor(3000000 / 38400);
                await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: divisor, index: 0 });

                log("ПОДКЛЮЧЕНО. АКТИВАЦИЯ...");
                await send("ATZ");
                await send("ATE0");
                await send("ATSP6");
                await send("ATH0"); 

                // ПЫТАЕМСЯ ОТКРЫТЬ СЕССИЮ
                await send("ATSH720");
                log("ОТКРЫВАЮ СЕССИЮ...");
                await send("1003", 200); // Extended Diagnostic Session
                await send("1001", 200); // Default Session (иногда помогает «дернуть» блок)

                isRunning = true;
                mainLoop();
            } catch (err) { log("ОШИБКА: " + err); }
        });

        async function send(cmd, wait = 100) {
            try {
                await device.transferOut(2, new TextEncoder().encode(cmd + "\r"));
                await sleep(wait);
                let res = await device.transferIn(1, 128);
                let text = new TextDecoder().decode(res.data).replace(/\s/g, '').replace(/>/g, '');
                if (text) log(`${cmd} -> ${text}`);
                return text;
            } catch (e) { return ""; }
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function mainLoop() {
            while (isRunning) {
                await send("ATSH720", 20);
                
                // Пробуем снова 220461 после попытки входа в сессию
                let res = await send("220461", 150);
                
                if (res.includes("620461")) {
                    let hex = res.substr(res.indexOf("620461") + 6, 2);
                    let val = parseInt(hex, 16);
                    document.getElementById('fuel').innerText = Math.round(val * 45 / 255);
                } else {
                    // Если 220461 не дает, пробуем стандартный 012F, но с прогревом сессии
                    let res2 = await send("012F", 150);
                    if (res2.includes("412F")) {
                        let val2 = parseInt(res2.substr(res2.indexOf("412F") + 4, 2), 16);
                        document.getElementById('fuel').innerText = Math.round(val2 * 45 / 255);
                    }
                }
                await sleep(1000); // Бак не нужно обновлять часто
            }
        }
    </script>
</body>
</html>
