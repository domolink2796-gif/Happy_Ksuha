<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CONECT: FORD ULTIMATE SCAN</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 10px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .card { border: 1px solid #333; padding: 15px; border-radius: 10px; background: #050505; }
        .val { font-size: 2.2em; display: block; color: #0f0; font-weight: bold; }
        .label { font-size: 0.75em; color: #00bcff; text-transform: uppercase; }
        #log { height: 120px; overflow-y: auto; border: 1px solid #222; margin-top: 15px; font-size: 10px; text-align: left; padding: 5px; color: #666; background: #080808; }
        button { background: #0f0; border: none; color: #000; padding: 15px; font-size: 1em; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        .full-width { grid-column: span 2; }
    </style>
</head>
<body>

    <h2 style="color: #ff3c00; margin: 5px;">X-CONECT BRUTEFORCE</h2>
    <button id="connectBtn">ЗАПУСТИТЬ ВСЕ МОДУЛИ</button>

    <div class="grid">
        <div class="card full-width">
            <span class="label">Одометр (Пробег)</span>
            <span id="odo" class="val">--- ---</span>
        </div>
        <div class="card"><span class="label">Бензин (Л)</span><span id="fuel" class="val">--</span></div>
        <div class="card"><span class="label">Мотор (°C)</span><span id="temp" class="val">--</span></div>
        <div class="card"><span class="label">Скорость</span><span id="speed" class="val">0</span></div>
        <div class="card"><span class="label">Обороты</span><span id="rpm" class="val">0</span></div>
    </div>

    <div id="log">Система готова к поиску...</div>

    <script>
        const logDiv = document.getElementById('log');
        let device;
        let isRunning = false;

        function log(msg) {
            logDiv.innerHTML += `> ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403 }] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                let divisor = Math.floor(3000000 / 38400);
                await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: divisor, index: 0 });

                log("ИНИЦИАЛИЗАЦИЯ ШИНЫ...");
                await send("ATZ");
                await sleep(500);
                await send("ATE0");
                await send("ATH1");
                await send("ATSP6"); // Стандартный CAN
                
                isRunning = true;
                mainLoop();
            } catch (err) { log("ОШИБКА: " + err); }
        });

        async function send(cmd) {
            try {
                await device.transferOut(2, new TextEncoder().encode(cmd + "\r"));
                await sleep(150);
                let res = await device.transferIn(1, 128);
                return new TextDecoder().decode(res.data).replace(/\s/g, '').replace(/>/g, '');
            } catch (e) { return ""; }
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function mainLoop() {
            let counter = 0;
            while (isRunning) {
                // --- СТАНДАРТНЫЕ ДАННЫЕ (Работают всегда) ---
                let rRPM = await send("010C");
                if (rRPM.includes("410C")) {
                    let a = parseInt(rRPM.substr(rRPM.indexOf("410C")+4, 2), 16);
                    let b = parseInt(rRPM.substr(rRPM.indexOf("410C")+6, 2), 16);
                    document.getElementById('rpm').innerText = Math.round(((a * 256) + b) / 4);
                }

                let rSpeed = await send("010D");
                if (rSpeed.includes("410D")) {
                    document.getElementById('speed').innerText = parseInt(rSpeed.substr(rSpeed.indexOf("410D")+4, 2), 16);
                }

                let rTemp = await send("0105");
                if (rTemp.includes("4105")) {
                    document.getElementById('temp').innerText = parseInt(rTemp.substr(rTemp.indexOf("4105")+4, 2), 16) - 40;
                }

                // --- ПОИСК СКРЫТЫХ ДАННЫХ (Раз в 10 циклов) ---
                if (counter % 10 === 0) {
                    // 1. Пытаемся найти ТОПЛИВО (Перебор 4-х методов)
                    let fuelMethods = ["220461", "22042C", "012F", "220506"];
                    for (let m of fuelMethods) {
                        let res = await send(m);
                        if (res.includes("62") || res.includes("412F")) {
                            let raw = parseInt(res.substr(res.length - 2, 2), 16);
                            document.getElementById('fuel').innerText = Math.round((raw * 45) / 255);
                            break; 
                        }
                    }

                    // 2. Пытаемся найти ПРОБЕГ (Перебор адресов PCM и HEC)
                    let odoFound = false;
                    // Метод A: Прямой запрос приборки
                    await send("ATSH720"); 
                    let rOdo1 = await send("22DD01");
                    if (rOdo1.includes("62DD01")) {
                        let val = parseInt(rOdo1.substr(rOdo1.indexOf("62DD01")+6, 6), 16);
                        document.getElementById('odo').innerText = val.toLocaleString();
                        odoFound = true;
                    }
                    
                    // Метод B: Если приборка молчит, пробуем PCM
                    if (!odoFound) {
                        await send("ATSH7E0");
                        let rOdo2 = await send("2204FE");
                        if (rOdo2.includes("6204FE")) {
                            let val = parseInt(rOdo2.substr(rOdo2.indexOf("6204FE")+6, 6), 16);
                            document.getElementById('odo').innerText = val.toLocaleString();
                        }
                    }
                    
                    await send("ATSH"); // Сброс заголовка в авто
                }

                counter++;
                if (counter > 100) counter = 0;
                await sleep(50);
            }
        }
    </script>
</body>
</html>
