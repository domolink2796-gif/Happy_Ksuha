<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT: Digital Dashboard</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #00ff00;
            --text-accent: #00bfff;
            --text-warn: #ff4500;
            --text-dim: #555555;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 2px solid var(--text-dim);
        }
        button {
            background-color: #111;
            color: var(--text-main);
            border: 2px solid var(--text-main);
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
        button:active { background-color: var(--text-main); color: black; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto auto;
            flex-grow: 1;
            padding: 10px;
            gap: 10px;
        }
        .card {
            border: 2px solid var(--text-dim);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .card-full { grid-column: span 2; }
        .title { font-size: 14px; color: var(--text-accent); text-transform: uppercase; }
        .value { font-size: 10vw; font-weight: bold; line-height: 1.1; }
        .unit { font-size: 16px; color: var(--text-dim); }
        #status { color: var(--text-warn); font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div id="status">USB НЕ АКТИВИРОВАН</div>
    <button id="connectBtn">АКТИВИРОВАТЬ USB</button>
</header>

<div class="grid">
    <div class="card card-full">
        <div class="title">Остаток в баке (45L MAX)</div>
        <div class="value" id="fuelVal">--</div>
        <div class="unit">ЛИТРОВ</div>
    </div>

    <div class="card">
        <div class="title">Скорость</div>
        <div class="value" style="color: var(--text-main);" id="speedVal">0</div>
        <div class="unit">КМ/Ч</div>
    </div>

    <div class="card">
        <div class="title">Расход</div>
        <div class="value" id="consVal">0.0</div>
        <div class="unit" id="consUnit">Л / Ч</div>
    </div>

    <div class="card">
        <div class="title">Пробег (ЭБУ)</div>
        <div class="value" style="font-size: 6vw;" id="odoVal">------</div>
        <div class="unit">КМ</div>
    </div>

    <div class="card">
        <div class="title">Суточный пробег</div>
        <div class="value" style="font-size: 6vw;" id="tripVal">0.0</div>
        <div class="unit">КМ</div>
        <button id="resetTripBtn" style="margin-top: 5px; padding: 5px 10px; font-size: 12px;">СБРОС</button>
    </div>
</div>

<script>
    const TANK_VOLUME = 45.0;
    const FUEL_MAGIC_NUMBER = 0.335;

    let device;
    let isConnected = false;
    let commandQueue = ['010D', '0110', '012F', '0131']; 
    let cmdIndex = 0;
    let buffer = '';
    
    let currentSpeed = 0;
    let lastTime = Date.now();
    let tripDistance = parseFloat(localStorage.getItem('tripDistance')) || 0.0;

    const els = {
        status: document.getElementById('status'),
        connectBtn: document.getElementById('connectBtn'),
        fuel: document.getElementById('fuelVal'),
        speed: document.getElementById('speedVal'),
        cons: document.getElementById('consVal'),
        consUnit: document.getElementById('consUnit'),
        odo: document.getElementById('odoVal'),
        trip: document.getElementById('tripVal'),
        resetTrip: document.getElementById('resetTripBtn')
    };

    els.trip.innerText = tripDistance.toFixed(1);

    els.resetTrip.addEventListener('click', () => {
        tripDistance = 0.0;
        localStorage.setItem('tripDistance', tripDistance);
        els.trip.innerText = '0.0';
    });

    els.connectBtn.addEventListener('click', async () => {
        try {
            device = await navigator.usb.requestDevice({ 
                filters: [{ vendorId: 0x0403, productId: 0x6001 }] 
            });

            await device.open();
            if (device.configuration === null) await device.selectConfiguration(1);
            await device.claimInterface(0);

            // Инициализация FTDI (Baudrate 38400)
            await device.controlTransferOut({
                requestType: 'vendor', recipient: 'device',
                request: 0x00, value: 0x01, index: 0x00 // Reset
            });
            
            await device.controlTransferOut({
                requestType: 'vendor', recipient: 'device',
                request: 0x03, value: 0x4138, index: 0x0000 // 38400
            });

            els.status.innerText = "ПОДКЛЮЧЕНО: " + device.productName;
            els.status.style.color = "var(--text-main)";
            els.connectBtn.style.display = "none";
            isConnected = true;

            startReading();
            
            // Инициализация ELM для Ford
            setTimeout(() => sendOBD("ATZ"), 500);
            setTimeout(() => sendOBD("ATE0"), 1000);
            setTimeout(() => sendOBD("ATH0"), 1300); // Отключаем заголовки
            setTimeout(() => sendOBD("ATSP0"), 1600); // Автопротокол
            setTimeout(pollCycle, 2500);

        } catch (err) {
            els.status.innerText = "ОШИБКА: " + err.message;
        }
    });

    async function sendOBD(cmd) {
        if (!isConnected) return;
        const data = new TextEncoder().encode(cmd + '\r');
        try {
            await device.transferOut(2, data);
        } catch(e) { isConnected = false; }
    }

    async function startReading() {
        const decoder = new TextDecoder();
        while (isConnected) {
            try {
                const result = await device.transferIn(1, 64);
                if (result.data.byteLength > 2) {
                    // FTDI вставляет 2 байта статуса в начало КАЖДОГО пакета. Отрезаем их.
                    const actualData = new Uint8Array(result.data.buffer, 2);
                    buffer += decoder.decode(actualData);

                    if (buffer.includes('>')) {
                        let responses = buffer.split('\r');
                        for (let res of responses) {
                            if (res.trim() && res.trim() !== '>') {
                                processResponse(res.trim());
                            }
                        }
                        buffer = '';
                        // После получения '>', запрашиваем следующий параметр через паузу
                        setTimeout(pollCycle, 50);
                    }
                }
            } catch (err) {
                isConnected = false;
                els.status.innerText = "СВЯЗЬ ПОТЕРЯНА";
                break;
            }
        }
    }

    function pollCycle() {
        if (!isConnected || buffer.length > 0) return;
        sendOBD(commandQueue[cmdIndex]);
        cmdIndex = (cmdIndex + 1) % commandQueue.length;
    }

    function processResponse(hexStr) {
        // Убираем пробеги и мусор
        let clean = hexStr.replace(/\s+/g, '').toUpperCase();
        
        // 01 0D - Скорость
        if (clean.includes('410D')) {
            let val = clean.substring(clean.indexOf('410D') + 4, clean.indexOf('410D') + 6);
            currentSpeed = parseInt(val, 16);
            els.speed.innerText = currentSpeed;
            
            let now = Date.now();
            let hours = (now - lastTime) / 3600000;
            if (currentSpeed > 0) {
                tripDistance += (currentSpeed * hours);
                localStorage.setItem('tripDistance', tripDistance.toString());
                els.trip.innerText = tripDistance.toFixed(1);
            }
            lastTime = now;
        }
        
        // 01 10 - Расход (MAF)
        if (clean.includes('4110')) {
            let val = clean.substring(clean.indexOf('4110') + 4, clean.indexOf('4110') + 8);
            let maf = parseInt(val, 16) / 100;
            let lph = maf * FUEL_MAGIC_NUMBER;
            if (currentSpeed > 5) {
                let lp100 = (lph / currentSpeed) * 100;
                els.cons.innerText = Math.min(lp100, 99).toFixed(1);
                els.consUnit.innerText = "Л/100КМ";
            } else {
                els.cons.innerText = lph.toFixed(1);
                els.consUnit.innerText = "Л/Ч";
            }
        }

        // 01 2F - Уровень топлива
        if (clean.includes('412F')) {
            let val = clean.substring(clean.indexOf('412F') + 4, clean.indexOf('412F') + 6);
            let level = parseInt(val, 16) / 255;
            let liters = TANK_VOLUME * level;
            els.fuel.innerText = liters.toFixed(1);
            els.fuel.style.color = (liters < 7) ? "var(--text-warn)" : "var(--text-main)";
        }

        // 01 31 - Пробег после сброса
        if (clean.includes('4131')) {
            let val = clean.substring(clean.indexOf('4131') + 4, clean.indexOf('4131') + 8);
            els.odo.innerText = parseInt(val, 16);
        }
    }
</script>
</body>
</html>
