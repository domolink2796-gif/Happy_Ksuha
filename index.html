<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXX-USB PRO-SCANNER</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; padding: 15px; }
        .container { border: 1px solid #00ff41; padding: 20px; border-radius: 5px; max-width: 600px; margin: auto; background: #0a0a0a; }
        .status-box { border-left: 4px solid #ff0000; padding: 10px; margin-bottom: 20px; background: #111; }
        button { 
            background: #00ff41; color: #000; border: none; padding: 15px; 
            width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 10px;
        }
        button:active { background: #008822; }
        #console { 
            background: #000; border: 1px solid #333; padding: 10px; 
            height: 300px; overflow-y: auto; font-size: 12px; line-height: 1.4;
        }
        .warn { color: #ffae00; }
        .err { color: #ff5555; }
        .ok { color: #55ff55; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; border-bottom: 1px solid #00ff41; padding-bottom: 10px;">X-CONECT USB INTERFACE</h2>
    
    <div class="status-box" id="status-border">
        СТАТУС: <span id="status-text">ОЖИДАНИЕ</span>
    </div>

    <button id="scanBtn">СКАНИРОВАТЬ USB УСТРОЙСТВА</button>
    
    <div id="console">--- ИНИЦИАЛИЗАЦИЯ СИСТЕМЫ ---<br></div>
</div>

<script>
    const scanBtn = document.getElementById('scanBtn');
    const consoleDiv = document.getElementById('console');
    const statusText = document.getElementById('status-text');
    const statusBorder = document.getElementById('status-border');

    function log(msg, type = '') {
        const span = document.createElement('span');
        span.className = type;
        span.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
        consoleDiv.appendChild(span);
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    function updateStatus(text, color) {
        statusText.innerText = text;
        statusBorder.style.borderColor = color;
    }

    scanBtn.addEventListener('click', async () => {
        log("Запуск WebUSB сканера...");
        
        if (!navigator.usb) {
            log("ОШИБКА: WebUSB не поддерживается этим браузером.", "err");
            return;
        }

        try {
            // Пытаемся вызвать окно выбора без фильтров, чтобы увидеть ВСЕ устройства
            log("Ожидание выбора устройства пользователем...");
            const device = await navigator.usb.requestDevice({ filters: [] });

            updateStatus("ПОДКЛЮЧЕНО", "#55ff55");
            log(`УСТРОЙСТВО: ${device.productName || 'Неизвестное'}`, "ok");
            log(`Vendor ID: ${device.vendorId}`);
            log(`Product ID: ${device.productId}`);

            await device.open();
            log("USB Сессия открыта успешно.", "ok");

            if (device.configuration === null) {
                log("Конфигурация не задана, устанавливаем config(1)...");
                await device.selectConfiguration(1);
            }

            log("Попытка захвата интерфейса...");
            // Большинство HDD используют интерфейс 0
            await device.claimInterface(0);
            log("ИНТЕРФЕЙС ЗАХВАЧЕН!", "ok");
            log("ВНИМАНИЕ: Для чтения NTFS файлов требуется программный драйвер JS.", "warn");
            log("Железо ответило, прямой канал связи готов.");

        } catch (err) {
            updateStatus("ОШИБКА", "#ff5555");
            if (err.name === 'NotFoundError') {
                log("Устройство не выбрано или не найдено в списке.", "warn");
            } else if (err.name === 'SecurityError') {
                log("Блокировка безопасности! Проверь HTTPS или права браузера.", "err");
            } else {
                log(`СИСТЕМНАЯ ОШИБКА: ${err.message}`, "err");
            }
            console.error(err);
        }
    });

    // Проверка наличия уже подключенных устройств
    navigator.usb.getDevices().then(devices => {
        if (devices.length > 0) {
            log(`Найдено ранее сопряженных устройств: ${devices.length}`, "warn");
        }
    });
</script>

</body>
</html>
