<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT: Digital Dashboard & Scanner V2</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #00ff00;
            --text-accent: #00bfff;
            --text-warn: #ff4500;
            --text-dim: #555555;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 2px solid var(--text-dim);
        }
        button {
            background-color: #111;
            color: var(--text-main);
            border: 2px solid var(--text-main);
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }
        button:active { background-color: var(--text-main); color: black; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 10px;
            gap: 8px;
        }
        .card {
            border: 2px solid var(--text-dim);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }
        .card-full { grid-column: span 2; }
        .title { font-size: 12px; color: var(--text-accent); text-transform: uppercase; }
        .value { font-size: 8vw; font-weight: bold; line-height: 1.1; }
        .unit { font-size: 14px; color: var(--text-dim); }
        #status { color: var(--text-warn); font-size: 12px; font-weight: bold; }
        
        #logContainer {
            flex-grow: 1;
            background-color: #0a0a0a;
            border-top: 2px solid var(--text-dim);
            padding: 10px;
            overflow-y: auto;
            font-size: 11px;
            display: flex;
            flex-direction: column;
        }
        .log-line { margin-bottom: 2px; word-wrap: break-word; border-bottom: 1px solid #111; }
        .log-sys { color: #2196f3; } 
        .log-tx { color: #ffeb3b; }  
        .log-rx { color: #4caf50; }  
        .log-err { color: var(--text-warn); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div id="status">USB ОЖИДАНИЕ</div>
    <button id="connectBtn">АКТИВИРОВАТЬ</button>
</header>

<div class="grid">
    <div class="card card-full">
        <div class="title">Бак (45L MAX)</div>
        <div class="value" id="fuelVal">--</div>
        <div class="unit">ЛИТРОВ</div>
    </div>
    <div class="card">
        <div class="title">Скорость</div>
        <div class="value" id="speedVal">0</div>
        <div class="unit">КМ/Ч</div>
    </div>
    <div class="card">
        <div class="title">Расход</div>
        <div class="value" id="consVal">0.0</div>
        <div class="unit" id="consUnit">Л/Ч</div>
    </div>
</div>

<div id="logContainer">
    <div style="text-align: center; color: #444; font-size: 9px; margin-bottom: 5px;">--- СИСТЕМНЫЙ ЛОГ ОБМЕНА ---</div>
</div>

<script>
    const TANK_VOLUME = 45.0;
    const FUEL_MAGIC_NUMBER = 0.335;

    // Скорректированные делители для FT232R
    const bauds = [
        { label: 38400,  val: 0x4138, index: 0x0000 },
        { label: 115200, val: 0x001A, index: 0x0000 },
        { label: 9600,   val: 0x4138, index: 0x0001 } // Пример для 9600 на некоторых FTDI
    ];
    let currentBaudIdx = 0;
    let scanTimer;

    let device;
    let isConnected = false;
    let isInitialized = false;
    let commandQueue = ['010D', '0110', '012F']; 
    let cmdIndex = 0;
    let buffer = '';
    
    const els = {
        status: document.getElementById('status'),
        connectBtn: document.getElementById('connectBtn'),
        fuel: document.getElementById('fuelVal'),
        speed: document.getElementById('speedVal'),
        cons: document.getElementById('consVal'),
        consUnit: document.getElementById('consUnit'),
        logBox: document.getElementById('logContainer')
    };

    function addLog(message, type) {
        const div = document.createElement('div');
        div.className = `log-line log-${type}`;
        const d = new Date();
        const timeStr = d.toTimeString().split(' ')[0];
        div.innerText = `[${timeStr}] ${message}`;
        els.logBox.appendChild(div);
        els.logBox.scrollTop = els.logBox.scrollHeight;
        if (els.logBox.childElementCount > 50) els.logBox.removeChild(els.logBox.children[1]);
    }

    els.connectBtn.addEventListener('click', async () => {
        try {
            addLog("Поиск FTDI 0403:6001...", "sys");
            device = await navigator.usb.requestDevice({ 
                filters: [{ vendorId: 0x0403, productId: 0x6001 }] 
            });
            currentBaudIdx = 0;
            isInitialized = false;
            await startAutoScan();
        } catch (err) {
            addLog(`Ошибка: ${err.message}`, "err");
        }
    });

    async function startAutoScan() {
        try {
            const baud = bauds[currentBaudIdx];
            addLog(`>>> СКАН: ${baud.label} bps...`, "sys");
            els.status.innerText = `SCAN: ${baud.label}`;

            if (!device.opened) await device.open();
            if (device.configuration === null) await device.selectConfiguration(1);
            await device.claimInterface(0);

            // Применяем настройки скорости
            await device.controlTransferOut({
                requestType: 'vendor', recipient: 'device',
                request: 0x03, value: baud.val, index: baud.index 
            });

            isConnected = true;
            readLoop();
            
            // Ждем чуть дольше перед первой командой
            setTimeout(async () => {
                await sendOBD("ATZ");
            }, 500);

            // Таймаут на ответ
            clearTimeout(scanTimer);
            scanTimer = setTimeout(async () => {
                if (!isInitialized) {
                    addLog(`[-] Тишина на ${baud.label}`, "err");
                    isConnected = false;
                    currentBaudIdx++;
                    if (currentBaudIdx < bauds.length) {
                        await startAutoScan();
                    } else {
                        addLog("!!! АДАПТЕР НЕ ОТВЕЧАЕТ. Проверь питание OBD2!", "err");
                        els.status.innerText = "NO RESPONSE";
                        currentBaudIdx = 0;
                    }
                }
            }, 3000);

        } catch (err) {
            addLog(`Сбой: ${err.message}`, "err");
        }
    }

    async function sendOBD(cmd) {
        if (!isConnected) return;
        addLog(`-> ${cmd}`, "tx");
        const data = new TextEncoder().encode(cmd + '\r');
        try {
            await device.transferOut(2, data);
        } catch(e) { isConnected = false; }
    }

    async function readLoop() {
        const decoder = new TextDecoder();
        while (isConnected) {
            try {
                const result = await device.transferIn(1, 64);
                if (result.data.byteLength > 2) {
                    // Отрезаем 2 байта статуса FTDI
                    const actualData = new Uint8Array(result.data.buffer, 2);
                    const text = decoder.decode(actualData);
                    
                    // Выводим даже частичные данные для диагностики
                    if (text.trim().length > 0) {
                        addLog(`<- ${text.replace(/\r/g, ' ')}`, "rx");
                        buffer += text;
                    }

                    if (buffer.includes('>')) {
                        let clean = buffer.replace(/>/g, '').trim();
                        if (!isInitialized && clean.length > 0) {
                            isInitialized = true;
                            clearTimeout(scanTimer);
                            addLog("СВЯЗЬ ОК!", "sys");
                            els.status.innerText = "ONLINE";
                            els.status.style.color = "var(--text-main)";
                            els.connectBtn.style.display = "none";
                            
                            // Настройка протокола
                            setTimeout(() => sendOBD("ATE0"), 500);
                            setTimeout(() => sendOBD("ATSP3"), 1000); // Протокол Ford
                            setTimeout(mainPoll, 2000);
                        }
                        processResponse(clean);
                        buffer = '';
                    }
                }
            } catch (err) { break; }
        }
    }

    function mainPoll() {
        if (!isConnected || !isInitialized) return;
        sendOBD(commandQueue[cmdIndex]);
        cmdIndex = (cmdIndex + 1) % commandQueue.length;
        setTimeout(mainPoll, 500); 
    }

    function processResponse(hex) {
        hex = hex.replace(/\s+/g, '').toUpperCase();
        if (hex.includes('410D')) {
            let val = parseInt(hex.split('410D')[1].substring(0,2), 16);
            if(!isNaN(val)) els.speed.innerText = val;
        }
        if (hex.includes('412F')) {
            let val = parseInt(hex.split('412F')[1].substring(0,2), 16);
            if(!isNaN(val)) els.fuel.innerText = (TANK_VOLUME * (val/255)).toFixed(1);
        }
    }
</script>
</body>
</html>
