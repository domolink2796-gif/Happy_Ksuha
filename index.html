<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CONECT: TITANIUM DEEP SCAN</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 10px; text-align: center; }
        .card { border: 2px solid #ff3c00; padding: 25px; border-radius: 15px; background: #050505; margin: 15px 0; }
        .val { font-size: 3.2em; display: block; color: #0f0; font-weight: bold; text-shadow: 0 0 10px #0f0; }
        .label { font-size: 1em; color: #00bcff; text-transform: uppercase; }
        #log { height: 200px; overflow-y: auto; border: 1px solid #222; font-size: 10px; text-align: left; padding: 8px; color: #555; background: #080808; }
        button { background: #0f0; border: none; color: #000; padding: 20px; font-size: 1.2em; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="color: #ff3c00; margin: 10px;">TITANIUM ODO FORCE</h2>
    <button id="connectBtn">АКТИВИРОВАТЬ ГЛУБОКИЙ ПЕРЕХВАТ</button>

    <div class="card">
        <span class="label">РЕАЛЬНЫЙ ПРОБЕГ (ИЗ ШИНЫ)</span>
        <span id="odo" class="val">ЖДУ ПАКЕТ...</span>
    </div>

    <div id="log">Подключите USB и включите зажигание...</div>

    <script>
        const logDiv = document.getElementById('log');
        let device;
        let isRunning = false;

        function log(msg, color = "#555") {
            logDiv.innerHTML += `<span style="color:${color}">> ${msg}</span><br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403 }] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                let divisor = Math.floor(3000000 / 38400);
                await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: divisor, index: 0 });

                log("ELS27 СЦЕПЛЕН. ЗАПУСК ПРЯМОГО МОНИТОРИНГА...", "#0f0");
                await send("ATZ");
                await sleep(500);
                await send("ATE0");
                await send("ATH1");
                await send("ATS1"); // Убрать пробелы
                await send("ATAL"); // Длинные сообщения
                
                isRunning = true;
                forceMonitor();
            } catch (err) { log("ОШИБКА: " + err, "#f00"); }
        });

        async function send(cmd, wait = 200) {
            try {
                await device.transferOut(2, new TextEncoder().encode(cmd + "\r"));
                await sleep(wait);
                let res = await device.transferIn(1, 256);
                let text = new TextDecoder().decode(res.data).replace(/\s/g, '').replace(/>/g, '');
                return text;
            } catch (e) { return ""; }
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function forceMonitor() {
            // Пытаемся настроиться на MS-CAN (125k) — там живет приборка
            log("НАСТРОЙКА MS-CAN (125K)...");
            await send("ATSPB"); 
            
            while (isRunning) {
                // Прямой запрос пробега (Service 22, PID DD01)
                await send("ATSH720");
                let res = await send("22DD01", 500);
                
                log("RAW DATA: " + res);

                // Если пришел ответ, в котором есть 62DD01
                if (res.includes("62DD01")) {
                    let start = res.indexOf("62DD01") + 6;
                    let hex = res.substr(start, 6);
                    if (hex.length === 6) {
                        let km = parseInt(hex, 16);
                        if (km > 1000) {
                            document.getElementById('odo').innerText = km.toLocaleString() + " KM";
                            log("ПРОБЕГ УСПЕШНО ИЗВЛЕЧЕН: " + km, "#0f0");
                        }
                    }
                }

                // Если по адресу 720 тишина, пробуем "слушать" шину без запросов
                if (res.includes("NO") || res.includes("ERROR")) {
                    log("ЗАПРОС ОТКЛОНЕН. ВКЛЮЧАЮ РЕЖИМ ПЕРЕХВАТА (MA)...", "#888");
                    await send("ATMA", 1000); // Мониторить всё в течение секунды
                }
                
                await sleep(500);
            }
        }
    </script>
</body>
</html>
