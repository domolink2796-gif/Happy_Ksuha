<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT: MORNING START</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #btn { width: 100%; padding: 30px; background: #111; color: #0f0; border: none; border-bottom: 2px solid #333; font-size: 20px; font-weight: bold; }
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .val { font-size: 25vw; font-weight: bold; color: #fff; line-height: 1; }
        .label { font-size: 14px; color: #00bfff; }
        #status { height: 80px; background: #080808; font-size: 11px; color: #666; padding: 10px; overflow-y: auto; border-top: 1px solid #222; }
        .active-link { background: rgba(0, 191, 255, 0.1); }
    </style>
</head>
<body>

<button id="btn">ЗАПУСТИТЬ ПРИБОРКУ</button>

<div class="main" id="screen">
    <div class="label">ОСТАТОК БЕНЗИНА</div>
    <div id="fuel" class="val">--</div>
    <div id="extra" style="color: #444; font-size: 12px;">Ожидание потока данных...</div>
</div>

<div id="status">LOG: Нажми кнопку после подключения кабеля</div>

<script>
    let dev, isWork = false, buffer = "";
    const rates = [0x4138, 0x0000]; // 38400 и 9600
    const log = (m) => { const s = document.getElementById('status'); s.innerText = m + "\n" + s.innerText; };

    document.getElementById('btn').onclick = async () => {
        try {
            dev = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403, productId: 0x6001 }] });
            await dev.open();
            await dev.selectConfiguration(1);
            await dev.claimInterface(0);
            
            document.getElementById('btn').style.display = "none";
            isWork = true;
            read();

            // Автоматический перебор
            for (let rate of rates) {
                log("Проверка скорости: " + (rate === 0x4138 ? "38400" : "9600"));
                await dev.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: rate, index: 0 });
                
                await send("ATZ");
                await new Promise(r => setTimeout(r, 1000));
                
                if (buffer.includes("ELM")) {
                    log("СОЕДИНЕНИЕ УСТАНОВЛЕНО!");
                    await initFord();
                    return;
                }
            }
            log("Машина не ответила. Проверь зажигание.");
        } catch (e) { log("ОШИБКА: " + e.message); }
    };

    async function initFord() {
        const cmds = ["ATE0", "ATSP3", "0100"];
        for (let c of cmds) {
            await send(c);
            await new Promise(r => setTimeout(r, 600));
        }
        setInterval(() => { if(isWork) send("012F"); }, 2000);
    }

    async function send(c) {
        if (dev) await dev.transferOut(2, new TextEncoder().encode(c + "\r"));
    }

    async function read() {
        const dec = new TextDecoder();
        while (isWork) {
            try {
                const res = await dev.transferIn(1, 64);
                if (res.data.byteLength > 2) {
                    const data = new Uint8Array(res.data.buffer, 2);
                    let chunk = dec.decode(data).toUpperCase();
                    buffer += chunk;
                    if (chunk.includes(">")) {
                        if (buffer.includes("412F")) {
                            let v = parseInt(buffer.substring(buffer.indexOf("412F")+4, buffer.indexOf("412F")+6), 16);
                            if(!isNaN(v)) {
                                document.getElementById('fuel').innerText = ((v/255)*45).toFixed(1);
                                document.getElementById('screen').classList.add('active-link');
                            }
                        }
                        buffer = "";
                    }
                }
            } catch (e) { break; }
        }
    }
</script>
</body>
</html>
