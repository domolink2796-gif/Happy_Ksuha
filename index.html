<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CONECT: FORD FIXED</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 10px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .card { border: 1px solid #333; padding: 15px; border-radius: 10px; background: #050505; }
        .val { font-size: 2.2em; display: block; color: #0f0; font-weight: bold; }
        .label { font-size: 0.75em; color: #00bcff; text-transform: uppercase; }
        #log { height: 100px; overflow-y: auto; border: 1px solid #222; margin-top: 15px; font-size: 11px; text-align: left; padding: 8px; color: #888; }
        button { background: #0f0; border: none; color: #000; padding: 18px; font-size: 1.1em; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        .full-width { grid-column: span 2; }
    </style>
</head>
<body>
    <button id="connectBtn">ПОДКЛЮЧИТЬ FORD (USB)</button>
    <div class="grid">
        <div class="card full-width">
            <span class="label">Пробег (ODO)</span>
            <span id="odo" class="val">---</span>
        </div>
        <div class="card">
            <span class="label">Бак (Л)</span>
            <span id="fuel" class="val">--</span>
        </div>
        <div class="card">
            <span class="label">Мотор (°C)</span>
            <span id="temp" class="val">--</span>
        </div>
        <div class="card">
            <span class="label">Скорость</span>
            <span id="speed" class="val">0</span>
        </div>
        <div class="card">
            <span class="label">Обороты</span>
            <span id="rpm" class="val">0</span>
        </div>
    </div>
    <div id="log">Ожидание...</div>

    <script>
        const logDiv = document.getElementById('log');
        let device;
        const sleep = ms => new Promise(res => setTimeout(res, ms));

        function log(msg) {
            logDiv.innerHTML += `> ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403, productId: 0x6001 }] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);

                // FTDI Baudrate 38400
                await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: 0x4138, index: 0 });
                
                log("ПОДКЛЮЧЕНО. НАСТРОЙКА...");
                await sendCommand("ATZ");
                await sleep(1000);
                await sendCommand("ATE0");
                await sendCommand("ATH0"); // Выключаем заголовки для простоты парсинга
                await sendCommand("ATSP6"); // Форсируем CAN протокол Ford
                
                log("ГОТОВО. ОПРОС...");
                startPolling();
            } catch (err) { log("ОШИБКА: " + err); }
        });

        async function sendCommand(cmd) {
            try {
                await device.transferOut(2, new TextEncoder().encode(cmd + "\r"));
                await sleep(150);
                let result = await device.transferIn(1, 64);
                return new TextDecoder().decode(result.data).trim();
            } catch (e) { return ""; }
        }

        function startPolling() {
            setInterval(async () => {
                let rSpeed = await sendCommand("010D");
                parse(rSpeed, "410D", 'speed', 1);

                let rRPM = await sendCommand("010C");
                parseRPM(rRPM);

                let rTemp = await sendCommand("0105");
                parse(rTemp, "4105", 'temp', 1, -40);

                let rFuel = await sendCommand("012F");
                parseFuel(rFuel);

                let rOdo = await sendCommand("0131"); // Дистанция с очистки ошибок (как одометр)
                parse(rOdo, "4131", 'odo', 2);
            }, 800);
        }

        function parse(hex, pid, id, len, offset = 0) {
            let clean = hex.replace(/\s/g, '').toUpperCase();
            let i = clean.indexOf(pid);
            if (i !== -1) {
                let val = parseInt(clean.substr(i + 4, 2 * len), 16) + offset;
                document.getElementById(id).innerText = val;
            }
        }

        function parseRPM(hex) {
            let clean = hex.replace(/\s/g, '').toUpperCase();
            let i = clean.indexOf("410C");
            if (i !== -1) {
                let a = parseInt(clean.substr(i + 4, 2), 16);
                let b = parseInt(clean.substr(i + 6, 2), 16);
                document.getElementById('rpm').innerText = Math.round((a * 256 + b) / 4);
            }
        }

        function parseFuel(hex) {
            let clean = hex.replace(/\s/g, '').toUpperCase();
            let i = clean.indexOf("412F");
            if (i !== -1) {
                let raw = parseInt(clean.substr(i + 4, 2), 16);
                document.getElementById('fuel').innerText = Math.round((raw * 45) / 255); // Бак 45л
            }
        }
    </script>
</body>
</html>
