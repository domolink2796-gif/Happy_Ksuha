<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT: FUEL ONLY</title>
    <style>
        :root { --bg: #000; --main: #0f0; --acc: #00bfff; }
        body { background: var(--bg); color: var(--main); font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; margin: 0; overflow: hidden; }
        #connectBtn { width: 100%; padding: 30px; background: #111; color: var(--main); border: none; border-bottom: 2px solid #333; font-size: 22px; font-weight: bold; }
        .fuel-box { flex: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 1px solid #222; }
        .fuel-val { font-size: 30vw; font-weight: bold; color: #fff; }
        .data-box { flex: 1; display: grid; grid-template-columns: 1fr 1fr; }
        .card { border: 1px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .val { font-size: 12vw; font-weight: bold; color: #eee; }
        .label { font-size: 14px; color: var(--acc); text-transform: uppercase; }
        #status { font-size: 12px; color: #555; padding: 10px; text-align: center; background: #050505; }
    </style>
</head>
<body>

<button id="connectBtn">АКТИВИРОВАТЬ СВЯЗЬ</button>

<div class="fuel-box">
    <div class="label">Остаток топлива</div>
    <div id="fuel" class="fuel-val">--</div>
    <div style="font-size: 20px; color: #555;">ЛИТРОВ</div>
</div>

<div class="data-box">
    <div class="card">
        <div class="label">Расход</div>
        <div id="cons" class="val">0.0</div>
        <div id="unit" style="font-size: 12px; color: #555;">Л/Ч</div>
    </div>
    <div class="card">
        <div class="label">Скорость</div>
        <div id="spd" class="val">0</div>
        <div style="font-size: 12px; color: #555;">КМ/Ч</div>
    </div>
</div>

<div id="status">Система готова. Подключи кабель и нажми кнопку.</div>

<script>
    let dev, isWork = false, buffer = "", curSpd = 0;
    const dbg = (m) => { document.getElementById('status').innerText = m; };

    document.getElementById('connectBtn').onclick = async () => {
        try {
            dbg("Запрос устройства...");
            dev = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403, productId: 0x6001 }] });
            
            await dev.open();
            if (dev.configuration === null) await dev.selectConfiguration(1);
            await dev.claimInterface(0);

            // Настройка чипа FTDI (38400)
            await dev.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: 0x4138, index: 0 });

            dbg("СВЯЗЬ УСТАНОВЛЕНА. Инициализация ЭБУ...");
            document.getElementById('connectBtn').style.display = "none";
            isWork = true;
            read();

            // Команды для Ford Fusion (протокол ATSP3)
            const init = ["ATZ", "ATE0", "ATH0", "ATSP3", "0100"];
            for (let c of init) {
                await send(c);
                await new Promise(r => setTimeout(r, 600));
            }

            // Опрос: Бак (2F), Скорость (0D), MAF (10)
            setInterval(() => {
                if (isWork) {
                    send("012F");
                    setTimeout(() => send("010D"), 400);
                    setTimeout(() => send("0110"), 800);
                }
            }, 1500);

        } catch (e) { dbg("ОШИБКА: " + e.message); }
    };

    async function send(c) {
        if (dev) await dev.transferOut(2, new TextEncoder().encode(c + "\r"));
    }

    async function read() {
        const dec = new TextDecoder();
        while (isWork) {
            try {
                const res = await dev.transferIn(1, 64);
                if (res.data.byteLength > 2) {
                    const actual = new Uint8Array(res.data.buffer, 2); // Отрезаем мусор FTDI
                    buffer += dec.decode(actual);
                    if (buffer.includes(">")) {
                        parse(buffer.toUpperCase());
                        buffer = "";
                    }
                }
            } catch (e) { isWork = false; break; }
        }
    }

    function parse(s) {
        const c = s.replace(/\s+/g, '');
        // Бак
        if (c.includes("412F")) {
            const val = parseInt(c.substring(c.indexOf("412F")+4, c.indexOf("412F")+6), 16);
            if(!isNaN(val)) document.getElementById('fuel').innerText = ((val/255)*45).toFixed(1);
        }
        // Скорость
        if (c.includes("410D")) {
            curSpd = parseInt(c.substring(c.indexOf("410D")+4, c.indexOf("410D")+6), 16);
            if(!isNaN(curSpd)) document.getElementById('spd').innerText = curSpd;
        }
        // Расход (MAF)
        if (c.includes("4110")) {
            const i = c.indexOf("4110")+4;
            const a = parseInt(c.substring(i, i+2), 16), b = parseInt(c.substring(i+2, i+4), 16);
            if(!isNaN(a)) {
                let lph = ( ((a*256)+b)/100 ) * 0.335;
                if(curSpd > 5) {
                    document.getElementById('cons').innerText = ((lph/curSpd)*100).toFixed(1);
                    document.getElementById('unit').innerText = "Л/100КМ";
                } else {
                    document.getElementById('cons').innerText = lph.toFixed(1);
                    document.getElementById('unit').innerText = "Л/Ч";
                }
            }
        }
    }
</script>
</body>
</html>
