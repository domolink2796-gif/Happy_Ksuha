<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT: Ford Fusion Panel</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #00ff00;
            --text-accent: #00bfff;
            --text-warn: #ff4500;
            --text-dim: #555555;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            border-bottom: 2px solid var(--text-dim);
        }
        button {
            background-color: #111;
            color: var(--text-main);
            border: 2px solid var(--text-main);
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 5px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex-grow: 1;
            padding: 10px;
            gap: 10px;
        }
        .card {
            border: 2px solid var(--text-dim);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .card-full { grid-column: span 2; }
        .title { font-size: 14px; color: var(--text-accent); text-transform: uppercase; }
        .value { font-size: 10vw; font-weight: bold; line-height: 1.1; }
        .unit { font-size: 16px; color: var(--text-dim); }
        #status { color: #888; font-size: 12px; text-align: center; width: 100%; }
        #rawResponse { color: #555; font-size: 10px; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <button id="connectBtn">ПОДКЛЮЧИТЬ FORD (USB)</button>
    <div id="status">ОЖИДАНИЕ...</div>
    <div id="rawResponse">ОТВЕТ ЭБУ: ---</div>
</header>

<div class="grid">
    <div class="card card-full">
        <div class="title">Обороты</div>
        <div class="value" id="rpmVal">0</div>
        <div class="unit">RPM</div>
    </div>

    <div class="card">
        <div class="title">Скорость</div>
        <div class="value" id="speedVal">0</div>
        <div class="unit">КМ/Ч</div>
    </div>

    <div class="card">
        <div class="title">Мотор</div>
        <div class="value" id="tempVal">--</div>
        <div class="unit">°C</div>
    </div>

    <div class="card">
        <div class="title">Бак</div>
        <div class="value" id="fuelVal">--</div>
        <div class="unit">ЛИТРОВ</div>
    </div>

    <div class="card">
        <div class="title">Пробег (ЭБУ)</div>
        <div class="value" style="font-size: 6vw;" id="odoVal">------</div>
        <div class="unit">КМ</div>
    </div>
</div>

<script>
    const TANK_VOLUME = 45.0;
    let device;
    let isConnected = false;
    let commandQueue = ['010C', '010D', '0105', '012F', '0131']; 
    let cmdIndex = 0;
    let buffer = '';

    const els = {
        status: document.getElementById('status'),
        raw: document.getElementById('rawResponse'),
        connectBtn: document.getElementById('connectBtn'),
        rpm: document.getElementById('rpmVal'),
        speed: document.getElementById('speedVal'),
        temp: document.getElementById('tempVal'),
        fuel: document.getElementById('fuelVal'),
        odo: document.getElementById('odoVal')
    };

    els.connectBtn.addEventListener('click', async () => {
        try {
            device = await navigator.usb.requestDevice({ 
                filters: [{ vendorId: 0x0403, productId: 0x6001 }] 
            });

            await device.open();
            if (device.configuration === null) await device.selectConfiguration(1);
            await device.claimInterface(0);

            // Настройка FTDI (Baudrate 38400)
            await device.controlTransferOut({
                requestType: 'vendor', recipient: 'device',
                request: 0x03, value: 0x4138, index: 0x0000 
            });

            els.status.innerText = "ПОДКЛЮЧЕНО: " + device.productName;
            els.connectBtn.style.display = "none";
            isConnected = true;

            startReading();
            
            // Инициализация
            await sendOBD("ATZ");
            setTimeout(() => sendOBD("ATE0"), 1000);
            setTimeout(() => sendOBD("ATSP6"), 1500); // Протокол Ford CAN
            setTimeout(pollCycle, 2000);

        } catch (err) {
            els.status.innerText = "ОШИБКА: " + err.message;
        }
    });

    async function sendOBD(cmd) {
        if (!isConnected) return;
        const data = new TextEncoder().encode(cmd + '\r');
        await device.transferOut(2, data);
    }

    async function startReading() {
        while (isConnected) {
            try {
                const result = await device.transferIn(1, 64);
                const text = new TextDecoder().decode(result.data);
                buffer += text;

                if (buffer.includes('>')) {
                    let cleanResp = buffer.replace('>', '').trim();
                    els.raw.innerText = "ОТВЕТ ЭБУ: " + cleanResp; // Видим ответ!
                    processResponse(cleanResp);
                    buffer = '';
                }
            } catch (err) {
                isConnected = false;
                els.status.innerText = "СВЯЗЬ ПОТЕРЯНА";
                break;
            }
        }
    }

    function pollCycle() {
        if (!isConnected) return;
        sendOBD(commandQueue[cmdIndex]);
        cmdIndex = (cmdIndex + 1) % commandQueue.length;
        // Замедлили до 800мс для стабильности
        setTimeout(pollCycle, 800); 
    }

    function processResponse(hex) {
        hex = hex.replace(/\s+/g, '').toUpperCase();
        
        // RPM (41 0C)
        if (hex.includes('410C')) {
            let i = hex.indexOf('410C') + 4;
            let rpm = (parseInt(hex.substring(i, i+2), 16) * 256 + parseInt(hex.substring(i+2, i+4), 16)) / 4;
            if (!isNaN(rpm)) els.rpm.innerText = Math.round(rpm);
        }

        // Speed (41 0D)
        if (hex.includes('410D')) {
            let i = hex.indexOf('410D') + 4;
            let spd = parseInt(hex.substring(i, i+2), 16);
            if (!isNaN(spd)) els.speed.innerText = spd;
        }

        // Temp (41 05)
        if (hex.includes('4105')) {
            let i = hex.indexOf('4105') + 4;
            let tmp = parseInt(hex.substring(i, i+2), 16) - 40;
            if (!isNaN(tmp)) els.temp.innerText = tmp;
        }

        // Fuel (41 2F)
        if (hex.includes('412F')) {
            let i = hex.indexOf('412F') + 4;
            let fuel = (parseInt(hex.substring(i, i+2), 16) / 255) * TANK_VOLUME;
            if (!isNaN(fuel)) els.fuel.innerText = fuel.toFixed(1);
        }

        // Odo (41 31)
        if (hex.includes('4131')) {
            let i = hex.indexOf('4131') + 4;
            let odo = parseInt(hex.substring(i, i+4), 16);
            if (!isNaN(odo)) els.odo.innerText = odo;
        }
    }
</script>
</body>
</html>
