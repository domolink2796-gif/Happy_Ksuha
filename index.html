<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT: Digital Dashboard & Scanner</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #00ff00;
            --text-accent: #00bfff;
            --text-warn: #ff4500;
            --text-dim: #555555;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 2px solid var(--text-dim);
        }
        button {
            background-color: #111;
            color: var(--text-main);
            border: 2px solid var(--text-main);
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
        button:active { background-color: var(--text-main); color: black; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto auto;
            flex-shrink: 0;
            padding: 10px;
            gap: 10px;
        }
        .card {
            border: 2px solid var(--text-dim);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .card-full { grid-column: span 2; }
        .title { font-size: 14px; color: var(--text-accent); text-transform: uppercase; text-align: center; }
        .value { font-size: 10vw; font-weight: bold; line-height: 1.1; }
        .unit { font-size: 16px; color: var(--text-dim); }
        #status { color: var(--text-warn); font-size: 14px; font-weight: bold; }
        
        /* Терминал обмена данными */
        #logContainer {
            flex-grow: 1;
            background-color: #0a0a0a;
            border-top: 2px solid var(--text-dim);
            padding: 10px;
            overflow-y: auto;
            font-size: 12px;
            display: flex;
            flex-direction: column;
        }
        .log-title {
            color: var(--text-dim);
            font-size: 10px;
            margin-bottom: 5px;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 2px;
        }
        .log-line { margin-bottom: 3px; word-wrap: break-word; }
        .log-sys { color: #2196f3; } 
        .log-tx { color: #ffeb3b; }  
        .log-rx { color: #4caf50; }  
        .log-err { color: var(--text-warn); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div id="status">USB НЕ АКТИВИРОВАН</div>
    <button id="connectBtn">АКТИВИРОВАТЬ</button>
</header>

<div class="grid">
    <div class="card card-full">
        <div class="title">Остаток в баке (45L MAX)</div>
        <div class="value" id="fuelVal">--</div>
        <div class="unit">ЛИТРОВ</div>
    </div>

    <div class="card">
        <div class="title">Скорость</div>
        <div class="value" style="color: var(--text-main);" id="speedVal">0</div>
        <div class="unit">КМ/Ч</div>
    </div>

    <div class="card">
        <div class="title">Расход</div>
        <div class="value" id="consVal">0.0</div>
        <div class="unit" id="consUnit">Л / Ч</div>
    </div>
</div>

<div id="logContainer">
    <div class="log-title">--- ТЕРМИНАЛ: ПОИСК СКОРОСТИ ---</div>
</div>

<script>
    const TANK_VOLUME = 45.0;
    const FUEL_MAGIC_NUMBER = 0.335;

    // Параметры для перебора скоростей чипа FTDI
    const bauds = [
        { label: 38400, val: 0x4138 },
        { label: 115200, val: 0x001A },
        { label: 9600, val: 0xBF40 }
    ];
    let currentBaudIdx = 0;
    let scanTimer;

    let device;
    let isConnected = false;
    let isInitialized = false;
    let commandQueue = ['010D', '0110', '012F', '0131']; 
    let cmdIndex = 0;
    let buffer = '';
    
    let currentSpeed = 0;
    let lastTime = Date.now();
    let tripDistance = parseFloat(localStorage.getItem('tripDistance')) || 0.0;

    const els = {
        status: document.getElementById('status'),
        connectBtn: document.getElementById('connectBtn'),
        fuel: document.getElementById('fuelVal'),
        speed: document.getElementById('speedVal'),
        cons: document.getElementById('consVal'),
        consUnit: document.getElementById('consUnit'),
        logBox: document.getElementById('logContainer')
    };

    function addLog(message, type) {
        const div = document.createElement('div');
        div.className = `log-line log-${type}`;
        const d = new Date();
        const timeStr = [d.getHours(), d.getMinutes(), d.getSeconds()]
            .map(x => x.toString().padStart(2, '0')).join(':');
        div.innerText = `[${timeStr}] ${message}`;
        els.logBox.appendChild(div);
        els.logBox.scrollTop = els.logBox.scrollHeight;
        if (els.logBox.childElementCount > 100) els.logBox.removeChild(els.logBox.children[1]);
    }

    // Твоя рабочая логика вызова системного окна
    els.connectBtn.addEventListener('click', async () => {
        try {
            addLog("Запрос доступа к FTDI (0403:6001)...", "sys");
            // Твои проверенные фильтры
            device = await navigator.usb.requestDevice({ 
                filters: [{ vendorId: 0x0403, productId: 0x6001 }] 
            });

            currentBaudIdx = 0;
            isInitialized = false;
            await startConnection();

        } catch (err) {
            addLog(`Ошибка выбора: ${err.message}`, "err");
            els.status.innerText = "ОТМЕНЕНО";
        }
    });

    async function startConnection() {
        try {
            const baud = bauds[currentBaudIdx];
            addLog(`>>> ПРОБУЕМ СКОРОСТЬ: ${baud.label} bps...`, "sys");
            els.status.innerText = `ПОИСК: ${baud.label}`;

            if (!device.opened) await device.open();
            
            if (device.configuration === null) await device.selectConfiguration(1);
            await device.claimInterface(0);

            // Настройка FTDI под текущую скорость из списка
            await device.controlTransferOut({
                requestType: 'vendor', recipient: 'device',
                request: 0x03, value: baud.val, index: 0x0000 
            });

            isConnected = true;
            startReading();
            
            // Отправляем тестовую команду сброса
            await sendOBD("ATZ");

            // Ждем ответа 2.5 секунды. Если нет - пробуем следующую скорость
            clearTimeout(scanTimer);
            scanTimer = setTimeout(async () => {
                if (!isInitialized) {
                    addLog(`[-] Нет отклика на ${baud.label}.`, "err");
                    isConnected = false;
                    currentBaudIdx++;
                    if (currentBaudIdx < bauds.length) {
                        await startConnection();
                    } else {
                        addLog("!!! НИ ОДНА СКОРОСТЬ НЕ ПОДОШЛА.", "err");
                        els.status.innerText = "НЕТ ОТВЕТА";
                        currentBaudIdx = 0;
                    }
                }
            }, 2500);

        } catch (err) {
            addLog(`Критическая ошибка: ${err.message}`, "err");
        }
    }

    async function sendOBD(cmd) {
        if (!isConnected) return;
        addLog(`-> ${cmd}`, "tx");
        const data = new TextEncoder().encode(cmd + '\r');
        await device.transferOut(2, data); // Твой Endpoint 2
    }

    async function startReading() {
        const decoder = new TextDecoder();
        while (isConnected) {
            try {
                const result = await device.transferIn(1, 64); // Твой Endpoint 1
                if (result.data.byteLength > 2) {
                    const actualData = new Uint8Array(result.data.buffer, 2);
                    const text = decoder.decode(actualData);
                    buffer += text;

                    if (buffer.includes('>')) {
                        let clean = buffer.replace(/>/g, '').replace(/\r/g, ' ').trim();
                        if (clean !== "") {
                            addLog(`<- ${clean}`, "rx");
                            
                            // Если получили осмысленный ответ - значит скорость верна!
                            if (!isInitialized && (clean.includes("OK") || clean.includes("ELM") || clean.includes("41"))) {
                                isInitialized = true;
                                clearTimeout(scanTimer);
                                addLog(`УСПЕШНО: СКОРОСТЬ ${bauds[currentBaudIdx].label} ПОДТВЕРЖДЕНА!`, "sys");
                                els.status.innerText = "СВЯЗЬ: OK";
                                els.status.style.color = "var(--text-main)";
                                els.connectBtn.style.display = "none";
                                
                                // Инициализация протокола
                                setTimeout(() => sendOBD("ATE0"), 500);
                                setTimeout(() => sendOBD("ATSP3"), 1000); 
                                setTimeout(pollCycle, 2000);
                            }
                            processResponse(clean);
                        }
                        buffer = '';
                    }
                }
            } catch (err) {
                isConnected = false;
                break;
            }
        }
    }

    function pollCycle() {
        if (!isConnected || !isInitialized) return;
        sendOBD(commandQueue[cmdIndex]);
        cmdIndex = (cmdIndex + 1) % commandQueue.length;
        setTimeout(pollCycle, 400); 
    }

    function processResponse(hexStr) {
        hexStr = hexStr.replace(/\s+/g, '').toUpperCase();
        
        // Скорость
        if (hexStr.includes('410D')) {
            let idx = hexStr.indexOf('410D') + 4;
            currentSpeed = parseInt(hexStr.substring(idx, idx + 2), 16);
            if (!isNaN(currentSpeed)) els.speed.innerText = currentSpeed;
        }
        
        // Расход
        if (hexStr.includes('4110')) {
            let idx = hexStr.indexOf('4110') + 4;
            let maf = (parseInt(hexStr.substring(idx, idx + 4), 16)) / 100;
            if (!isNaN(maf)) {
                let lph = maf * FUEL_MAGIC_NUMBER;
                if (currentSpeed > 5) {
                    els.cons.innerText = ((lph / currentSpeed) * 100).toFixed(1);
                    els.consUnit.innerText = "Л/100КМ";
                } else {
                    els.cons.innerText = lph.toFixed(1);
                    els.consUnit.innerText = "Л/Ч";
                }
            }
        }

        // Бак
        if (hexStr.includes('412F')) {
            let idx = hexStr.indexOf('412F') + 4;
            let level = parseInt(hexStr.substring(idx, idx + 2), 16);
            if (!isNaN(level)) {
                let liters = TANK_VOLUME * (level / 255);
                els.fuel.innerText = liters.toFixed(1);
                els.fuel.style.color = (liters < 7) ? "var(--text-warn)" : "var(--text-main)";
            }
        }
    }
</script>
</body>
</html>
