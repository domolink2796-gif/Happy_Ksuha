<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CONECT: DEBUG FUEL</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 10px; text-align: center; }
        .fuel-box { border: 2px solid #555; padding: 20px; border-radius: 15px; background: #050505; margin: 10px 0; }
        .fuel-val { font-size: 4em; display: block; color: #00bcff; }
        #log { height: 250px; overflow-y: auto; border: 1px solid #222; margin-top: 15px; font-size: 11px; text-align: left; padding: 10px; color: #888; background: #0a0a0a; }
        button { background: #00bcff; border: none; color: #000; padding: 15px; font-size: 1em; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <button id="connectBtn">ПОДКЛЮЧИТЬ И СМОТРЕТЬ ОТВЕТЫ</button>

    <div class="fuel-box">
        <span style="font-size: 0.8em; color: #666;">ЗНАЧЕНИЕ БАКА:</span>
        <span id="fuel" class="fuel-val">--</span>
    </div>

    <div id="log">Нажми запуск и смотри, что ответит машина...</div>

    <script>
        const logDiv = document.getElementById('log');
        let device;

        function log(msg, color = "#888") {
            logDiv.innerHTML += `<span style="color:${color}">> ${msg}</span><br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403 }] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                let divisor = Math.floor(3000000 / 38400);
                await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: divisor, index: 0 });

                log("СВЯЗЬ УСТАНОВЛЕНА", "#0f0");
                await send("ATZ");
                await send("ATE0");
                await send("ATSP6");

                runDebug();
            } catch (err) { log("ОШИБКА: " + err, "#f00"); }
        });

        async function send(cmd, wait = 100) {
            await device.transferOut(2, new TextEncoder().encode(cmd + "\r"));
            await sleep(wait);
            let res = await device.transferIn(1, 128);
            let response = new TextDecoder().decode(res.data).replace(/\s/g, '').replace(/>/g, '');
            log(`CMD: ${cmd} | RES: ${response || "НЕТ ОТВЕТА"}`);
            return response;
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function runDebug() {
            log("--- НАЧИНАЮ ПОИСК ПАРАМЕТРА БАКА ---", "#ff0");
            
            // 1. Проверка через приборку
            await send("ATSH720");
            let r1 = await send("012F");
            if(r1.includes("412F")) log("НАЙДЕНО В 720 (012F)!", "#0f0");

            // 2. Проверка через GEM
            await send("ATSH760");
            let r2 = await send("012F");
            if(r2.includes("412F")) log("НАЙДЕНО В 760 (012F)!", "#0f0");

            // 3. Проверка спец-запроса Ford
            await send("ATSH720");
            let r3 = await send("220461");
            if(r3.includes("620461")) log("НАЙДЕНО В 720 (220461)!", "#0f0");

            log("--- ПОИСК ЗАВЕРШЕН. ЕСЛИ НЕТ ЗЕЛЕНЫХ НАДПИСЕЙ, БАК ЗАКРЫТ ---", "#ff0");
        }
    </script>
</body>
</html>
