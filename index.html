<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CONECT: FORD TERMINAL</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; padding: 10px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .card { border: 1px solid #222; padding: 12px; border-radius: 12px; background: #050505; box-shadow: inset 0 0 5px #0f02; }
        .val { font-size: 2.2em; display: block; color: #0f0; text-shadow: 0 0 8px #0f0; }
        .label { font-size: 0.7em; color: #00bcff; text-transform: uppercase; letter-spacing: 1px; }
        #log { height: 160px; overflow-y: auto; border: 1px solid #111; margin-top: 15px; font-size: 11px; text-align: left; padding: 8px; color: #666; background: #020202; line-height: 1.4; }
        .btn { background: #0f0; border: none; color: #000; padding: 18px; font-size: 1.1em; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn:active { background: #00bcff; }
        .full { grid-column: span 2; }
    </style>
</head>
<body>

    <h2 style="color: #ff3c00; margin: 5px; font-style: italic;">AXX-TITAN-PROJECT</h2>
    <button id="connectBtn" class="btn">АКТИВИРОВАТЬ ELS27</button>

    <div class="grid">
        <div class="card full">
            <span class="label">Одометр (ODO)</span>
            <span id="odo" class="val">--- ---</span>
            <span style="font-size: 0.8em; color: #333;">KM</span>
        </div>
        <div class="card">
            <span class="label">Бензин</span>
            <span id="fuel" class="val">--</span>
            <span class="label">Литров</span>
        </div>
        <div class="card">
            <span class="label">Мотор</span>
            <span id="temp" class="val">--</span>
            <span class="label">°C</span>
        </div>
        <div class="card">
            <span class="label">Скорость</span>
            <span id="speed" class="val">0</span>
            <span class="label">КМ/Ч</span>
        </div>
        <div class="card">
            <span class="label">Обороты</span>
            <span id="rpm" class="val">0</span>
            <span class="label">RPM</span>
        </div>
    </div>

    <div id="log">КОНСОЛЬ: Ожидание подключения...</div>

    <script>
        const logDiv = document.getElementById('log');
        const connectBtn = document.getElementById('connectBtn');
        let device;
        const sleep = ms => new Promise(res => setTimeout(res, ms));

        function log(msg, isRaw = false) {
            const time = new Date().toLocaleTimeString();
            const color = isRaw ? '#0f0' : '#888';
            logDiv.innerHTML += `<div><span style="color:#333">[${time}]</span> <span style="color:${color}">${msg}</span></div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            if (logDiv.childElementCount > 40) logDiv.removeChild(logDiv.firstChild);
        }

        connectBtn.addEventListener('click', async () => {
            try {
                device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403, productId: 0x6001 }] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                // Скорость порта 38400 - база для ELM/ELS
                let divisor = Math.floor(3000000 / 38400);
                await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: divisor, index: 0 });
                
                log("USB: OK. ЗАПУСК FORD CAN...");
                await initSystem();
            } catch (err) { log("ОШИБКА: " + err); }
        });

        async function sendCommand(cmd) {
            try {
                let data = new TextEncoder().encode(cmd + "\r");
                await device.transferOut(2, data);
                await sleep(350); // Пауза для стабильности шины Ford
                let result = await device.transferIn(1, 128);
                let text = new TextDecoder().decode(result.data).trim();
                if(cmd.length > 2) log("> " + text, true);
                return text;
            } catch (e) { return ""; }
        }

        async function initSystem() {
            await sendCommand("ATZ");    // Сброс адаптера
            await sleep(800);
            await sendCommand("ATE0");   // Эхо выкл
            await sendCommand("ATH1");   // Заголовки вкл
            
            // ПРИНУДИТЕЛЬНЫЙ ПРОТОКОЛ 6 (ISO 15765-4 CAN 11/500)
            // Это решает проблему "SEARCHING... STOPPED"
            await sendCommand("ATSP6");  
            log("ПРОТОКОЛ УСТАНОВЛЕН");
            
            startPolling();
        }

        function startPolling() {
            setInterval(async () => {
                // 1. Обороты (RPM)
                let resRPM = await sendCommand("010C");
                parseRPM(resRPM);

                // 2. Температура
                let resTemp = await sendCommand("0105");
                parseGeneral(resTemp, "4105", 'temp', -40);

                // 3. Бензин (на бак 45л)
                let resFuel = await sendCommand("012F");
                parseFuel(resFuel);

                // 4. Пробег (Сервисная команда Ford 22DD01)
                let resOdo = await sendCommand("22DD01"); 
                parseODO(resOdo);
            }, 1400); 
        }

        function parseRPM(hex) {
            let clean = hex.replace(/\s/g, '');
            let idx = clean.indexOf("410C");
            if (idx !== -1) {
                let a = parseInt(clean.substr(idx + 4, 2), 16);
                let b = parseInt(clean.substr(idx + 6, 2), 16);
                let val = Math.round(((a * 256) + b) / 4);
                document.getElementById('rpm').innerText = val;
            }
        }

        function parseFuel(hex) {
            let clean = hex.replace(/\s/g, '');
            let idx = clean.indexOf("412F");
            if (idx !== -1) {
                let raw = parseInt(clean.substr(idx + 4, 2), 16);
                let liters = Math.round((raw * 45) / 255); 
                document.getElementById('fuel').innerText = liters;
            }
        }

        function parseODO(hex) {
            let clean = hex.replace(/\s/g, '');
            let idx = clean.indexOf("62DD01"); // Ответ на 22DD01
            if (idx !== -1) {
                let km = parseInt(clean.substr(idx + 6, 6), 16);
                document.getElementById('odo').innerText = km.toLocaleString();
            } else {
                // Резервный поиск стандартного PID
                parseGeneral(hex, "4131", 'odo', 0);
            }
        }

        function parseGeneral(hex, pid, id, offset) {
            let clean = hex.replace(/\s/g, '');
            let idx = clean.indexOf(pid);
            if (idx !== -1) {
                let val = parseInt(clean.substr(idx + 4, 2), 16) + offset;
                document.getElementById(id).innerText = val;
            }
        }
    </script>
</body>
</html>
