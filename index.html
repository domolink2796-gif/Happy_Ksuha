<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT: Digital Dashboard</title>
    <!-- ДОБАВЛЕНО: Полифилл WebUSB для работы с OTG-переходниками на Android -->
    <script src="https://unpkg.com/web-serial-polyfill@1.0.15/dist/serial.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #00ff00;
            --text-accent: #00bfff;
            --text-warn: #ff4500;
            --text-dim: #555555;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 2px solid var(--text-dim);
        }
        button {
            background-color: var(--text-dim);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        button:active { background-color: var(--text-main); color: black; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto auto;
            flex-grow: 1;
            padding: 10px;
            gap: 10px;
        }
        .card {
            border: 2px solid var(--text-dim);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .card-full {
            grid-column: span 2;
        }
        .title {
            font-size: 14px;
            color: var(--text-accent);
            text-transform: uppercase;
        }
        .value {
            font-size: 10vw; /* Адаптивный размер для телефона */
            font-weight: bold;
            line-height: 1.1;
        }
        .unit {
            font-size: 16px;
            color: var(--text-dim);
        }
        #status { color: var(--text-warn); font-size: 12px; }
    </style>
</head>
<body>

<header>
    <div id="status">ОЖИДАНИЕ USB...</div>
    <button id="connectBtn">ПОДКЛЮЧИТЬ USB (OBD2)</button>
</header>

<div class="grid">
    <!-- Топливо (Центр внимания) -->
    <div class="card card-full">
        <div class="title">Остаток в баке (45L MAX)</div>
        <div class="value" id="fuelVal">--</div>
        <div class="unit">ЛИТРОВ</div>
    </div>

    <!-- Скорость -->
    <div class="card">
        <div class="title">Скорость</div>
        <div class="value" style="color: var(--text-main);" id="speedVal">0</div>
        <div class="unit">КМ/Ч</div>
    </div>

    <!-- Расход (Автопереключение л/ч и л/100км) -->
    <div class="card">
        <div class="title">Расход</div>
        <div class="value" id="consVal">0.0</div>
        <div class="unit" id="consUnit">Л / Ч</div>
    </div>

    <!-- Одометр -->
    <div class="card">
        <div class="title">Пробег (ЭБУ)</div>
        <div class="value" style="font-size: 6vw;" id="odoVal">------</div>
        <div class="unit">КМ</div>
    </div>

    <!-- Суточный пробег -->
    <div class="card">
        <div class="title">Суточный пробег</div>
        <div class="value" style="font-size: 6vw;" id="tripVal">0.0</div>
        <div class="unit">КМ</div>
        <button id="resetTripBtn" style="margin-top: 5px; padding: 5px 10px; font-size: 12px;">СБРОС</button>
    </div>
</div>

<script>
    // --- НАСТРОЙКИ АВТОМОБИЛЯ ---
    const TANK_VOLUME = 45.0; // Объем бака
    const FUEL_MAGIC_NUMBER = 0.335; // Коэффициент перевода MAF (г/с) в литры в час для бензина

    // --- ПЕРЕМЕННЫЕ СОСТОЯНИЯ ---
    let port, reader, writer;
    let isConnected = false;
    let commandQueue = ['010D', '0110', '012F']; // Очередь PID: Скорость, MAF (для расхода), Топливо
    let isPolling = false;
    let buffer = '';
    
    // Данные машины
    let currentSpeed = 0;
    let currentMaf = 0;
    let lastTime = Date.now();
    let tripDistance = parseFloat(localStorage.getItem('tripDistance')) || 0.0;

    // UI Элементы
    const els = {
        status: document.getElementById('status'),
        connectBtn: document.getElementById('connectBtn'),
        fuel: document.getElementById('fuelVal'),
        speed: document.getElementById('speedVal'),
        cons: document.getElementById('consVal'),
        consUnit: document.getElementById('consUnit'),
        odo: document.getElementById('odoVal'),
        trip: document.getElementById('tripVal'),
        resetTrip: document.getElementById('resetTripBtn')
    };

    // Инициализация суточного пробега при загрузке
    els.trip.innerText = tripDistance.toFixed(1);

    // --- ЛОГИКА СУТОЧНОГО ПРОБЕГА ---
    els.resetTrip.addEventListener('click', () => {
        tripDistance = 0.0;
        localStorage.setItem('tripDistance', tripDistance);
        els.trip.innerText = '0.0';
    });

    function updateTripMeter(speedKmH, timeDiffMs) {
        if (speedKmH > 0) {
            let hours = timeDiffMs / 3600000.0; // Перевод мс в часы
            tripDistance += (speedKmH * hours);
            localStorage.setItem('tripDistance', tripDistance);
            els.trip.innerText = tripDistance.toFixed(1);
        }
    }

    // ДОБАВЛЕНО: Объект serialAPI (Полифилл или Стандартный API для Android)
    let serialAPI = navigator.serial;
    if (typeof serial !== 'undefined' && navigator.usb) {
        serialAPI = serial; // Используем полифилл, если он загрузился
    }

    // --- WEB SERIAL API ПОДКЛЮЧЕНИЕ ---
    els.connectBtn.addEventListener('click', async () => {
        // ДОБАВЛЕНО: к оригинальной проверке добавил проверку наличия serialAPI
        if (!('serial' in navigator) && !serialAPI) {
            els.status.innerText = "ОШИБКА: Web Serial API не поддерживается!";
            return;
        }
        try {
            // ДОБАВЛЕНО: Фильтры для FTDI чипа (0403:6001), чтобы Android Chrome увидел устройство
            const filters = [
                { usbVendorId: 0x0403, usbProductId: 0x6001 }
            ];

            // ДОБАВЛЕНО: Вызов через полифилл с фильтрами
            if (serialAPI) {
                port = await serialAPI.requestPort({ filters });
            } else {
                port = await navigator.serial.requestPort({ filters }); // Твоя оригинальная строка с фильтром
            }

            await port.open({ baudRate: 38400 }); // Стандартный битрейт ELM327

            writer = port.writable.getWriter();
            isConnected = true;
            els.status.innerText = "USB ПОДКЛЮЧЕН. ИНИЦИАЛИЗАЦИЯ...";
            els.status.style.color = "var(--text-main)";
            els.connectBtn.style.display = "none";

            // Запуск прослушивания порта
            readLoop();

            // Инициализация ELM327 (Сброс, отключение эха, авто-протокол)
            await sendCommand('ATZ\r');
            await new Promise(r => setTimeout(r, 1000));
            await sendCommand('ATE0\r');
            await new Promise(r => setTimeout(r, 500));
            await sendCommand('ATSP0\r');
            await new Promise(r => setTimeout(r, 1000));

            // Добавляем запрос одометра в начало (выполняется реже)
            commandQueue.push('0131'); 
            
            els.status.innerText = "СВЯЗЬ УСТАНОВЛЕНА. СБОР ДАННЫХ...";
            startPolling();

        } catch (err) {
            els.status.innerText = "ОШИБКА ПОДКЛЮЧЕНИЯ: " + err;
        }
    });

    async function sendCommand(cmd) {
        if (writer) {
            const data = new TextEncoder().encode(cmd + '\r');
            await writer.write(data);
        }
    }

    // --- ЧТЕНИЕ И ПАРСИНГ ОТВЕТОВ ---
    async function readLoop() {
        reader = port.readable.getReader();
        const decoder = new TextDecoder();
        try {
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value);
                
                // ELM327 завершает ответ символом '>'
                if (buffer.includes('>')) {
                    let response = buffer.replace('>', '').trim();
                    buffer = ''; // Очищаем буфер
                    processResponse(response);
                    
                    // Запрашиваем следующую команду из очереди
                    setTimeout(pollNext, 100); 
                }
            }
        } catch (error) {
            els.status.innerText = "ОБРЫВ СВЯЗИ";
            els.status.style.color = "var(--text-warn)";
        } finally {
            reader.releaseLock();
        }
    }

    // --- ЛОГИКА ОБРАБОТКИ PID ---
    function processResponse(hexStr) {
        // Убираем пробелы и мусор
        hexStr = hexStr.replace(/\s+/g, '').toUpperCase();

        // 41 0D = Ответ на Скорость
        if (hexStr.includes('410D')) {
            let hexVal = hexStr.substring(hexStr.indexOf('410D') + 4, hexStr.indexOf('410D') + 6);
            currentSpeed = parseInt(hexVal, 16);
            els.speed.innerText = currentSpeed;

            // Обновляем суточный пробег
            let now = Date.now();
            updateTripMeter(currentSpeed, now - lastTime);
            lastTime = now;
        }

        // 41 10 = Ответ на MAF (Расход воздуха)
        if (hexStr.includes('4110')) {
            let hexVal = hexStr.substring(hexStr.indexOf('4110') + 4, hexStr.indexOf('4110') + 8);
            let A = parseInt(hexVal.substring(0, 2), 16);
            let B = parseInt(hexVal.substring(2, 4), 16);
            currentMaf = ((A * 256) + B) / 100; // грамм/сек
            
            // Расчет расхода
            let litersPerHour = currentMaf * FUEL_MAGIC_NUMBER;
            
            if (currentSpeed === 0) {
                // Холостой ход
                els.cons.innerText = litersPerHour.toFixed(1);
                els.consUnit.innerText = 'Л / Ч';
            } else {
                // В движении
                let litersPer100 = (litersPerHour / currentSpeed) * 100;
                // Ограничитель бредовых значений при трогании
                if (litersPer100 > 99.9) litersPer100 = 99.9; 
                els.cons.innerText = litersPer100.toFixed(1);
                els.consUnit.innerText = 'Л / 100 КМ';
            }
        }

        // 41 2F = Ответ на Уровень топлива (стандарт)
        // Для Форда может потребоваться 6216C1 (ответ на 2216C1), 
        // но здесь реализован надежный OBD2 стандарт
        if (hexStr.includes('412F')) {
            let hexVal = hexStr.substring(hexStr.indexOf('412F') + 4, hexStr.indexOf('412F') + 6);
            let percent = (parseInt(hexVal, 16) / 255);
            let liters = TANK_VOLUME * percent;
            els.fuel.innerText = liters.toFixed(1);
            
            // Подсветка красным, если меньше 7 литров
            if (liters < 7.0) els.fuel.style.color = "var(--text-warn)";
            else els.fuel.style.color = "var(--text-main)";
        }

        // 41 31 = Расстояние после очистки ошибок (как альтернатива общему одометру, если ЭБУ не отдает 220544)
        if (hexStr.includes('4131')) {
            let hexVal = hexStr.substring(hexStr.indexOf('4131') + 4, hexStr.indexOf('4131') + 8);
            let A = parseInt(hexVal.substring(0, 2), 16);
            let B = parseInt(hexVal.substring(2, 4), 16);
            let km = (A * 256) + B;
            els.odo.innerText = km;
        }
    }

    // --- ЦИКЛ ОПРОСА ---
    let cmdIndex = 0;
    function startPolling() {
        if (!isPolling) {
            isPolling = true;
            lastTime = Date.now();
            pollNext();
        }
    }

    function pollNext() {
        if (!isConnected) return;
        
        let cmd = commandQueue[cmdIndex];
        sendCommand(cmd);
        
        cmdIndex++;
        if (cmdIndex >= commandQueue.length) {
            cmdIndex = 0;
        }
    }
</script>

</body>
</html>
