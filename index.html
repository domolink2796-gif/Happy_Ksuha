<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT: Digital Dashboard PRO</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #00ff00;
            --text-accent: #00bfff;
            --text-warn: #ff4500;
            --text-dim: #333333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--text-dim);
        }
        button {
            background-color: #000;
            color: var(--text-main);
            border: 2px solid var(--text-main);
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        button:active { background-color: var(--text-main); color: #000; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex-grow: 1;
            padding: 10px;
            gap: 10px;
        }
        .card {
            border: 1px solid var(--text-dim);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            background: #050505;
        }
        .card-full { grid-column: span 2; }
        .title { font-size: 12px; color: var(--text-accent); text-transform: uppercase; margin-bottom: 5px; }
        .value { font-size: 12vw; font-weight: bold; line-height: 1; }
        .unit { font-size: 14px; color: var(--text-dim); margin-top: 5px; }
        #console { 
            height: 120px; 
            background: #080808; 
            color: #666; 
            font-size: 10px; 
            padding: 8px; 
            overflow-y: auto; 
            border-top: 1px solid var(--text-dim);
        }
    </style>
</head>
<body>

<header>
    <div id="status" style="color: var(--text-warn)">USB НЕ АКТИВИРОВАН</div>
    <button id="connectBtn">АКТИВИРОВАТЬ USB</button>
</header>

<div class="grid">
    <div class="card card-full">
        <div class="title">Одометр (Пробег)</div>
        <div class="value" style="font-size: 8vw;" id="odoVal">------</div>
        <div class="unit">КМ</div>
    </div>

    <div class="card">
        <div class="title">Бак (45L)</div>
        <div class="value" id="fuelVal">--</div>
        <div class="unit">ЛИТРОВ</div>
    </div>

    <div class="card">
        <div class="title">Температура</div>
        <div class="value" id="tempVal">--</div>
        <div class="unit">°C</div>
    </div>

    <div class="card">
        <div class="title">Скорость</div>
        <div class="value" id="speedVal">0</div>
        <div class="unit">КМ/Ч</div>
    </div>

    <div class="card">
        <div class="title">Обороты</div>
        <div class="value" id="rpmVal">0</div>
        <div class="unit">RPM</div>
    </div>
</div>

<div id="console">Ожидание запуска...</div>

<script>
    const TANK_VOLUME = 45;
    let device;
    let isConnected = false;
    let buffer = '';
    
    // Список команд: Обороты, Скорость, Температура, Бак, Одометр (Ford Enhanced)
    const commands = ['010C', '010D', '0105', '012F', '22DD01'];
    let cmdIdx = 0;

    const els = {
        status: document.getElementById('status'),
        connectBtn: document.getElementById('connectBtn'),
        console: document.getElementById('console'),
        fuel: document.getElementById('fuelVal'),
        temp: document.getElementById('tempVal'),
        speed: document.getElementById('speedVal'),
        rpm: document.getElementById('rpmVal'),
        odo: document.getElementById('odoVal')
    };

    function log(msg, isRaw = false) {
        const div = document.createElement('div');
        div.style.color = isRaw ? '#0f0' : '#666';
        div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        els.console.appendChild(div);
        els.console.scrollTop = els.console.scrollHeight;
    }

    els.connectBtn.addEventListener('click', async () => {
        try {
            device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403, productId: 0x6001 }] });
            await device.open();
            if (device.configuration === null) await device.selectConfiguration(1);
            await device.claimInterface(0);

            // Настройка 38400 (более стабильно для старых Ford)
            await device.controlTransferOut({
                requestType: 'vendor', recipient: 'device',
                request: 0x03, value: 0x4138, index: 0x0000 
            });

            isConnected = true;
            els.status.innerText = "ПОДКЛЮЧЕНО";
            els.status.style.color = "#0f0";
            els.connectBtn.style.display = "none";

            log("Запуск инициализации...");
            startReading();
            
            // Последовательная настройка
            await sendOBD("ATZ");    await sleep(1000);
            await sendOBD("ATE0");   await sleep(500);
            await sendOBD("ATH1");   await sleep(500); // Включаем заголовки для точности
            await sendOBD("ATSP6");  await sleep(800); // Принудительно CAN 11/500
            
            poll();
        } catch (err) {
            log("Ошибка: " + err.message);
        }
    });

    async function sleep(ms) { return new Promise(res => setTimeout(res, ms)); }

    async function sendOBD(cmd) {
        if (!isConnected) return;
        const data = new TextEncoder().encode(cmd + '\r');
        await device.transferOut(2, data);
    }

    async function startReading() {
        while (isConnected) {
            try {
                const result = await device.transferIn(1, 64);
                const text = new TextDecoder().decode(result.data);
                buffer += text;
                if (buffer.includes('>')) {
                    const response = buffer.replace('>', '').trim();
                    if (response) {
                        log(response, true);
                        processResponse(response.replace(/\s/g, ''));
                    }
                    buffer = '';
                }
            } catch (err) {
                isConnected = false;
                els.status.innerText = "СВЯЗЬ ПОТЕРЯНА";
                break;
            }
        }
    }

    function poll() {
        if (!isConnected) return;
        sendOBD(commands[cmdIdx]);
        cmdIdx = (cmdIdx + 1) % commands.length;
        setTimeout(poll, 400); // Опрос раз в 400мс (медленнее = стабильнее)
    }

    function processResponse(hex) {
        // Обороты 010C
        if (hex.includes('410C')) {
            let idx = hex.indexOf('410C') + 4;
            let a = parseInt(hex.substring(idx, idx + 2), 16);
            let b = parseInt(hex.substring(idx + 2, idx + 4), 16);
            els.rpm.innerText = Math.round(((a * 256) + b) / 4);
        }
        // Скорость 010D
        if (hex.includes('410D')) {
            let idx = hex.indexOf('410D') + 4;
            els.speed.innerText = parseInt(hex.substring(idx, idx + 2), 16);
        }
        // Температура 0105
        if (hex.includes('4105')) {
            let idx = hex.indexOf('4105') + 4;
            els.temp.innerText = parseInt(hex.substring(idx, idx + 2), 16) - 40;
        }
        // Бак 012F
        if (hex.includes('412F')) {
            let idx = hex.indexOf('412F') + 4;
            let raw = parseInt(hex.substring(idx, idx + 2), 16);
            let liters = (raw * TANK_VOLUME) / 255;
            els.fuel.innerText = liters.toFixed(1);
        }
        // Пробег Ford Enhanced 22DD01
        if (hex.includes('62DD01')) {
            let idx = hex.indexOf('62DD01') + 6;
            let km = parseInt(hex.substring(idx, idx + 6), 16);
            els.odo.innerText = km;
        } 
        // Если 22DD01 не работает, пробуем стандартный 0131
        else if (hex.includes('4131')) {
            let idx = hex.indexOf('4131') + 4;
            els.odo.innerText = parseInt(hex.substring(idx, idx + 4), 16);
        }
    }
</script>
</body>
</html>
