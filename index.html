<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT: FUEL MONITOR</title>
    <style>
        :root { --bg: #000; --main: #0f0; --acc: #00bfff; --warn: #f00; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--main); font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        #connectBtn { 
            width: 100%; padding: 25px; background: #111; color: var(--main); 
            border: none; border-bottom: 2px solid #333; font-size: 20px; font-weight: bold;
        }

        .fuel-section {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #222;
        }
        .fuel-val { font-size: 25vw; font-weight: bold; color: #fff; line-height: 1; }
        .label { font-size: 16px; color: var(--acc); text-transform: uppercase; letter-spacing: 2px; }

        .data-section {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        .card {
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .small-val { font-size: 12vw; font-weight: bold; color: #eee; }
        .unit { font-size: 14px; color: #555; }

        #status { font-size: 10px; color: #444; padding: 5px; text-align: center; background: #050505; }
    </style>
</head>
<body>

<button id="connectBtn">ПОДКЛЮЧИТЬ USB</button>

<div class="fuel-section">
    <div class="label">Остаток в баке</div>
    <div id="fuel" class="fuel-val">--</div>
    <div class="unit" style="font-size: 20px;">ЛИТРОВ</div>
</div>

<div class="data-section">
    <div class="card">
        <div class="label" id="consLabel">Расход</div>
        <div id="cons" class="small-val">0.0</div>
        <div id="consUnit" class="unit">Л / Ч</div>
    </div>
    <div class="card">
        <div class="label">Скорость</div>
        <div id="spd" class="small-val">0</div>
        <div class="unit">КМ/Ч</div>
    </div>
</div>

<div id="status">ОЖИДАНИЕ...</div>

<script>
    let dev, isWork = false, buffer = "";
    let curSpd = 0;
    const TANK = 45.0; // Объем бака Форд Фьюжн
    const MAF_COEF = 0.335; // Коэффициент для расчета расхода

    const dbg = (m) => { document.getElementById('status').innerText = m; };

    document.getElementById('connectBtn').onclick = async () => {
        try {
            // Твой метод WebUSB из рабочего файла
            dev = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403, productId: 0x6001 }] });
            await dev.open();
            await dev.selectConfiguration(1);
            await dev.claimInterface(0);

            // Настройка FTDI
            await dev.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: 0x4138, index: 0 });

            dbg("СВЯЗЬ ЕСТЬ. НАСТРОЙКА...");
            document.getElementById('connectBtn').style.display = "none";
            isWork = true;
            read();

            // Инициализация протоколов Ford
            const init = ["ATZ", "ATE0", "ATH0", "ATSP3", "0100"];
            for (let c of init) {
                await send(c);
                await new Promise(r => setTimeout(r, 800));
            }

            // Опрос: Бак, Скорость, MAF (для расхода)
            setInterval(() => {
                if (isWork) {
                    send("012F"); // Уровень топлива
                    setTimeout(() => send("010D"), 300); // Скорость
                    setTimeout(() => send("0110"), 600); // MAF
                }
            }, 1200);

        } catch (e) { dbg("ОШИБКА: " + e.message); }
    };

    async function send(c) {
        if (dev) await dev.transferOut(2, new TextEncoder().encode(c + "\r"));
    }

    async function read() {
        const dec = new TextDecoder();
        while (isWork) {
            try {
                const res = await dev.transferIn(1, 64);
                if (res.data.byteLength > 2) {
                    const data = new Uint8Array(res.data.buffer, 2);
                    buffer += dec.decode(data);
                    if (buffer.includes(">")) {
                        parse(buffer.toUpperCase());
                        buffer = "";
                    }
                }
            } catch (e) { isWork = false; break; }
        }
    }

    function parse(s) {
        const clean = s.replace(/\s+/g, '');
        
        // 1. УРОВЕНЬ ТОПЛИВА (01 2F)
        if (clean.includes("412F")) {
            const i = clean.indexOf("412F") + 4;
            const val = parseInt(clean.substring(i, i + 2), 16);
            if (!isNaN(val)) {
                const liters = (val / 255) * TANK;
                document.getElementById('fuel').innerText = liters.toFixed(1);
                document.getElementById('fuel').style.color = (liters < 6) ? "var(--warn)" : "#fff";
            }
        }

        // 2. СКОРОСТЬ (01 0D)
        if (clean.includes("410D")) {
            const i = clean.indexOf("410D") + 4;
            curSpd = parseInt(clean.substring(i, i + 2), 16);
            if (!isNaN(curSpd)) document.getElementById('spd').innerText = curSpd;
        }

        // 3. РАСХОД (01 10 - MAF)
        if (clean.includes("4110")) {
            const i = clean.indexOf("4110") + 4;
            const a = parseInt(clean.substring(i, i + 2), 16), b = parseInt(clean.substring(i + 2, i + 4), 16);
            if (!isNaN(a) && !isNaN(b)) {
                let maf = ((a * 256) + b) / 100;
                let lph = maf * MAF_COEF; // Литры в час

                if (curSpd > 5) {
                    let lp100 = (lph / curSpd) * 100;
                    document.getElementById('cons').innerText = lp100.toFixed(1);
                    document.getElementById('consUnit').innerText = "Л / 100КМ";
                } else {
                    document.getElementById('cons').innerText = lph.toFixed(1);
                    document.getElementById('consUnit').innerText = "Л / Ч";
                }
            }
        }
    }
</script>
</body>
</html>
