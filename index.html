<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CONECT: FUEL LIVE</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 10px; text-align: center; }
        .fuel-box { border: 4px solid #00bcff; padding: 25px; border-radius: 20px; background: #050505; margin: 15px 0; }
        .fuel-val { font-size: 5em; display: block; color: #00bcff; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { border: 1px solid #222; padding: 12px; border-radius: 10px; background: #080808; }
        .val { font-size: 1.8em; display: block; color: #0f0; }
        #log { height: 100px; overflow-y: auto; border: 1px solid #111; margin-top: 15px; font-size: 10px; text-align: left; padding: 8px; color: #555; }
        button { background: #00bcff; border: none; color: #000; padding: 20px; font-size: 1.1em; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <button id="connectBtn">ПЕРЕЗАПУСТИТЬ МОНИТОР</button>

    <div class="fuel-box">
        <span style="color: #00bcff; font-size: 0.9em;">ОСТАТОК В БАКЕ</span>
        <span id="fuel" class="fuel-val">--</span>
        <span style="color: #00bcff; font-size: 1.5em;">ЛИТРОВ</span>
    </div>

    <div class="grid">
        <div class="card">
            <span style="color:#666; font-size:0.7em;">МОТОР</span>
            <span id="temp" class="val">--</span>
        </div>
        <div class="card">
            <span style="color:#666; font-size:0.7em;">ОБОРОТЫ</span>
            <span id="rpm" class="val">0</span>
        </div>
    </div>

    <div id="log">Перезагрузите страницу и нажмите кнопку...</div>

    <script>
        const logDiv = document.getElementById('log');
        let device, isRunning = false;

        function log(msg) {
            logDiv.innerHTML += `> ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403 }] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                // Установка скорости 38400 (стабильная для ELS27)
                let divisor = Math.floor(3000000 / 38400);
                await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: divisor, index: 0 });

                log("СБРОС ШИНЫ...");
                await send("ATZ");
                await sleep(1000);
                await send("ATE0");
                await send("ATSP6");
                await send("ATH1"); 

                isRunning = true;
                mainLoop();
            } catch (err) { log("ОШИБКА: " + err); }
        });

        async function send(cmd, wait = 250) {
            try {
                await device.transferOut(2, new TextEncoder().encode(cmd + "\r"));
                await sleep(wait);
                let res = await device.transferIn(1, 128);
                let txt = new TextDecoder().decode(res.data).replace(/\s/g, '');
                return txt;
            } catch (e) { return ""; }
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function mainLoop() {
            while (isRunning) {
                // 1. Обороты (для проверки, что данные идут в реальном времени)
                let rRPM = await send("010C", 150);
                if (rRPM.includes("410C")) {
                    let idx = rRPM.indexOf("410C") + 4;
                    let val = Math.round(((parseInt(rRPM.substr(idx, 2), 16) * 256) + parseInt(rRPM.substr(idx + 2, 2), 16)) / 4);
                    document.getElementById('rpm').innerText = val;
                }

                // 2. Температура
                let rTemp = await send("0105", 150);
                if (rTemp.includes("4105")) {
                    document.getElementById('temp').innerText = (parseInt(rTemp.substr(rTemp.indexOf("4105") + 4, 2), 16) - 40) + "°C";
                }

                // 3. БЕНЗИН (Главный запрос)
                // Очищаем заголовки перед топливом
                await send("ATSH7E0"); 
                let rFuel = await send("012F", 400); // Увеличили ожидание для бака
                
                if (rFuel.includes("412F")) {
                    let raw = parseInt(rFuel.substr(rFuel.indexOf("412F") + 4, 2), 16);
                    // Расчет для бака Ford Fusion (45 литров)
                    let liters = Math.round((raw * 45) / 255);
                    document.getElementById('fuel').innerText = liters;
                    log("ТОПЛИВО ОБНОВЛЕНО: " + liters + "Л");
                } else {
                    // Если стандарт не ответил, пробуем расширенный Ford PID
                    let rFuel2 = await send("22042C", 400);
                    if (rFuel2.includes("62042C")) {
                        let raw2 = parseInt(rFuel2.substr(rFuel2.indexOf("62042C") + 6, 2), 16);
                        document.getElementById('fuel').innerText = Math.round((raw2 * 45) / 255);
                    }
                }

                await sleep(500); // Пауза между кругами, чтобы шина не зависала
            }
        }
    </script>
</body>
</html>
