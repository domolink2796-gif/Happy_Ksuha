<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CONECT: FORD PANEL</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 10px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .card { border: 1px solid #333; padding: 15px; border-radius: 10px; background: #050505; }
        .val { font-size: 2.5em; display: block; color: #0f0; }
        .label { font-size: 0.8em; color: #00bcff; text-transform: uppercase; }
        #log { height: 150px; overflow-y: auto; border: 1px solid #222; margin-top: 20px; font-size: 10px; text-align: left; padding: 5px; color: #666; }
        button { background: transparent; border: 2px solid #0f0; color: #0f0; padding: 15px 30px; font-size: 1.2em; border-radius: 50px; cursor: pointer; width: 100%; }
        button:active { background: #0f0; color: #000; }
        .full-width { grid-column: span 2; }
    </style>
</head>
<body>

    <div id="header">
        <h2 style="color: #ff3c00; margin: 5px;">X-CONECT PANEL</h2>
        <button id="connectBtn">АКТИВИРОВАТЬ USB</button>
    </div>

    <div class="grid">
        <div class="card full-width">
            <span class="label">Общий пробег (ODO)</span>
            <span id="odo" class="val">--- ---</span>
            <span class="label">км</span>
        </div>
        
        <div class="card">
            <span class="label">Топливо</span>
            <span id="fuel" class="val">--</span>
            <span class="label">литров</span>
        </div>

        <div class="card">
            <span class="label">Температура</span>
            <span id="temp" class="val">--</span>
            <span class="label">°C</span>
        </div>

        <div class="card">
            <span class="label">Скорость</span>
            <span id="speed" class="val">0</span>
            <span class="label">км/ч</span>
        </div>

        <div class="card">
            <span class="label">Расход</span>
            <span id="rate" class="val">0.0</span>
            <span class="label">л/ч</span>
        </div>
    </div>

    <div id="log">Ожидание подключения ELS27...</div>

    <script>
        const logDiv = document.getElementById('log');
        const connectBtn = document.getElementById('connectBtn');
        let device;
        let speeds = [2000000, 115200, 38400]; // Список скоростей для перебора

        function log(msg) {
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${time}] ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        connectBtn.addEventListener('click', async () => {
            try {
                device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403, productId: 0x6001 }] });
                await device.open();
                log("ELS27 ОБНАРУЖЕН. ЗАПУСК АВТОПОДБОРА...");
                
                await device.selectConfiguration(1);
                await device.claimInterface(0);

                // Цикл перебора скоростей
                for (let baud of speeds) {
                    log(`Проверка скорости: ${baud}...`);
                    await setupFTDI(baud);
                    let response = await sendCommand("ATZ\r");
                    if (response.includes("ELM") || response.includes("STN") || response.includes("OK")) {
                        log(`СОЕДИНЕНИЕ УСТАНОВЛЕНО: ${baud} OK`);
                        startPolling();
                        return;
                    }
                }
                log("ОШИБКА: Адаптер не отвечает. Проверь питание OBD.");
            } catch (err) {
                log("ОШИБКА USB: " + err);
            }
        });

        async function setupFTDI(baud) {
            let divisor = Math.floor(3000000 / baud);
            await device.controlTransferOut({
                requestType: 'vendor', recipient: 'device', request: 0x03, value: divisor, index: 0
            });
        }

        async function sendCommand(cmd) {
            let data = new TextEncoder().encode(cmd);
            await device.transferOut(2, data);
            let result = await device.transferIn(1, 64);
            let text = new TextDecoder().decode(result.data);
            return text;
        }

        async function startPolling() {
            // Начальная настройка
            await sendCommand("ATE0\r"); // Выключить эхо
            await sendCommand("ATL0\r"); // Выключить перенос строки
            await sendCommand("ATSP0\r"); // Авто протокол

            setInterval(async () => {
                // Запрос скорости (010D)
                let speedHex = await sendCommand("010D\r");
                parseSpeed(speedHex);

                // Запрос пробега (Тут PID может отличаться для твоего года, пробуем стандарт 0131)
                let odoHex = await sendCommand("0131\r");
                parseODO(odoHex);

                // Запрос топлива (012F)
                let fuelHex = await sendCommand("012F\r");
                parseFuel(fuelHex);
            }, 1000);
        }

        function parseSpeed(hex) {
            // Простая логика: если в ответе есть цифры, парсим второй байт
            let parts = hex.split(' ');
            if (parts.length > 2) {
                let val = parseInt(parts[2], 16);
                document.getElementById('speed').innerText = val;
            }
        }

        function parseFuel(hex) {
            let parts = hex.split(' ');
            if (parts.length > 2) {
                let val = Math.round((parseInt(parts[2], 16) * 100) / 255); // Процент бака
                let liters = Math.round((val * 52) / 100); // 52 литра — бак Фьюжена
                document.getElementById('fuel').innerText = liters;
            }
        }

        function parseODO(hex) {
            // Логика для общего пробега
            let parts = hex.split(' ');
            if (parts.length > 4) {
                let km = (parseInt(parts[2], 16) * 65536) + (parseInt(parts[3], 16) * 256) + parseInt(parts[4], 16);
                document.getElementById('odo').innerText = km.toLocaleString();
            }
        }
    </script>
</body>
</html>
