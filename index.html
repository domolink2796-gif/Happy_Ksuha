<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-CONECT: ODO STABLE</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 10px; text-align: center; }
        .card { border: 2px solid #0f0; padding: 30px; border-radius: 15px; background: #050505; margin: 20px 0; }
        .val { font-size: 3.5em; display: block; color: #0f0; font-weight: bold; text-shadow: 0 0 15px #0f0; }
        #log { height: 150px; overflow-y: auto; border: 1px solid #222; font-size: 11px; text-align: left; padding: 10px; color: #666; background: #0a0a0a; }
        button { background: #0f0; border: none; color: #000; padding: 20px; font-size: 1.2em; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <button id="connectBtn">ПОДКЛЮЧИТЬ И ЖДАТЬ</button>

    <div class="card">
        <span style="color: #00bcff; text-transform: uppercase;">Найденный пробег:</span>
        <span id="odo" class="val">--- ---</span>
    </div>

    <div id="log">Нажмите кнопку и не выключайте зажигание...</div>

    <script>
        const logDiv = document.getElementById('log');
        let device;

        function log(msg) {
            logDiv.innerHTML += `> ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403 }] });
                await device.open();
                await device.selectConfiguration(1);
                await device.claimInterface(0);
                
                let divisor = Math.floor(3000000 / 38400);
                await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: divisor, index: 0 });

                log("ПОДКЛЮЧЕНО. СТАБИЛИЗАЦИЯ ШИНЫ...");
                await send("ATZ");
                await sleep(1000);
                await send("ATE0");
                await send("ATH1");
                await send("ATSP6"); // Возвращаемся к HS-CAN
                
                runStableScan();
            } catch (err) { log("ОШИБКА: " + err); }
        });

        async function send(cmd, wait = 500) {
            try {
                await device.transferOut(2, new TextEncoder().encode(cmd + "\r"));
                await sleep(wait);
                let res = await device.transferIn(1, 128);
                let txt = new TextDecoder().decode(res.data).replace(/\s/g, '').replace(/>/g, '');
                if (txt.includes("62")) log("ОТВЕТ ПОЛУЧЕН!");
                return txt;
            } catch (e) { return ""; }
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function runStableScan() {
            while (true) {
                // Мягко запрашиваем приборку
                await send("ATSH720");
                let res = await send("22DD01", 800); // Даем почти секунду на ответ

                if (res.includes("62DD01")) {
                    let hex = res.substr(res.indexOf("62DD01") + 6, 6);
                    let km = parseInt(hex, 16);
                    if (km > 0) {
                        document.getElementById('odo').innerText = km.toLocaleString();
                        log("УСПЕХ: " + km + " км");
                    }
                } else {
                    // Если приборка молчит, пробуем второй адрес (который один раз сработал)
                    log("АДРЕС 720 МОЛЧИТ, ПРОБУЮ 727...");
                    await send("ATSH727");
                    let res2 = await send("22DD01", 800);
                    if (res2.includes("62")) {
                        let hex2 = res2.substr(res2.indexOf("62") + 6, 6);
                        let km2 = parseInt(hex2, 16);
                        document.getElementById('odo').innerText = km2.toLocaleString();
                    }
                }
                
                log("ПАУЗА ПЕРЕД СЛЕДУЮЩИМ ЦИКЛОМ...");
                await sleep(3000); // Ждем 3 секунды, чтобы не перегружать блоки
            }
        }
    </script>
</body>
</html>
