<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X-CONECT: Digital Dashboard</title>
    <script src="https://unpkg.com/web-serial-polyfill@1.0.15/dist/serial.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #00ff00;
            --text-accent: #00bfff;
            --text-warn: #ff4500;
            --text-dim: #555555;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 2px solid var(--text-dim);
        }
        button {
            background-color: var(--text-dim);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        button:active { background-color: var(--text-main); color: black; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto auto;
            flex-grow: 1;
            padding: 10px;
            gap: 10px;
        }
        .card {
            border: 2px solid var(--text-dim);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .card-full { grid-column: span 2; }
        .title { font-size: 14px; color: var(--text-accent); text-transform: uppercase; }
        .value { font-size: 10vw; font-weight: bold; line-height: 1.1; }
        .unit { font-size: 16px; color: var(--text-dim); }
        #status { color: var(--text-warn); font-size: 12px; max-width: 60%; }
    </style>
</head>
<body>

<header>
    <div id="status">ОЖИДАНИЕ USB...</div>
    <button id="connectBtn">ПОДКЛЮЧИТЬ USB (FTDI)</button>
</header>

<div class="grid">
    <div class="card card-full">
        <div class="title">Остаток в баке (45L MAX)</div>
        <div class="value" id="fuelVal">--</div>
        <div class="unit">ЛИТРОВ</div>
    </div>

    <div class="card">
        <div class="title">Скорость</div>
        <div class="value" style="color: var(--text-main);" id="speedVal">0</div>
        <div class="unit">КМ/Ч</div>
    </div>

    <div class="card">
        <div class="title">Расход</div>
        <div class="value" id="consVal">0.0</div>
        <div class="unit" id="consUnit">Л / Ч</div>
    </div>

    <div class="card">
        <div class="title">Пробег (ЭБУ)</div>
        <div class="value" style="font-size: 6vw;" id="odoVal">------</div>
        <div class="unit">КМ</div>
    </div>

    <div class="card">
        <div class="title">Суточный пробег</div>
        <div class="value" style="font-size: 6vw;" id="tripVal">0.0</div>
        <div class="unit">КМ</div>
        <button id="resetTripBtn" style="margin-top: 5px; padding: 5px 10px; font-size: 12px;">СБРОС</button>
    </div>
</div>

<script>
    // Настройки
    const TANK_VOLUME = 45.0;
    const FUEL_MAGIC_NUMBER = 0.335;

    let port, reader, writer;
    let isConnected = false;
    let commandQueue = ['010D', '0110', '012F', '0131']; 
    let cmdIndex = 0;
    let buffer = '';
    
    let currentSpeed = 0;
    let lastTime = Date.now();
    let tripDistance = parseFloat(localStorage.getItem('tripDistance')) || 0.0;

    const els = {
        status: document.getElementById('status'),
        connectBtn: document.getElementById('connectBtn'),
        fuel: document.getElementById('fuelVal'),
        speed: document.getElementById('speedVal'),
        cons: document.getElementById('consVal'),
        consUnit: document.getElementById('consUnit'),
        odo: document.getElementById('odoVal'),
        trip: document.getElementById('tripVal'),
        resetTrip: document.getElementById('resetTripBtn')
    };

    els.trip.innerText = tripDistance.toFixed(1);

    els.resetTrip.addEventListener('click', () => {
        tripDistance = 0.0;
        localStorage.setItem('tripDistance', tripDistance);
        els.trip.innerText = '0.0';
    });

    function updateTripMeter(speedKmH, timeDiffMs) {
        if (speedKmH > 0) {
            let hours = timeDiffMs / 3600000.0;
            tripDistance += (speedKmH * hours);
            localStorage.setItem('tripDistance', tripDistance.toString());
            els.trip.innerText = tripDistance.toFixed(1);
        }
    }

    // ЛОГИКА ПОДКЛЮЧЕНИЯ ИЗ "ЛОГИКА USB"
    els.connectBtn.addEventListener('click', async () => {
        els.status.innerText = "ЗАПРОС ДОСТУПА...";
        
        try {
            // 1. Принудительный вызов системного окна через WebUSB
            const usbDevice = await navigator.usb.requestDevice({ 
                filters: [{ vendorId: 0x0403, productId: 0x6001 }] 
            });

            els.status.innerText = "ЧИП НАЙДЕН. ОТКРЫВАЮ ПОРТ...";
            
            // 2. Инициализация через Serial Polyfill
            const serialManager = (typeof serial !== 'undefined') ? serial : navigator.serial;
            port = await serialManager.requestPort({ filters: [{ usbVendorId: 0x0403, usbProductId: 0x6001 }] });

            await port.open({ baudRate: 38400 });

            writer = port.writable.getWriter();
            isConnected = true;
            els.status.innerText = "СВЯЗЬ УСТАНОВЛЕНА!";
            els.status.style.color = "var(--text-main)";
            els.connectBtn.style.display = "none";

            readLoop();

            // 3. Инициализация ELM327
            await sendRawCommand('ATZ');
            await new Promise(r => setTimeout(r, 1000));
            await sendRawCommand('ATE0');
            await new Promise(r => setTimeout(r, 500));
            await sendRawCommand('ATSP0');

            pollNext();

        } catch (err) {
            els.status.innerText = "ОШИБКА: " + err.message;
            console.error(err);
        }
    });

    async function sendRawCommand(cmd) {
        if (writer) {
            const data = new TextEncoder().encode(cmd + '\r');
            await writer.write(data);
        }
    }

    async function readLoop() {
        reader = port.readable.getReader();
        const decoder = new TextDecoder();
        try {
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value);
                if (buffer.includes('>')) {
                    let response = buffer.replace('>', '').trim();
                    buffer = '';
                    processResponse(response);
                    setTimeout(pollNext, 150); 
                }
            }
        } catch (error) {
            els.status.innerText = "ОБРЫВ СВЯЗИ";
            els.status.style.color = "var(--text-warn)";
        } finally {
            reader.releaseLock();
        }
    }

    function processResponse(hexStr) {
        hexStr = hexStr.replace(/\s+/g, '').toUpperCase();
        
        if (hexStr.includes('410D')) {
            let idx = hexStr.indexOf('410D') + 4;
            currentSpeed = parseInt(hexStr.substring(idx, idx + 2), 16);
            els.speed.innerText = currentSpeed;
            let now = Date.now();
            updateTripMeter(currentSpeed, now - lastTime);
            lastTime = now;
        }
        
        if (hexStr.includes('4110')) {
            let idx = hexStr.indexOf('4110') + 4;
            let A = parseInt(hexStr.substring(idx, idx + 2), 16);
            let B = parseInt(hexStr.substring(idx + 2, idx + 4), 16);
            let maf = ((A * 256) + B) / 100;
            let lph = maf * FUEL_MAGIC_NUMBER;
            if (currentSpeed === 0) {
                els.cons.innerText = lph.toFixed(1);
                els.consUnit.innerText = 'Л / Ч';
            } else {
                let lp100 = (lph / currentSpeed) * 100;
                els.cons.innerText = Math.min(lp100, 99.9).toFixed(1);
                els.consUnit.innerText = 'Л / 100 КМ';
            }
        }
        
        if (hexStr.includes('412F')) {
            let idx = hexStr.indexOf('412F') + 4;
            let level = (parseInt(hexStr.substring(idx, idx + 2), 16) / 255);
            let liters = TANK_VOLUME * level;
            els.fuel.innerText = liters.toFixed(1);
            els.fuel.style.color = (liters < 7) ? "var(--text-warn)" : "var(--text-main)";
        }

        if (hexStr.includes('4131')) {
            let idx = hexStr.indexOf('4131') + 4;
            let A = parseInt(hexStr.substring(idx, idx + 2), 16);
            let B = parseInt(hexStr.substring(idx + 2, idx + 4), 16);
            els.odo.innerText = (A * 256) + B;
        }
    }

    function pollNext() {
        if (!isConnected) return;
        sendRawCommand(commandQueue[cmdIndex]);
        cmdIndex = (cmdIndex + 1) % commandQueue.length;
    }
</script>
</body>
</html>
